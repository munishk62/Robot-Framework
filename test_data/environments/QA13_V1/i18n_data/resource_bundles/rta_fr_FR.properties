1406273936=Approche d'heures supplémentaires
1406273937=calcule les heures supplémentaires pour un employé si les heures travaillées depuis le début de la semaine + les heures de planning restantes donnent lieu à des heures supplémentaires.
1406273938=Score de planning
1406273939=Indique dans quelle mesure le planning créé par le gestionnaire de magasin s'aligne sur le planning suggéré. Le planning créé par le gestionnaire de magasin peut ne pas toujours correspondre au planning suggéré, car chaque gestionnaire de magasin doit créer un planning qui répond le mieux aux besoins de son magasin.
1406273940=indique le nombre de roulements incomplets nécessitant une modification du gestionnaire de magasin (p. ex., un employé oublie de pointer son arrivée ou son départ). Les gestionnaires de magasin qui n'effectuent pas ces modifications de pointage à temps risquent de sous-déclarer la paie de la semaine en cours. Les gestionnaires de magasin ne pourront pas valider la paie tant que ces pointages ne seront pas corrigés et complétés.
1406273941=indique le nombre de roulements effectués ouvrant droit à une pause repas, mais pour lesquels aucun pointage de repas n'a été enregistré. Revoir la politique relative aux pauses repas avec les gestionnaires de magasin afin de s'assurer qu'ils en comprennent les modalités ainsi que la législation applicable.
1406273942=correspondent aux pointages horaires qui ne sont pas conformes au planning établi par le gestionnaire de magasin. Cela inclut les arrivées/départs anticipés ou tardifs, les roulements non planifiés ainsi que les absences non planifiées. Ces situations relèvent de la responsabilité du gestionnaire de magasin, mais peuvent également révéler des tendances indiquant un besoin d'accompagnement concernant son rôle dans la mise en œuvre de la politique de l'entreprise.
1406273943=Modifications du gestionnaire
1406273944=il s'agit des pointages horaires des employés qui ont été modifiés ou saisis manuellement par le gestionnaire du magasin. Les modifications apportées à la paie par le gestionnaire du magasin doivent rester rares et exceptionnelles. Des modifications fréquentes peuvent indiquer la nécessité de revoir la politique salariale/horaire avec le gestionnaire de magasin afin de garantir que les employés sont bien rémunérés pour toutes les heures travaillées.
