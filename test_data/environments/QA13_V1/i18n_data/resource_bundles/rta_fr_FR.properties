1406273934=Sauf disposition contraire de la loi, les employés doivent bénéficier d'une pause repas non rémunérée et ininterrompue d'au moins 30 minutes (généralement au milieu de leur roulement) pour les roulements prévus d'une durée égale ou supérieure à 6 heures, mais inférieure à 8 heures. Pour les roulements d'une durée prévue égale ou supérieure à 8 heures, une ou plusieurs pauses repas non rémunérées doivent être accordées, dont au moins 30 minutes doivent être ininterrompues. Les gestionnaires de magasin ou les employés habilités (en l'absence du gestionnaire de magasin) déterminent l'horaire de la pause repas. En cas de divergence avec la législation locale, c'est cette dernière qui prévaut. Pour toute question concernant les exigences relatives à la pause repas dans un cas particulier, veuillez contacter le directeur de district.
