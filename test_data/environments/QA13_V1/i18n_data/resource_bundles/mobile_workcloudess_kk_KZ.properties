timeclock.help.clock_in_new=Clock in easily with a simple swipe - to clock in, slide the 'Clock in' slider from left to right. Once clocked in, user gets instant access to clock-in status, total elapsed time, and a timeline of upcoming tasks and transactions. Clock in transaction is not allowed outside the configured time window, which is set by your organization.(g)
timeclock.help.clock_out_new=Clock out easily with a simple swipe - to clock out, slide the 'Clock Out' slider from left to right. Clock-out to accurately record the end of your work period and update your attendance records.(g)
timeclock.help.clock_out_early_new=To clock out early, you will notice that the slider is not available. Instead, users are required to long-press the 'Clock Out' button in order to successfully record their punch.(g)
timeclock.help.title.meal=Meal Start/End(g)
timeclock.help.meal=Record start and end meal times to ensure compliance and timekeeping. To start a Meal break, tap and hold the 'Take meal' button. To end meal break, slide the 'End Meal' slider from left to right.(g)
timeclock.help.title.break=Break Start/End(g)
timeclock.help.break=Some organization offer short breaks during work period. If configured, your timecard will display the Break Start and End Break to ensure compliance and timekeeping. To start a break, tap and hold the 'Take break' button. To end the break, slide the 'End break' slider from left to right.(g)
timeclock.help.title.missing_incorrect_punches=Missed/Incorrect Punches(g)
timeclock.help.missing_incorrect_punches=For missed punches or incorrect timestamps on a punch, it's important to know that there is a manager override menu designed to address these issues. This menu is accessible to your manager, who can assist in correcting any discrepancies. Be sure to communicate with your manager to utilize this function effectively.(g)
timeclock.help.switch_stores=In case if you find yourself in a vicinity of multiple stores/sites, you have the option to switch between them. To do this, simply click on 'Switch Stores' and choose the appropriate location for your needs.(g)
timeclock.help.view_punchcard=To track and analyze your worked hours, view the total shift time and a detailed timeline of punches, including times and warnings. This helps identify work patterns and promptly address discrepancies. Tap the More (3-dots) icon in the top right corner and then tap View Punchcard, once you have successfully Clocked in.(g)
timeclock.help.troubleshooting_tips=If you are not able to see the slider options, try refreshing the Timeclock page by hitting the 'Refresh' Icon or 'Scroll Up' on the page to see the Buttons.(g)
