rosom.calMethod.exprBuilder.engineSpecific.taskDate.description=Returns only date value of input time interval in the format yyyyMMdd
rosom.calMethod.exprBuilder.engineSpecific.taskDate.example=If task interval date is 01 January 2020. This will be evaluated to return interval date value in the format yyyyMMdd - 20200101.
rosom.calMethod.exprBuilder.engineSpecific.taskTime.description=Returns only minutes of input time interval
rosom.calMethod.exprBuilder.engineSpecific.taskTime.example=If task interval time is 9 am. This will be evaluated to return interval value in minutes - 540.
rosom.calMethod.exprBuilder.scheduledEvent.attribute=Any scheduled event. For example, Store Open
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.description=Returns the duration of the event in minutes for a day in a week it is evaluating for.
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.example=Store has a scheduled event with a duration of 1 hour which occurs on the day it is evaluating for.Then expression will return 60 as the output of the calculation method.
rosom.calMethod.exprBuilder.scheduledEvent.endTime.description=End time duration of a scheduled event in minutes
rosom.calMethod.exprBuilder.scheduledEvent.endTime.example=Store has a scheduled event with start time as 9 AM and duration as 9 hours. So event ends at 6 pm.Then expression will return 1080 as output of the calculation method.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.description=Checks whether a scheduled event will occur the number of days before or after the day in a week it is evaluating for.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.example=Expression would be of the form [SCHDEVENT].[Store Open].[occursAfterDays(a)] where as a is day number.If a is a positive number, then it is considered as after days, For example [SCHDEVENT].[Store Open].[occursAfterDays (1)] - This expression returns true if Store Open event occurs on the next day.While negative number represents before days. For example [SCHDEVENT].[Store Open].[occursAfterDays(-1)] - This expression returns true if Store Open event occurs on the previous day.
rosom.calMethod.exprBuilder.scheduledEvent.startTime.description=Start time duration of a scheduled event in minutes
rosom.calMethod.exprBuilder.scheduledEvent.startTime.example=Store has a scheduled event with start time as 9 AM.Then expression will return 540 as output of the calculation method.
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.description=Returns the sum of the duration of the event in minutes for all the days in a week
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.example=Store has a scheduled event with a duration of 1 hour which occurs on all days in a week.Then expression will return 420 as output of the calculation method.
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.description=Number of occurrences of a scheduled event in a week
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.example=Store has a scheduled event which is applicable for all days in a week.Then expression will return 7 as output of the calculation method.
