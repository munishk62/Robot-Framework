1406273934=Cu excepția cazului în care legea prevede altfel, angajaților li se acordă minim o perioadă de masă neplătită și neîntreruptă de 30 de minute (de obicei, spre mijlocul turei unui angajat) pentru ture mai mari sau egale cu 6 ore programate, dar mai puțin de 8 ore lucrate pe zi și pentru turele programate egale sau mai mari de 8 ore, trebuie asigurată o perioadă de masă neplătită de o oră (din care cel puțin 30 de minute trebuie să fie neîntreruptă). Managerii magazinului sau transportatorii cheie (în absența managerului magazinului) determină ora perioadei de masă. În cazul în care legislația statului diferă de legea statului specific, va fi respectată. Dacă există întrebări cu privire la cerințele perioadei de masă într-un anumit caz, contactați managerul districtual.
