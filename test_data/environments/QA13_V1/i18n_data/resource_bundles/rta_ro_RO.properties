1406273940=denotă numărul de schimburi incomplete care necesită editarea Managerului de magazin (de exemplu, angajatul nu reușește să înregistreze/iși la sfârșitul schimbului). Managerii de magazin care nu editează aceste punchuri la timp vor raporta salariile din săptămâna curentă. Managerii de magazine nu vor putea elibera salariile până când aceste punchuri nu vor fi editate și finalizate.
1406273941=denotă numărul de ture lucrate care s-au calificat pentru o pauză de masă, dar pentru care nu s-au înregistrat punc-uri de masă. Consultați politica privind perioada de masă cu managerii de magazine pentru a vă asigura că înțeleg politica și legea aplicabilă.
1406273942=sunt contorizări de timp care nu se aliniază cu programul creat de managerul magazinului. Acestea includ intrarea devreme/târzie, ceasul devreme/întârziat, schimbarea neprogramată și absența neprogramată. Aceste situații sunt responsabilitatea managerilor de magazin de a gestiona, dar pot dezvălui tendințe care sugerează necesitatea instruirii managerului de magazin cu privire la rolul său în aplicarea politicii companiei.
1406273943=Editări ale managerului
1406273944=sunt puncte de timp ale angajaților care au fost editate sau înregistrate manual de managerul magazinului. Modificările de salarizare de către Managerul magazinului ar trebui să fie puține și rare. Modificările frecvente sugerează necesitatea revizuirii politicii salariale/orelor cu managerul magazinului pentru a se asigura că angajații sunt plătiți pentru toate orele lucrate.
