2008183767=Διαβάστε τα παρακάτω πριν ολοκληρώσετε το πρόγραμμα του καταστήματός σας - Κάνοντας κλικ στο κουμπί Οριστικοποίηση, δηλώνετε τα εξής:
2008183768=Έχω ελέγξει το προτεινόμενο πρόγραμμα του συστήματος και έχω καθορίσει εάν (1) οι πληροφορίες για το κατάστημα και τους υπαλλήλους στις οποίες βασίζεται πρέπει να τροποποιηθούν και / ή (2) το ίδιο το πρόγραμμα πρέπει να τροποποιηθεί προκειμένου να καλύψει τις ανάγκες του καταστήματός μου .
