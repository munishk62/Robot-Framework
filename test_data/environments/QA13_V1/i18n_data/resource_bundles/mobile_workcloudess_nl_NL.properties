timeclock.help.break=Sommige organisaties bieden korte pauzes tijdens de werkperiode. Indien geconfigureerd, geeft uw tijdkaart Pauze beginnen en Pauze beëindigen weer om naleving en tijdregistratie te garanderen. Tik op de knop 'Pauze nemen' en houd deze ingedrukt om een pauze te beginnen. Schuif de schuifregelaar 'Pauze beëindigen' van links naar rechts om de pauze te beëindigen.
timeclock.help.break_periods=Pauzes worden gestart door de knop ingedrukt te houden
timeclock.help.clock_in1=U kunt maximaal 8 minuten voor uw geplande dienst inklokken voor uw dienst.
timeclock.help.clock_in2=Sleep de schuifregelaar over het scherm om uw pons te registreren wanneer u wilt inklokken.
timeclock.help.clock_in_new=Eenvoudig inklokken met een veegbeweging - schuif de schuifregelaar 'Inklokken' van links naar rechts om in te klokken. Zodra de gebruiker heeft ingeklokt, krijgt deze direct toegang tot de inklokstatus, de totale verstreken tijd en een tijdlijn van geplande taken en transacties. Een inkloktransactie is niet toegestaan buiten het geconfigureerde tijdvenster dat is ingesteld door uw organisatie.
timeclock.help.clock_out=Als u klaar bent met uw dienst, verschijnt er een schuifregelaar om uit te klokken. Sleep de schuifregelaar om uw pons te registreren.
timeclock.help.clock_out_early=Als u voor het einde van uw dienst moet uitklokken, drukt u deze knop lang in als u niet bent ingepland.
timeclock.help.clock_out_early_new=Als u vroeg wilt uitklokken, ziet u dat de schuifregelaar niet beschikbaar is. In plaats daarvan moeten gebruikers de knop 'Uitklokken' lang indrukken om hun pons te registreren.
timeclock.help.clock_out_new=Eenvoudig uitklokken met een veegbeweging - schuif de schuifregelaar 'Uitklokken' van links naar rechts om uit te klokken. Klok uit om het einde van uw werkperiode nauwkeurig te registreren en uw aanwezigheidsgegevens bij te werken.
timeclock.help.incorrect_punch=Als u een tijdstempel van een pons moet corrigeren, moet u een correctie van de tijdkaart indienen bij uw manager.
timeclock.help.meal=Registreer de begin- en eindtijd van de maaltijd om naleving en tijdregistratie te garanderen. Tik op de knop 'Maaltijd nemen' en houd deze ingedrukt om een maaltijdpauze te starten. Schuif de schuifregelaar 'Maaltijd beëindigen' van links naar rechts om de maaltijdpauze te beëindigen.
timeclock.help.missing_incorrect_punches=Bij gemiste ponstijden of onjuiste tijdstempels op een pons is het belangrijk om te weten dat er een menu 'Overschrijving door manager' is om deze problemen op te lossen. Uw manager heeft toegang tot dit menu en kan u helpen om eventuele afwijkingen te corrigeren. Communiceer met uw manager om deze functie effectief te gebruiken.
timeclock.help.missing_punches=Als u gemiste ponsen hebt en een andere functie moet invoeren, moet u contact opnemen met uw manager om uw ponsvolgorde te overschrijven.
timeclock.help.switch_stores=Als u zich in de buurt van meerdere winkels/locaties bevindt, kunt u tussen deze winkels/locaties schakelen. Klik hiervoor op 'Locaties wisselen' en kies de gewenste locatie.
