timeclock.help.troubleshooting_tips=Als u de schuifregelaaropties niet kunt zien, kunt u proberen de pagina Tijdklok te vernieuwen door op het pictogram 'Vernieuwen' of 'Omhoog schuiven' op de pagina te klikken om de knoppen te zien.
timeclock.help.view_punchcard=Bekijk de totale diensttijd en een gedetailleerde tijdlijn van ponstijden, inclusief tijden en waarschuwingen, om uw gewerkte uren te volgen en te analyseren. Hiermee kunt u werkpatronen  identificeren en afwijkingen snel oplossen. Tik op het pictogram Meer (3 puntjes) in de rechterbovenhoek en tik vervolgens op 'Ponskaart weergeven' nadat u hebt ingeklokt.
