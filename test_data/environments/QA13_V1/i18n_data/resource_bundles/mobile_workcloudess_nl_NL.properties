timeclock.help.clock_in_v2=Inklokken is eenvoudig — tik gewoon op de knop 'Inklokken'. Zodra u bent ingeklokt, ziet u direct uw inklokstatus, de totale verstreken tijd en een tijdlijn van geplande taken en transacties. Let op: u kunt alleen inklokken binnen het door uw organisatie aangewezen tijdvenster.(g)
timeclock.help.clock_out_v2=Klok eenvoudig uit aan het einde van uw werkperiode door op de knop 'Uitklokken' te tikken. Zo registreert u nauwkeurig wanneer u uw dienst beëindigt en blijven uw aanwezigheidsgegevens up-to-date.(g)
timeclock.help.clock_out_early_v2=Om vroeg uit te klokken, moeten gebruikers op de knop 'Uitklokken' tikken om hun pons succesvol te registreren. Er verschijnt een bevestigingsprompt om te zorgen dat de transactie wordt voltooid.(g)
timeclock.help.meal_v2=Om naleving en nauwkeurige tijdregistratie te bevorderen, is het belangrijk om zowel het begin als het einde van uw maaltijdpauzes te registreren. Tik op de knop 'Maaltijd nemen' om uw maaltijdpauze te beginnen. Wanneer uw maaltijdpauze voorbij is, beëindigt u deze door op de knop 'Maaltijd beëindigen' te tikken.(g)
timeclock.help.break_v2=Sommige organisaties bieden korte pauzes tijdens de werkperiode. Indien geconfigureerd, geeft uw tijdkaart de begin- en eindtijden van de pauze weer om naleving en tijdregistratie te garanderen. Tik op de knop 'Pauze nemen' om een pauze te beginnen. Wanneer u klaar bent om weer aan het werk te gaan, tikt u op de knop 'Pauze beëindigen'.(g)
