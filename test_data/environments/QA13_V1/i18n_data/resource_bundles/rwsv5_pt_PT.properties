rosom.calMethod.exprBuilder.engineSpecific.taskDate.description=Retorna apenas o valor da data do intervalo de tempo de entrada no formato aaaaMMdd
rosom.calMethod.exprBuilder.engineSpecific.taskDate.example=Se a data do intervalo da tarefa for 01 de janeiro de 2020. Isso será avaliado para retornar o valor da data do intervalo no formato aaaaMMdd - 20200101.
rosom.calMethod.exprBuilder.engineSpecific.taskTime.description=Retorna apenas minutos do intervalo de tempo de entrada
rosom.calMethod.exprBuilder.engineSpecific.taskTime.example=Se o intervalo da tarefa for 9h. Isso será avaliado para retornar o valor do intervalo em minutos - 540.
rosom.calMethod.exprBuilder.scheduledEvent.attribute=Qualquer evento agendado. Por exemplo, Loja aberta
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.description=Retorna a duração do evento em minutos para um dia da semana que está avaliando.
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.example=A loja tem um evento agendado com duração de 1 hora que ocorre no dia para o qual está avaliando. Então, a expressão retornará 60 como a saída do método de cálculo.
rosom.calMethod.exprBuilder.scheduledEvent.endTime.description=Duração do horário de término de um evento programado em minutos
rosom.calMethod.exprBuilder.scheduledEvent.endTime.example=A loja tem um evento programado com horário de início às 9h e duração de 9 horas. Portanto, o evento termina às 18h. Em seguida, a expressão retornará 1080 como saída do método de cálculo.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.description=Verifica se um evento programado ocorrerá o número de dias antes ou depois do dia da semana para o qual está avaliando.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.example=A expressão seria no formato [SCHDEVENT]. [Store Open]. [OccurAfterDays (a)] em que a é o número do dia. Se a for um número positivo, será considerado após dias, por exemplo [SCHDEVENT]. [ Store Open]. [OccurAfterDays (1)] - Esta expressão retorna true se o evento Store Open ocorrer no dia seguinte. Enquanto o número negativo representa antes dos dias. Por exemplo [SCHDEVENT]. [Store Open]. [OccurAfterDays (-1)] - Esta expressão retorna true se o evento Store Open ocorrer no dia anterior.
rosom.calMethod.exprBuilder.scheduledEvent.startTime.description=Duração do horário de início de um evento programado em minutos
rosom.calMethod.exprBuilder.scheduledEvent.startTime.example=A loja tem um evento agendado com hora de início às 9h. Então, a expressão retornará 540 como saída do método de cálculo.
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.description=Retorna a soma da duração do evento em minutos para todos os dias da semana
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.example=A loja tem um evento programado com duração de 1 hora que ocorre em todos os dias da semana. Então, a expressão retornará 420 como saída do método de cálculo.
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.description=Número de ocorrências de um evento programado em uma semana
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.example=A loja tem um evento programado que é aplicável a todos os dias da semana. Então, a expressão retornará 7 como saída do método de cálculo.
