1000000003769=Beriem na vedomie, že dobrovoľne súhlasím s odpracovaním zvolenej zmeny. Rozumiem, že to, že som požiadaný alebo povzbudzovaný vedením, aby som dobrovoľne zmenil svoj rozvrh alebo dobrovoľne nastúpil na túto zmenu, nič nemení na skutočnosti, že môžem odmietnuť zmenu svojho rozvrhu alebo nástup na vybranú zmenu a že nebudú podniknuté žiadne nepriaznivé opatrenia proti ja kvôli mojej voľbe. Ak dobrovoľne súhlasím s odpracovaním zmeny, beriem na vedomie, že môžem byť braný na zodpovednosť za neodpracovanie vybranej zmeny podľa plánu dochádzky.
