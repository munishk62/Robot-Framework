1406273933=Meal Policy
1406273934=Unless otherwise required by law, employees be given a minimum of one 30 minute unpaid, uninterrupted meal period (typically toward the middle of an employee's shift) for shifts greater than or equal to 6 scheduled hours but less than 8 hours worked in a day and for scheduled shifts equal to or greater than 8 hours, a one hour unpaid meal period (at least 30 minutes of which must be uninterrupted) must be provided. Store managers or key carriers (in the absence of the store manager) determine the time of the meal period. Where state law differs from, specific state law will be followed. If there are any questions regarding the meal period requirements in a particular case, contact the district manager.
1406273935=Appr. OT
1406273936=Approaching OT
1406273937=calculates hours of OT for an employee if hours worked WTD + remaining hours scheduled will result in OT.
1406273938=Schedule Score
1406273939=indicates how well the Store Manager's created schedule aligns with suggested schedule. The schedule created by the Store Manager may not always align with the suggested schedule, as each Store Manager must create a schedule that best meets the needs of his/her store.
1406273940=denotes the number of incomplete shifts requiring Store Manager editing (e.g. employee fails to clock in/out at end of shift).  Store Managers who do not edit these punches timely will under report current week payroll.  Store Managers will not be able to release payroll until these punches are edited and complete.
1406273941=denotes the number of worked shifts that qualified for a meal break, but for which meal time punches were not recorded.  Review meal period policy with Store Managers to insure that they understand the policy and applicable law.
1406273942=are counts of time punches that do not align with the schedule created by the Store Manager.  These include early/late clock in, early/late clock out, unscheduled shift and unscheduled absence.  These situations are the Store Managers responsibility to manage, but may reveal trends that suggest the need for coaching of the Store Manager regarding his/her role in enforcing company policy.
1406273943=Manager Edits
1406273944=are employee time punches that have been edited or manually recorded by the Store Manager.  Payroll modifications by the Store Manager should be few and infrequent.  Frequent edits suggest the need to review the wage/hour policy with the Store Manager to ensure employees are paid for all hours worked.
