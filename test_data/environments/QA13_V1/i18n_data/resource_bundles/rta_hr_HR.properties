1406273933=Politika prehrane
1406273934=Osim ako nije drugačije propisano zakonom, zaposlenicima se daje najmanje jedan neplaćeni obrok od 30 minuta bez prekida (obično prema sredini smjene zaposlenika) za smjene veće od ili jednake 6 planiranih sati, ali manje od 8 radnih sati dnevno i za planirane smjene jednake ili veće od 8 sati, mora se osigurati jedan sat neplaćenog obroka (od čega najmanje 30 minuta mora biti bez prekida). Voditelji trgovine ili nositelji ključeva (u odsutnosti voditelja trgovine) određuju vrijeme razdoblja obroka. Tamo gdje se državni zakon razlikuje od njega, primjenjivat će se određeni državni zakon. Ako imate bilo kakvih pitanja u vezi sa zahtjevima za razdoblje obroka u određenom slučaju, obratite se okružnom upravitelju.
1406273935=pribl. OT
1406273936=Približava se OT
1406273937=izračunava sate OT za zaposlenika ako su odrađeni sati WTD + preostali planirani sati rezultirat će OT-om.
1406273938=Rezultat rasporeda
1406273939=pokazuje koliko je dobro kreirani raspored upravitelja trgovine usklađen s predloženim rasporedom. Raspored koji je izradio upravitelj trgovine možda neće uvijek biti u skladu s predloženim rasporedom, budući da svaki upravitelj trgovine mora izraditi raspored koji najbolje odgovara potrebama njegove/njezine trgovine.
1406273940=označava broj nedovršenih smjena koje zahtijevaju uređivanje Store Managera (npr. zaposlenik ne stigne/odjavi na kraju smjene). Upravitelji trgovina koji ne urede ove udarce na vrijeme prijavit će platni spisak tekućeg tjedna. Upravitelji trgovina neće moći objaviti platni spisak dok se ti udarci ne urede i dovrše.
1406273941=označava broj odrađenih smjena koje su ispunjavale uvjete za stanku za obrok, ali za koje nisu zabilježeni udarci vremena obroka. Pregledajte politiku razdoblja obroka s voditeljima trgovine kako biste bili sigurni da razumiju politiku i primjenjivi zakon.
1406273942=su brojači vremenskih udaraca koji nisu u skladu s rasporedom koji je izradio upravitelj trgovine. To uključuje rani/kasni dolazak, rani/kasni odlazak, neplaniranu smjenu i neplanirani izostanak. Ove situacije su odgovorni za upravljanje upraviteljima trgovina, ali mogu otkriti trendove koji sugeriraju potrebu za podučavanjem upravitelja trgovine u vezi s njegovom/njezinom ulogom u provođenju politike tvrtke.
1406273943=Upravljačka uređivanja
1406273944=su vremenski udarci zaposlenika koje je uredio ili ručno zabilježio voditelj trgovine. Izmjene platne liste od strane voditelja trgovine trebale bi biti rijetke i rijetke. Česta uređivanja upućuju na potrebu pregledavanja politike plaća/sata s upraviteljem trgovine kako bi se osiguralo da su zaposlenici plaćeni za sve odrađene sate.
