1406273934=თუ კანონით სხვა რამ არ არის მოთხოვნილი, თანამშრომლებს ეძლევათ მინიმუმ ერთი 30 წუთიანი ანაზღაურებადი, უწყვეტი კვების პერიოდი (ჩვეულებრივ, თანამშრომლის ცვლის შუა რიცხვებამდე) ცვლაში, რომელიც აღემატება ან ტოლია 6 დაგეგმილ საათს, მაგრამ დღეში 8 საათზე ნაკლები სამუშაოს დროს. 8 საათის ტოლი ან მეტი დროის დაგეგმილი ცვლებისთვის, უნდა იყოს გათვალისწინებული ერთსაათიანი ანაზღაურებადი კვება (არანაკლებ 30 წუთი უნდა იყოს უწყვეტი). მაღაზიის მენეჯერები ან საკვანძო მატარებლები (მაღაზიის მენეჯერის არყოფნის შემთხვევაში) განსაზღვრავენ კვების პერიოდის დროს. სადაც სახელმწიფო კანონმდებლობა განსხვავდება, კონკრეტული სახელმწიფო კანონი დაცული იქნება. თუ რაიმე შეკითხვა გაქვთ კონკრეტულ შემთხვევაში კვების პერიოდის მოთხოვნებთან დაკავშირებით, დაუკავშირდით რაიონის მენეჯერს.
