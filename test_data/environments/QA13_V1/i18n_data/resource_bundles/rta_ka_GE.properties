1406273939=მიუთითებს, რამდენად შეესაბამება მაღაზიის მენეჯერის მიერ შექმნილი გრაფიკი შემოთავაზებულ განრიგს. მაღაზიის მენეჯერის მიერ შექმნილი განრიგი შეიძლება ყოველთვის არ ემთხვეოდეს შემოთავაზებულ განრიგს, რადგან მაღაზიის თითოეულმა მენეჯერმა უნდა შექმნას განრიგი, რომელიც საუკეთესოდ აკმაყოფილებს მისი მაღაზიის საჭიროებებს.
1406273940=აღნიშნავს არასრული ცვლების რაოდენობას, რომლებიც საჭიროებენ მაღაზიის მენეჯერის რედაქტირებას (მაგ. თანამშრომელი ვერ ახერხებს ჩასვლას/გამორთვას ცვლის ბოლოს). მაღაზიის მენეჯერები, რომლებიც დროულად არ დაარედაქტირებენ ამ დარტყმებს, აცნობებენ მიმდინარე კვირის სახელფასო ანგარიშს. მაღაზიის მენეჯერები ვერ შეძლებენ ხელფასების გათავისუფლებას, სანამ ეს დარტყმები არ შესწორდება და დასრულდება.
