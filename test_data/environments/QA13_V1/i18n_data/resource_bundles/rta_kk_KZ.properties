1406273934=Егер заңда өзгеше көзделмесе, қызметкерлерге жоспарланған 6 сағаттан асатын немесе оған тең, бірақ күніне 8 сағаттан аз жұмыс істеген ауысымдар үшін ақысыз, үзіліссіз тамақтану уақыты (әдетте қызметкер ауысымының ортасына қарай) беріледі. 8 сағатқа тең немесе одан асатын жоспарлы ауысымдар үшін бір сағаттық ақысыз тамақтану уақыты (кемінде 30 минут үзіліссіз болуы керек) қамтамасыз етілуі керек. Дүкен менеджерлері немесе негізгі тасымалдаушылар (дүкен меңгерушісі болмаған жағдайда) тамақтану кезеңінің уақытын анықтайды. Мемлекеттік құқықтан ерекшеленетін жерде нақты мемлекеттік заң қолданылады. Белгілі бір жағдайда тамақтану мерзіміне қойылатын талаптарға қатысты сұрақтар туындаса, аудан менеджеріне хабарласыңыз.
