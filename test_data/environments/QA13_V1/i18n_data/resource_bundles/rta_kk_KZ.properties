1406273939=Дүкен менеджерінің жасаған кестесінің ұсынылған кестеге қаншалықты сәйкес келетінін көрсетеді. Дүкен менеджері жасаған кесте әрқашан ұсынылған кестеге сәйкес келмеуі мүмкін, себебі әрбір Дүкен менеджері өз дүкенінің қажеттіліктеріне ең жақсы сәйкес келетін кестені жасауы керек.
1406273940=Дүкен менеджерінің өңдеуін қажет ететін аяқталмаған ауысымдардың санын білдіреді (мысалы, ауысым соңында қызметкер сағатты енгізе алмаса). Бұл соққыларды уақтылы өңдемейтін дүкен менеджерлері ағымдағы аптадағы жалақы туралы есеп береді. Дүкен менеджерлері бұл соққылар өңделмейінше және аяқталмайынша жалақыны шығара алмайды.
1406273941=тамақтану үзілісіне жарамды, бірақ тамақтану уақытындағы соққылар жазылмаған жұмыс ауысымдарының санын білдіреді. Дүкен менеджерлері саясатты және қолданыстағы заңнаманы түсінетініне көз жеткізу үшін тамақтану мерзімінің саясатын қарап шығыңыз.
1406273942=Дүкен менеджері жасаған кестеге сәйкес келмейтін уақыт соққыларының саны. Оларға ерте/кеш келу, ерте/кеш шығу, жоспардан тыс ауысым және жоспардан тыс келмеу жатады. Бұл жағдайларды басқару үшін Дүкен менеджерлері жауапты, бірақ оның компания саясатын жүзеге асырудағы рөліне қатысты Дүкен менеджерін оқыту қажеттілігін көрсететін тенденцияларды ашуы мүмкін.
