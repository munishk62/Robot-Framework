timeclock.help.break=Kai kurios organizacijos darbo metu suteikia trumpas pertraukas. Jei tai sukonfigūruota, jūsų laiko apskaitos kortelė rodys „Pertraukos pradžia“ ir „Pertraukos pabaiga“ siekiant užtikrinti atitiktį ir laiko apskaitą. Norėdami pradėti pertrauką, palieskite ir palaikykite mygtuką „Daryti pertrauką“. Norėdami pabaigti pertrauką, slinkite slankiklį „Pertraukos pabaiga“ iš kairės į dešinę.
timeclock.help.break_periods=Norėdami pradėti pertrauką, naudokite paspaudimo ir palaikymo veiksmą
timeclock.help.clock_in1=Pažymėti atvykimą į darbą galite likus 8 min. iki numatytos pamainos pradžios.
timeclock.help.clock_in2=Jei norite pažymėti atvykimą į darbą, paspauskite ir vilkite slankiklį ekranu, kad pasižymėtumėte.
timeclock.help.clock_in_new=Įsiregistruokite tiesiog perbraukdami: norėdami įsiregistruoti, slinkite slankiklį „Įsiregistravimas“ iš kairės į dešinę. Įsiregistravęs naudotojas iš karto gauna prieigą prie įsiregistravimo būsenos, viso praėjusio laiko ir būsimų užduočių bei operacijų laiko juostos. Įsiregistravimo operacija negalima už sukonfigūruoto laikotarpio ribų, nustatytų jūsų organizacijos.
timeclock.help.clock_out=Kai baigsite pamainą, pasirodys išėjimo iš darbo žymėjimo slankiklis. Paspauskite ir vilkite slankiklį, kad pažymėtumėte.
timeclock.help.clock_out_early=Jei išėjimą iš darbo norite pažymėti anksčiau, dar nepasibaigus jūsų pamainai, paspauskite ir palaikykite nuspaudę šį mygtuką.
timeclock.help.clock_out_early_new=Jei norėsite išsiregistruoti anksti, pastebėsite, kad slankiklis nepasiekiamas. Vietoj jo naudotojai turės ilgai paspausti mygtuką „Išsiregistravimas“, kad galėtų sėkmingai išsaugoti savo įrašą.
timeclock.help.clock_out_new=Lengvai išsiregistruokite tiesiog perbraukdami: norėdami išsiregistruoti, slinkite slankiklį „Išsiregistravimas“ iš kairės į dešinę. Išsiregistruokite, kad tiksliai įrašytumėte darbo pabaigos laikotarpį ir atnaujintumėte darbo laiko įrašus.
timeclock.help.incorrect_punch=Jei perforacinėje kortelėje reikia ištaisyti laiko žymą, turite pateikti darbo laiko kortelės pataisymą savo vadovui.
timeclock.help.meal=Įrašykite pietų pradžios ir pabaigos laikus, kad užtikrintumėte atitiktį ir laiko apskaitą. Norėdami pradėti pietų pertrauką, palieskite ir palaikykite mygtuką „Pietauti“. Norėdami baigti pietų pertrauką, slankiklį „Baigti pietus“ paslinkite iš kairės į dešinę.
timeclock.help.missing_incorrect_punches=Kai įrašai praleisti arba įrašo laiko žymos neteisingos, svarbu žinoti, kad šioms problemoms spręsti yra sukurtas „Vadovo nepaisymų“ meniu. Prieigą prie šio meniu turi jūsų vadovas, galintis padėti ištaisyti tokius neatitikimus. Kreipkitės į savo vadovą, kad galėtumėte efektyviai naudoti šią funkciją.
timeclock.help.missing_punches=Jei esate praleidę pasižymėjimus ir jums reikia įvesti kitą funkciją, turėsite kreiptis į savo vadovą, kad būtų panaikinta jūsų pasižymėjimų seka.
timeclock.help.switch_stores=Jei lankotės keliose parduotuvėse ar vietovėse, galite jas perjungti. Norėdami tai padaryti, spustelėkite „Keisti parduotuves“ ir pasirinkite jūsų poreikius labiausiai atitinkančią vietą.
timeclock.help.title.break=Pertraukos pradžia – pabaiga
timeclock.help.title.incorrect_punch=Neteisingas žymėjimas
timeclock.help.title.meal=Pietų pradžia – pabaiga
timeclock.help.title.missing_incorrect_punches=Praleisti arba neteisingi įrašai
