timeclock.help.title.troubleshooting=Trikčių šalinimo patarimai
timeclock.help.troubleshooting_tips=Jei negalite matyti slankiklio parinkčių, pabandykite atnaujinti laikrodžio puslapį spustelėdami piktogramą „Atnaujinti“ arba „Slinkti aukštyn“ puslapyje, kad matytumėte mygtukus.
timeclock.help.view_punchcard=Norėdami stebėti ir analizuoti savo dirbtas valandas, peržiūrėkite bendrą pamainos laiką ir įrašų laiko juostą, įskaitant laikus ir įspėjimus. Tai padeda nustatyti darbo laiko modelius ir greitai ištaisyti neatitikimus. Viršutiniame dešiniajame kampe palieskite piktogramą „Daugiau“ (3 taškai) ir, sėkmingai įsiregistravę, palieskite „Peržiūrėti perforacinę kortelę“.
