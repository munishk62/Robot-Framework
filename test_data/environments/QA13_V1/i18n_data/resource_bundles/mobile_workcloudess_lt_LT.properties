timeclock.help.clock_in_v2=Ĭsiregistruoti lengva – tiesiog palieskite mygtuką „Ĭsiregistravimas“. Ĭsiregistravę iš karto matysite savo įsiregistravimo būseną, visą praėjusį laiką ir būsimų užduočių bei operacijų laiko juostą. Atkreipkite dėmesį: įsiregistruoti galite tik per jūsų organizacijos nustatytą laikotarpį.(g)
timeclock.help.clock_out_v2=Lengvai išsiregistruokite darbo laikotarpio pabaigoje paliesdami mygtuką „Išsiregistravimas“. Tai padeda tiksliai įrašyti pamainos pabaigą ir atnaujinti jūsų darbo laiko įrašus.(g)
timeclock.help.clock_out_early_v2=Norėdami išsiregistruoti anksčiau, naudotojai turi paliesti mygtuką „Išsiregistravimas“, kad sėkmingai įrašytų savo žymą. Pasirodys patvirtinimo užklausa, kad būtų užtikrintas operacijos užbaigimas.(g)
timeclock.help.meal_v2=Siekiant užtikrinti atitiktį ir tikslią laiko apskaitą, svarbu užfiksuoti ir pietų pertraukos pradžią, ir pabaigą. Norėdami pradėti pietų pertrauką, palieskite mygtuką „Pietauti“. Kai pietų pertrauka baigsis, baikite ją paliesdami mygtuką „Baigti pietus“.(g)
timeclock.help.break_v2=Kai kurios organizacijos darbo metu suteikia trumpas pertraukas. Jei tai sukonfigūruota, jūsų laiko apskaitos kortelė rodys pertraukos pradžios ir pabaigos laikus, siekiant užtikrinti atitiktį ir laiko apskaitą. Norėdami pradėti pertrauką, palieskite mygtuką „Daryti pertrauką“. Kai būsite pasiruošę grįžti į darbą, palieskite mygtuką „Baigti pertrauką“.(g)
timeclock.button.hint_v2=Palieskite, kad atliktumėte veiksmą(g)
