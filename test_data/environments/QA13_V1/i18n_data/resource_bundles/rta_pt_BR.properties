1406273933=Política de refeição
1406273934=Salvo se exigido de outra forma por lei, os funcionários devem receber, no mínimo, um intervalo para refeição não remunerado e ininterrupto de 30 minutos (normalmente no meio do turno) para turnos com duração igual ou superior a 6 horas, mas inferior a 8 horas trabalhadas em um dia. Para turnos programados com duração igual ou superior a 8 horas, deve ser concedido um intervalo para refeição de uma hora não remunerada (dos quais pelo menos 30 minutos devem ser ininterruptos). O gerente da loja ou os responsáveis (na ausência do gerente) determinam o horário do intervalo para refeição. Nos casos em que a legislação estadual for diferente, a legislação estadual específica será seguida. Em caso de dúvidas quanto aos requisitos de intervalo para refeição em uma situação específica, entre em contato com o gerente distrital.
1406273935=Aproximando-se de OT
1406273936=Aproximando-se de OT
1406273937=calcula as OT de um funcionário se as horas trabalhadas na semana até a data somadas às horas restantes agendadas resultarem em horas extras.
1406273938=Pontuação do agendamento
1406273939=indica o nível de alinhamento da programação criada pelo gerente da loja com a programação sugerida. A programação criada pelo gerente de la pode nem sempre estar alinhada com a programação sugerida, pois cada gerente de loja deve criar uma escala que melhor atenda às necessidades de sua loja.
1406273940=indica o número de turnos incompletos que exigem edição por parte do gerente da loja (por exemplo, quando o funcionário não registra a entrada/saída ao final do turno). Gerentes que não realizam essas edições de forma oportuna subnotificarão a folha de pagamento da semana atual. Os gerentes da loja não poderão liberar a folha de pagamento até que esses registros de ponto sejam editados e finalizados.
1406273941=indica o número de turnos trabalhados que se qualificavam para um intervalo de refeição, mas para os quais os registros de ponto do intervalo não foram registrados. Revise a política de intervalo para refeição com os gerentes da loja para garantir que compreendam a política e a legislação aplicável.
1406273942=são contagens de registros de ponto que não estão alinhados com a escala criada pelo gerente da loja. Isso inclui entrada antecipada/atrasada, saída antecipada/atrasada, turno não programado e ausência não programada. Essas situações são de responsabilidade do gerente da loja mas podem revelar tendências que indiquem a necessidade de orientação ao gerente quanto ao seu papel na aplicação da política da empresa.
1406273943=Edições do gerente
1406273944=são registros de ponto dos funcionários que foram editados ou inseridos manualmente pelo gerente da loja. Modificações na folha de pagamento feitas pelo gerente da loja devem ser raras e pouco frequentes. Edições frequentes sugerem a necessidade de revisar a política de remuneração/hora com o gerente da loja para garantir que os funcionários sejam pagos por todas as horas trabalhadas.
