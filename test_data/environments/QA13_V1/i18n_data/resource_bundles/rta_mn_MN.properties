1406273938=Онооны хуваарь
1406273939=Дэлгүүрийн менежерийн гаргасан хуваарь санал болгож буй хуваарьтай хэр зэрэг нийцэж байгааг харуулж байна. Дэлгүүрийн менежер бүр өөрийн дэлгүүрийн хэрэгцээг хамгийн сайн хангасан хуваарийг гаргах ёстой тул дэлгүүрийн менежерийн гаргасан хуваарь нь санал болгож буй хуваарьтай үргэлж нийцэхгүй байж болно.
1406273940=Энэ нь Дэлгүүрийн менежерт засвар хийх шаардлагатай бүрэн бус ээлжийн тоог илэрхийлдэг (жишээ нь, ажилтан ээлжийн төгсгөлд орох/гарах цаг хийхгүй байх). Эдгээр цохилтыг цаг тухайд нь засдаггүй дэлгүүрийн менежерүүд долоо хоногийн цалингийн талаар мэдээлэх болно. Дэлгүүрийн менежерүүд эдгээр цоолтуурын засварлаж, дуусгах хүртэл цалингийн жагсаалтыг гаргах боломжгүй.
1406273941=Энэ нь хоолны завсарлага авах шаардлага хангасан, гэхдээ хоолны цагийн цохилтыг тэмдэглээгүй ажлын ээлжийн тоог илэрхийлнэ. Бодлого болон холбогдох хуулийг ойлгож байгаа эсэхийг нь баталгаажуулахын тулд Дэлгүүрийн менежерүүдтэй хоолны үеийн бодлогыг хянана уу.
1406273942=Дэлгүүрийн менежерийн гаргасан хуваарьтай нийцэхгүй байгаа цагийн цохилтуудын тоо юм. Үүнд: эрт/хожуу орох, эрт/хожоо гарах, хуваарийн бус ээлж, хуваарьгүй тасалдах зэрэг орно. Эдгээр нөхцөл байдал нь Дэлгүүрийн менежерүүдийн хариуцлагыг хариуцдаг боловч компанийн бодлогыг хэрэгжүүлэхэд Дэлгүүрийн менежерийн гүйцэтгэх үүргийн талаар зааварчлах шаардлагатай байгааг харуулж буй чиг хандлагыг илрүүлж болно.
1406273943=Менежерийн засварууд
1406273944=Дэлгүүрийн менежер засварласан эсвэл гараар тэмдэглэсэн ажилчдын цагийн цохилтууд юм. Дэлгүүрийн менежерийн цалингийн өөрчлөлт нь цөөн бөгөөд ховор байх ёстой. Байнгын засварууд нь ажилчдад ажилласан бүх цагаар цалин хөлс авахын тулд Дэлгүүрийн менежертэй цалин/цагийн бодлогыг хянаж үзэх шаардлагатайг харуулж байна.
