1406273934=Хуульд өөрөөр заагаагүй бол ажилчдад ажлын цагийн хуваарьт 6 цагаас илүү буюу түүнтэй тэнцэх, харин өдөрт 8-аас доош цаг ажилласан тохиолдолд хамгийн багадаа 30 минутын цалингүй, тасралтгүй хооллох хугацаа (ихэвчлэн ажилтны ээлжийн дунд үе хүртэл) олгоно. хуваарийн дагуу 8 цаг буюу түүнээс дээш цагийн хуваарьт ээлжийн хувьд нэг цагийн цалингүй хооллох хугацааг (хамгийн багадаа 30 минут нь тасралтгүй байх ёстой) хангах ёстой. Дэлгүүрийн менежерүүд эсвэл гол тээвэрлэгчид (дэлгүүрийн менежер байхгүй тохиолдолд) хоолны цагийг тодорхойлно. Мужийн хууль тогтоомжоос ялгаатай тохиолдолд төрийн тусгай хуулийг дагаж мөрдөнө. Хэрэв тодорхой тохиолдолд хооллох хугацааны шаардлагын талаар асуулт байвал дүүргийн менежертэй холбоо барина уу.
1406273935=Ойролцоогоор ОТ
1406273936=ОТ-д ойртож байна
