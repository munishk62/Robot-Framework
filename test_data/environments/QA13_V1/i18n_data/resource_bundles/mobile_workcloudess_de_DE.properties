timeclock.help.break=Einige Organisationen bieten während der Arbeitszeit kurze Pausen an. Wenn dies konfiguriert ist, zeigt Ihre Stempelkarte den Beginn und das Ende der Pause an, um die Einhaltung und Zeiterfassung sicherzustellen. Zum Beginn einer Pause tippen und halten Sie die Schaltfläche „Pause einlegen“. Zum Beenden der Pause schieben Sie den Schieberegler „Pause beenden“ von links nach rechts.
timeclock.help.break_periods=Pausenzeiträume werden durch Drücken und Halten erfasst
timeclock.help.clock_in1=Sie können bis zu 8 Minuten vor Ihrer geplanten Schicht einstempeln.
timeclock.help.clock_in2=Um sich anzumelden, halten Sie den Schieberegler gedrückt und ziehen Sie ihn über den Bildschirm, um Ihren Stempel zu erfassen.
timeclock.help.clock_in_new=Einfaches Einstempeln durch Wischen – zum Einstempeln den Schieberegler „Einstempeln“ von links nach rechts schieben. Nach dem Einstempeln erhält der Benutzer sofort Zugriff auf den Zeiterfassungsstatus, die insgesamt vergangene Zeit sowie eine Zeitleiste mit bevorstehenden Aufgaben und Transaktionen. Außerhalb des konfigurierten Zeitfensters, das von Ihrer Organisation festgelegt wurde, ist das Einstempeln nicht möglich.
timeclock.help.clock_out=Wenn Sie Ihre Schicht abgeschlossen haben, erscheint ein Schieberegler zur Abmeldung. Halten Sie den Schieberegler gedrückt und ziehen Sie ihn, um Ihre Abmeldung zur erfassen.
timeclock.help.clock_out_early=Wenn Sie sich vor Schichtende ausstempeln müssen, können Sie diese Taste lange gedrückt halten, wenn Sie nicht eingeplant sind.
timeclock.help.clock_out_early_new=Um frühzeitig auszustempeln, ist der Schieberegler nicht verfügbar. Stattdessen müssen Benutzer die Schaltfläche „Ausstempeln“ gedrückt halten, um ihren Stempelvorgang erfolgreich zu erfassen.
timeclock.help.clock_out_new=Einfaches Ausstempeln durch Wischen – zum Ausstempeln den Schieberegler „Ausstempeln“ von links nach rechts schieben. Das Ausstempeln dient dazu, das Ende Ihrer Arbeitszeit genau zu erfassen und Ihre Anwesenheitsdaten zu aktualisieren.
timeclock.help.incorrect_punch=Wenn Sie einen Zeitstempel auf einer Karte korrigieren müssen, müssen Sie Ihrer Führungskraft eine Stempelkartenkorrektur vorlegen.
timeclock.help.meal=Erfassen Sie Start- und Endzeiten der Essenspause, um die Einhaltung von Vorschriften und Zeiterfassung sicherzustellen. Um eine Essenspause zu beginnen, tippen und halten Sie die Schaltfläche „Essen“. Zum Beenden der Essenspause schieben Sie den Schieberegler „Ende der Mahlzeit“ von links nach rechts.
timeclock.help.missing_incorrect_punches=Bei versäumten Zeiterfassungen oder falschen Zeitangaben ist es wichtig zu wissen, dass es ein Menü „Überschreiben durch Manager“ gibt, das für die Korrektur solcher Fälle vorgesehen ist. Dieses Menü ist für Ihren Vorgesetzten zugänglich, der Ihnen bei der Behebung von Abweichungen helfen kann. Bitte kommunizieren Sie mit Ihrem Vorgesetzten, um diese Funktion effektiv zu nutzen.
timeclock.help.missing_punches=Wenn Sie Zeiterfassungen vergessen haben und eine andere Funktion eingeben müssen, wenden Sie sich an Ihre Führungskraft, damit sie Ihre Stempelsequenz überschreibt.
timeclock.help.switch_stores=Falls Sie sich in der Nähe mehrerer Stores/Standorte befinden, haben Sie die Möglichkeit, zwischen diesen zu wechseln. Klicken Sie dazu einfach auf „Stores wechseln“ und wählen Sie den für Ihre Bedürfnisse passenden Standort aus.
