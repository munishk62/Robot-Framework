timeclock.help.clock_in_v2=Das Einstempeln ist einfach – tippen Sie einfach auf die Schaltfläche „Einstempeln“. Nach dem Einstempeln sehen Sie sofort Ihren Einstempelstatus, die insgesamt vergangene Zeit und eine Zeitleiste mit bevorstehenden Aufgaben und Transaktionen. Bitte beachten Sie: Das Einstempeln ist nur innerhalb des von Ihrer Organisation festgelegten Zeitfensters möglich.(g)
timeclock.help.clock_out_v2=Stempeln Sie am Ende Ihrer Arbeitszeit einfach aus, indem Sie auf die Schaltfläche „Ausstempeln“ tippen. So können Sie das Ende Ihrer Schicht genau erfassen und Ihre Anwesenheitsdaten aktuell halten.(g)
timeclock.help.clock_out_early_v2=Um frühzeitig auszustempeln, müssen Benutzer auf die Schaltfläche „Ausstempeln“ tippen, um ihren Stempelvorgang erfolgreich zu erfassen. Eine Bestätigungsaufforderung wird angezeigt, um sicherzustellen, dass die Transaktion abgeschlossen wird.(g)
timeclock.help.meal_v2=Um die Einhaltung von Vorschriften und die genaue Zeiterfassung zu fördern, ist es wichtig, sowohl den Beginn als auch das Ende Ihrer Essenspausen zu erfassen. Tippen Sie auf die Schaltfläche „Essen“, um Ihre Essenspause zu beginnen. Wenn Ihre Essenspause vorbei ist, beenden Sie sie, indem Sie auf die Schaltfläche „Ende der Mahlzeit“ tippen.(g)
timeclock.help.break_v2=Einige Organisationen bieten während der Arbeitszeit kurze Pausen an. Wenn dies konfiguriert ist, zeigt Ihre Stempelkarte die Start- und Endzeiten der Pause an, um die Einhaltung und Zeiterfassung sicherzustellen. Tippen Sie auf die Schaltfläche „Pause einlegen“, um eine Pause zu beginnen. Wenn Sie bereit sind, wieder an die Arbeit zu gehen, tippen Sie auf die Schaltfläche „Pause beenden“.(g)
