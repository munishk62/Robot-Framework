timeclock.help.troubleshooting_tips=Falls Sie die Schieberegler-Optionen nicht sehen können, versuchen Sie, die Zeiterfassungsseite zu aktualisieren, indem Sie das Symbol „Aktualisieren“ anklicken oder auf der Seite nach oben scrollen, um die Schaltflächen anzuzeigen.
timeclock.help.view_punchcard=Um Ihre Arbeitsstunden zu verfolgen und zu analysieren, sehen Sie die gesamte Schichtzeit sowie eine detaillierte Zeitleiste der Zeiterfassungen, inklusive Zeiten und Warnungen. So können Arbeitsmuster identifiziert und Abweichungen umgehend aufgezeigt werden. Tippen Sie auf das Symbol „Mehr“ (3 Punkte) in der oberen rechten Ecke und anschließend auf „Stempelkarte ansehen“, sobald Sie erfolgreich eingestempelt sind.
