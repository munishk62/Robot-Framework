1406273933=用餐政策
1406273934=除非法律另有规定，对于一天内排班工时大于或等于 6 小时但小于 8 小时的班次，必须为员工提供至少一次 30 分钟的无薪不间断用餐时段（通常在员工班次的中间时段）；对于排班工时等于或大于 8 小时的班次，必须提供一小时的无薪用餐时段（其中至少 30 分钟必须不间断）。门店经理或钥匙持有人（在门店经理缺席的情况下）决定用餐时段的时间。如果州法律的规定不同，则应遵守特定的州法律。如果对特定情况下的用餐时段要求有任何疑问，请联系区域经理。
1406273935=临近加班
