1406273937=如果员工的本周迄今已工作时数与剩余排班时数之和将导致加班，则计算其加班时数。
1406273938=排班评分
1406273939=表明门店经理创建的排班与建议排班的一致程度。门店经理创建的排班可能不总会与建议的排班一致，因为每位门店经理都必须创建最能满足其门店需求的排班。
1406273940=表示需要门店经理编辑的不完整班次数（例如，员工未能完成上下班打卡）。门店经理若未及时编辑这些打卡记录，将导致当周薪资少报。在这些打卡记录被编辑并完成之前，门店经理将无法发放薪资。
1406273941=表示符合用餐休息条件但未记录用餐时间打卡的已工作班次数量。与门店经理一起审查用餐时段政策，以确保他们理解该政策和适用法律。
1406273942=是指与门店经理创建的排班不符的打卡次数。其中包括提早/延迟上班打卡、提早/延迟下班打卡、计划外班次和无故缺勤。这些情况由门店经理负责管理，但也可能揭示出一些趋势，表明需要就其在执行公司政策方面的职责对门店经理进行指导。
1406273943=经理编辑
1406273944=指由门店经理编辑或手动记录的员工打卡记录。门店经理进行的薪资修改应为数不多且不频繁。频繁的编辑表明需要与门店经理一起审查工资/工时政策，以确保员工所有工时均得到支付。
