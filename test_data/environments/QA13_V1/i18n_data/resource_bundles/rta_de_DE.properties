1406273933=Richtlinien zur Essenspause
1406273934=Sofern nicht anderweitig gesetzlich vorgeschrieben, erhalten Mitarbeiter mindestens eine unbezahlte, ununterbrochene Essenspause von 30 Minuten (in der Regel in der Mitte der Schicht eines Mitarbeiters) für Schichten, die länger als 6 planmäßige Stunden, aber weniger als 8 Stunden pro Tag dauern. Für Schichten von mindestens 8 Stunden muss eine unbezahlte Essenspause von einer Stunde (davon müssen mindestens 30 Minuten ununterbrochen sein) eingeräumt werden. Standortmanager oder Schlüsselträger (in Abwesenheit des Standortmanagers) bestimmen die Zeit der Essenspause. Bei abweichenden regionalen Gesetzen gelten die spezifischen regionalen Gesetze. Wenn Sie Fragen zu den Anforderungen an die Essenspause in einem bestimmten Fall haben, wenden Sie sich an den Bezirksmanager.
1406273935=Kurz vor Überstunden
1406273936=Kurz vor Überstunden
1406273937=berechnet die Überstunden für einen Mitarbeiter, wenn die Arbeitsstunden seit Wochenbeginn + die verbleibenden geplanten Stunden zu Überstunden führen.
1406273938=Einsatzplanergebnis
1406273939=gibt an, wie gut der vom Standortmanager erstellte Einsatzplan mit dem vorgeschlagenen Einsatzplan übereinstimmt. Der vom Standortmanager erstellte Einsatzplan stimmt möglicherweise nicht immer mit dem vorgeschlagenen Einsatzplan überein, da jeder Standortmanager einen Einsatzplan erstellen muss, der den Anforderungen seines Standorts am besten entspricht.
1406273940=gibt die Anzahl der unvollständigen Schichten an, die vom Standortmanager bearbeitet werden müssen (z. B. Mitarbeiter stempelt sich am Schichtende nicht aus). Standortmanager, die diese Zeitstempel nicht rechtzeitig bearbeiten, geben nicht die richtige Zeit für die Gehaltsabrechnung für die aktuelle Woche an. Standortmanager können die Gehaltsabrechnung erst freigeben, wenn diese Zeitstempel bearbeitet und abgeschlossen wurden.
1406273941=gibt die Anzahl der gearbeiteten Schichten an, für die eine Essenspause erforderlich ist, für die aber keine Stempelvorgänge für die Essenspause erfasst wurden. Besprechen Sie die Richtlinien für die Essenspause mit den Standortmanagern, damit sie die Richtlinien und das geltende Recht verstehen.
1406273942=sind die Anzahl der Zeitstempel, die nicht mit dem vom Standortmanager erstellten Einsatzplan übereinstimmen. Dazu gehören frühes/spätes Einstempeln, frühes/spätes Ausstempeln, außerplanmäßige Schicht und außerplanmäßige Abwesenheit. Diese Situationen muss der Standortmanager verwalten, sie können jedoch Trends aufzeigen, die darauf hindeuten, dass der Standortmanager hinsichtlich seiner Rolle bei der Durchsetzung der Unternehmensrichtlinien gecoacht werden muss.
1406273943=Bearbeitung durch den Manager
1406273944=sind Zeitstempel für Mitarbeiter, die vom Standortmanager bearbeitet oder manuell aufgezeichnet wurden. Gehaltsabrechnungen sollten durch den Standortmanager nur minimal und selten geändert werden. Häufige Änderungen deuten darauf hin, dass die Stundenlohnrichtlinie mit dem Standortmanager überprüft werden muss, um sicherzustellen, dass die Mitarbeiter für alle geleisteten Stunden bezahlt werden.
