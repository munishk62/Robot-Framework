rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.example=La expresión sería de la forma [SCHDEVENT]. [Store Open]. [WantsAfterDays (a)] donde como a es un número de día. Si a es un número positivo, entonces se considera como después de días, por ejemplo [SCHDEVENT]. [ Store Open]. [OccurAfterDays (1)]: esta expresión devuelve verdadero si el evento Store Open ocurre al día siguiente. Mientras que el número negativo representa antes de los días. Por ejemplo, [SCHDEVENT]. [Store Open]. [WantsAfterDays (-1)]: esta expresión devuelve verdadero si el evento Store Open ocurre el día anterior.
