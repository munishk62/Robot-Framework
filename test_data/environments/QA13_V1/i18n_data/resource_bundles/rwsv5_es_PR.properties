rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.description=Devuelve la suma de la duración del evento en minutos para todos los días de una semana.
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.example=La tienda tiene un evento programado con una duración de 1 hora que ocurre todos los días de una semana. Luego, la expresión devolverá 420 como resultado del método de cálculo.
