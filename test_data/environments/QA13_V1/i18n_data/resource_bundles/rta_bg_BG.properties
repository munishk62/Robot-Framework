1406273933=Политика за хранене
1406273934=Освен ако не се изисква друго от закона, на служителите се дава минимум един 30-минутен неплатен период на хранене без прекъсване (обикновено към средата на смяната на служителя) за смени, по-големи или равни на 6 планирани часа, но по-малко от 8 часа работа на ден и за планирани смени, равни или по-големи от 8 часа, трябва да се осигури един час неплатен период на хранене (най-малко 30 минути от които трябва да бъдат непрекъснати). Мениджърите на магазините или ключовите превозвачи (в отсъствието на управителя на магазина) определят времето на периода на хранене. Когато държавните закони се различават от тях, ще се следва специфичен държавен закон. Ако има някакви въпроси относно изискванията за периода на хранене в конкретен случай, свържете се с дистриктния мениджър.
1406273935=прибл. OT
1406273936=Наближава OT
1406273937=изчислява часове OT за служител, ако отработените часове WTD + останалите планирани часове ще доведат до OT.
1406273938=График Резултат
1406273939=показва доколко създаденият от Store Manager график съответства на предложения график. Графикът, създаден от мениджъра на магазина, може да не винаги съответства на предложения график, тъй като всеки мениджър на магазин трябва да създаде график, който най-добре отговаря на нуждите на неговия/нейния магазин.
1406273940=обозначава броя непълни смени, изискващи редактиране от Store Manager (напр. служител не успява да влезе/напусне в края на смяната). Мениджърите на магазини, които не редактират тези удари навреме, ще докладват текущата работна седмица. Мениджърите на магазини няма да могат да публикуват ведомости за заплати, докато тези удари не бъдат редактирани и завършени.
1406273941=обозначава броя на отработените смени, които отговарят на изискванията за почивка за хранене, но за които не са записани удари във времето за хранене. Прегледайте политиката за периода на хранене с мениджърите на магазина, за да сте сигурни, че разбират политиката и приложимото законодателство.
1406273942=са броя на ударите във времето, които не съответстват на графика, създаден от мениджъра на магазина. Те включват ранно/късно влизане, ранно/късно излизане, непланирана смяна и непланирано отсъствие. Тези ситуации са отговорност за управлението на мениджърите на магазини, но може да разкрият тенденции, които предполагат необходимостта от обучение на мениджъра на магазина относно неговата/нейната роля в прилагането на фирмената политика.
1406273943=Редакции на мениджъра
1406273944=са кадри за време на служител, които са били редактирани или записани ръчно от мениджъра на магазина. Промените на заплатите от управителя на магазина трябва да са малко и редки. Честите редакции предполагат необходимостта от преглед на политиката за заплати/часове с мениджъра на магазина, за да се гарантира, че служителите получават заплащане за всички отработени часове.
