1406273933=Dasar Makanan
1406273934=Melainkan sebaliknya dikehendaki oleh undang-undang, pekerja diberi sekurang-kurangnya satu 30 minit tanpa gaji, tempoh makan tanpa gangguan (biasanya menjelang pertengahan syif pekerja) untuk syif yang lebih daripada atau sama dengan 6 jam yang dijadualkan tetapi kurang daripada 8 jam bekerja dalam sehari dan untuk syif berjadual bersamaan atau lebih daripada 8 jam, tempoh makan satu jam tanpa gaji (sekurang-kurangnya 30 minit daripadanya mesti tanpa gangguan) mesti disediakan. Pengurus kedai atau pembawa utama (jika tiada pengurus kedai) menentukan masa tempoh makan. Di mana undang-undang negeri berbeza, undang-undang negeri tertentu akan diikuti. Jika terdapat sebarang soalan mengenai keperluan tempoh makan dalam kes tertentu, hubungi pengurus daerah.
1406273935=Appr. OT
1406273936=Mendekati OT
1406273937=mengira jam OT untuk pekerja jika jam bekerja WTD + baki jam yang dijadualkan akan menghasilkan OT.
1406273938=Skor Jadual
1406273939=menunjukkan sejauh mana jadual yang dibuat oleh Pengurus Kedai sejajar dengan jadual yang dicadangkan. Jadual yang dibuat oleh Pengurus Kedai mungkin tidak sentiasa sejajar dengan jadual yang dicadangkan, kerana setiap Pengurus Kedai mesti membuat jadual yang paling sesuai dengan keperluan kedainya.
1406273940=menandakan bilangan syif tidak lengkap yang memerlukan pengeditan Pengurus Stor (cth pekerja gagal masuk/keluar pada penghujung syif). Pengurus Kedai yang tidak mengedit pukulan ini tepat pada masanya akan melaporkan senarai gaji minggu semasa. Pengurus Kedai tidak akan dapat mengeluarkan senarai gaji sehingga pukulan ini diedit dan selesai.
1406273941=menunjukkan bilangan syif bekerja yang layak untuk rehat makan, tetapi pukulan masa makan tidak direkodkan. Semak dasar tempoh makan dengan Pengurus Kedai untuk memastikan bahawa mereka memahami dasar dan undang-undang yang berkenaan.
1406273942=adalah kiraan pukulan masa yang tidak sejajar dengan jadual yang dibuat oleh Pengurus Stor. Ini termasuk jam masuk awal/lewat, jam keluar awal/lewat, syif tidak berjadual dan ketidakhadiran tidak berjadual. Situasi ini adalah tanggungjawab Pengurus Stor untuk mengurus, tetapi mungkin mendedahkan arah aliran yang mencadangkan keperluan untuk melatih Pengurus Stor berkenaan peranannya dalam menguatkuasakan dasar syarikat.
1406273943=Suntingan Pengurus
1406273944=ialah pukulan masa pekerja yang telah diedit atau direkodkan secara manual oleh Pengurus Stor. Pengubahsuaian gaji oleh Pengurus Kedai hendaklah sedikit dan jarang berlaku. Pengeditan yang kerap mencadangkan keperluan untuk menyemak dasar gaji/jam dengan Pengurus Stor untuk memastikan pekerja dibayar untuk semua jam bekerja.
