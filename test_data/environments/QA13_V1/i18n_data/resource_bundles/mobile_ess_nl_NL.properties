1000000003769=Ik bevestig dat ik vrijwillig bereid ben om in de geselecteerde dienst te werken.  Ik begrijp dat als ik door het management wordt gevraagd of aangemoedigd om vrijwillig mijn planning te wijzigen, of vrijwillig deze dienst op te pakken, dit niets verandert aan het feit dat ik kan weigeren mijn planning te wijzigen of de geselecteerde dienst op te pakken. Daarnaast zal er geen negatieve actie tegen mij worden ondernomen als gevolg van mijn keuze.  Als ik vrijwillig akkoord ga met het oppakken van een dienst, begrijp ik dat ik verantwoordelijk kan worden gehouden als ik niet werk in de geselecteerde dienst volgens de planning op basis van de aanwezigheidsrichtlijnen.
