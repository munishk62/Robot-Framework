1000000003769=Potwierdzam, że dobrowolnie wyrażam zgodę na pracę na wybranej zmianie. Rozumiem, że proszenie lub zachęcanie przez kierownictwo do dobrowolnej zmiany mojego grafiku lub dobrowolnego objęcia tej zmiany nie zmienia faktu, że mogę odmówić zmiany grafiku lub objęcia wybranej zmiany i że nie zostaną podjęte wobec mnie żadne niekorzystne działania z powodu takiego wyboru. Jeśli dobrowolnie zgodzę się pracować na zmianie, rozumiem, że mogę zostać pociągnięty(-a) do odpowiedzialności za nieprzepracowanie wybranej zmiany zgodnie z grafiku w oparciu o wytyczne dotyczące obecności.
