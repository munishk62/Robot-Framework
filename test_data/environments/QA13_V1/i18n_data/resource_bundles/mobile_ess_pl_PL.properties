1000000003196=Witaj w AIDA. Mam na imię Susan i jestem Twoją wirtualną asystentką.
1000000003197=Jak używać interfejsu:
1000000003198=– Wprowadź wiadomość w polu wiadomości i naciśnij ikonę „Wyślij” w polu wiadomości.
1000000003199=– Użyj ikony „Więcej opcji”, aby uzyskać dostęp do kreatora wiadomości.
1000000003200=– Możesz również nacisnąć ikonę mikrofonu, aby porozmawiać z Susan, np. „jaki jest mój plan na dziś?”. Po kliknięciu przycisk mikrofonu zmieni się w animowaną ikonę, aby wskazać, że nagrywanie jest włączone. Po zakończeniu mówienia naciśnij ponownie ikonę mikrofonu, aby zatrzymać nagrywanie.
