1406273934=Если иное не предусмотрено законом, сотрудникам предоставляется как минимум один 30-минутный неоплачиваемый непрерывный перерыв на прием пищи (обычно ближе к середине смены сотрудника) для смен, которые больше или равны 6 запланированным часам, но меньше 8 часов, отработанных в день, а для запланированных смен, которые больше или равны 8 часам, должен быть предоставлен один час неоплачиваемого перерыва на прием пищи (не менее 30 минут из которых должны быть непрерывными). Менеджеры магазинов или ключевые носители (в отсутствие менеджера магазина) определяют время перерыва на прием пищи. В случаях, когда закон штата отличается от закона, будет применяться конкретный закон штата. Если есть какие-либо вопросы относительно требований к перерыву на прием пищи в конкретном случае, обратитесь к менеджеру округа.
1406273935=Приблизительно OT
1406273936=Приближаемся к ОТ
1406273937=рассчитывает часы ОТ для сотрудника, если отработанные часы WTD + оставшиеся запланированные часы дадут ОТ.
1406273938=Расписание Оценка
1406273939=показывает, насколько хорошо созданный менеджером магазина график соответствует предлагаемому графику. График, созданный менеджером магазина, может не всегда соответствовать предлагаемому графику, поскольку каждый менеджер магазина должен создать график, который наилучшим образом соответствует потребностям его/ее магазина.
1406273940=обозначает количество незавершенных смен, требующих редактирования менеджером магазина (например, сотрудник не регистрирует приход/уход в конце смены). Менеджеры магазинов, которые не редактируют эти отметки вовремя, будут занижать заработную плату за текущую неделю. Менеджеры магазинов не смогут выдать заработную плату, пока эти отметки не будут отредактированы и заполнены.
1406273941=обозначает количество отработанных смен, которые имели право на обеденный перерыв, но для которых не были зарегистрированы отметки о времени приема пищи. Изучите политику перерыва на прием пищи с менеджерами магазинов, чтобы убедиться, что они понимают политику и применимое законодательство.
1406273942=это количество отметок времени, которые не соответствуют графику, созданному менеджером магазина. К ним относятся ранний/поздний приход, ранний/поздний уход, незапланированная смена и незапланированное отсутствие. Эти ситуации входят в сферу ответственности менеджера магазина, но могут выявить тенденции, которые указывают на необходимость обучения менеджера магазина относительно его/ее роли в обеспечении соблюдения политики компании.
1406273943=Редактирование менеджера
1406273944=являются отметками рабочего времени сотрудников, которые были отредактированы или вручную записаны менеджером магазина. Изменения в расчете заработной платы менеджером магазина должны быть редкими и нечастыми. Частые правки указывают на необходимость пересмотра политики заработной платы/часов с менеджером магазина, чтобы гарантировать, что сотрудники получают оплату за все отработанные часы.
1406273945=Система повторно обрабатывает накопленный баланс. Пожалуйста, подождите немного.
