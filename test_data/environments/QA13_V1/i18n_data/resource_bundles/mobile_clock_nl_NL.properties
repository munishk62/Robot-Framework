1000000000636=Voltooien en doorgaan
1000000000637=Door locatieservices op het apparaat in te schakelen, kan het apparaat zijn locatie volgen, zodat kloktransacties correct worden geregistreerd op de juiste locatie. Deze functie is essentieel voor het opnemen van ponstijden met geofencing, zodat u zeker weet dat tijdsinvoeren binnen de aangewezen grenzen van de locatie worden gedaan, terwijl het apparaat handig op de hele locatie wordt gebruikt.
1000000000638=Bevestiging algemene voorwaarden
1000000000639=Aangezien er geen locatieservices worden gebruikt voor dit klokregistratieproces, dient u de algemene voorwaarden te lezen en te accepteren.
1000000000640=Tijdens het klokregistratieproces erkent de locatie de verantwoordelijkheid om ervoor te zorgen dat alle ponstijden worden geregistreerd in het gebouw van de geregistreerde locatie. Het apparaat moet stevig aan de muur worden bevestigd op de daarvoor bestemde locatie om ponstijden buiten de locatie te voorkomen. De locatie begrijpt welke zorgvuldigheid vereist is als gevolg van de afwezigheid van geofencing-mogelijkheden en erkent deze verantwoordelijkheden om verder te gaan.
