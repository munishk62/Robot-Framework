rosom.calMethod.exprBuilder.engineSpecific.taskDate.description=Retourne uniquement la valeur de date de l’intervalle de temps d’entrée au format aaaaMMjj
rosom.calMethod.exprBuilder.engineSpecific.taskDate.example=Si la date de l’intervalle de tâches est le 01 janvier 2020. Elle sera évaluée selon la valeur de date d’intervalle de renvoi au format aaaaMMjj – 20200101.
rosom.calMethod.exprBuilder.engineSpecific.taskTime.description=Renvoie seulement un intervalle de temps entré en minutes
rosom.calMethod.exprBuilder.engineSpecific.taskTime.example=Si l’heure de l’intervalle de tâches est 9 h. Cette valeur sera évaluée pour renvoyer la valeur de l’intervalle en minutes - 540.
rosom.calMethod.exprBuilder.scheduledEvent.attribute=Tout événement programmé. Par exemple, ouverture du magasin
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.description=Retourne la durée de l’événement en minutes pour un jour d’une semaine pour lequel il est évalué.
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.example=Le magasin a un événement programmé d’une durée de 1 heure qui se produit le jour de son évaluation. L’expression retourne alors 60 comme résultat de la méthode de calcul.
rosom.calMethod.exprBuilder.scheduledEvent.endTime.description=Heure de fin, durée d’un événement programmé en minutes
rosom.calMethod.exprBuilder.scheduledEvent.endTime.example=Un événement commençant à 9 h est programmé dans le magasin pour une durée de 9 heures. L’événement prend donc fin à 18 h, l’expression retournera 1080 comme résultat de la méthode de calcul.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.description=Vérifie si un événement programmé aura lieu le nombre de jours avant ou après la journée de semaine pour laquelle il est évalué.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.example=L’expression aurait la forme [SCHDEVENT]. [Store Open]. [occursAfterDays(a)] où a est un numéro de jour. Si a est un nombre positif, l’expression est considérée comme indiquant des jours postérieurs. Par exemple [SCHDEVENT]. [Store Open]. [occursAfterDays (1)] – Cette expression retourne vrai si l’événement Store Open a lieu le lendemain. Un nombre négatif représente des jours antérieurs. Par exemple [SCHDEVENT]. [Store Open]. [occursAfterDays(-1)] – Cette expression retourne vrai si l’événement Store Open a lieu la veille.
rosom.calMethod.exprBuilder.scheduledEvent.startTime.description=Heure de début, durée d’un événement programmé en minutes
rosom.calMethod.exprBuilder.scheduledEvent.startTime.example=Le magasin a un événement planifié dont l’heure de début est 9 h. L’expression retourne alors 540 comme sortie de la méthode de calcul.
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.description=Retourne la somme de la durée de l’événement en minutes pour tous les jours d’une semaine
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.example=Le magasin a un événement planifié d’une durée de 1 heure qui se produit tous les jours de la semaine. L’expression retourne alors 420 comme résultat de la méthode de calcul.
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.description=Nombre d’occurrences d’un événement planifié dans une semaine
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.example=Le magasin a un événement planifié qui est applicable pour tous les jours de la semaine. Ensuite, l’expression retournera 7 comme résultat de la méthode de calcul.
