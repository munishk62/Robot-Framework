1406273933=Политика оброка
1406273934=Осим ако законом није другачије прописано, запосленима се даје најмање један неплаћени, непрекидан оброк од 30 минута (обично до средине смене запосленог) за смене веће или једнаке 6 заказаних сати, али мање од 8 сати рада у дану и за заказане смене једнаке или дуже од 8 сати, мора се обезбедити један сат неплаћеног оброка (од којих најмање 30 минута мора бити непрекидно). Менаџери продавнице или носиоци кључева (у одсуству менаџера продавнице) одређују време периода оброка. Тамо где се државни закон разликује, следиће се посебан државни закон. Ако имате било каквих питања у вези са захтевима за период оброка у одређеном случају, обратите се управнику округа.
1406273935=Аппр. ОТ
1406273936=Приближава се ОТ
1406273937=израчунава сате ОТ за запосленог ако радни сати ВТД + преостали заказани сати резултираће ОТ.
1406273938=Сцхедуле Сцоре
1406273939=показује колико је добро креирани распоред менаџера продавнице усклађен са предложеним распоредом. Распоред који је направио менаџер продавнице можда није увек у складу са предложеним распоредом, јер сваки менаџер продавнице мора да креира распоред који најбоље одговара потребама његове/њене продавнице.
1406273940=означава број непотпуних смена које захтевају уређивање менаџера продавнице (нпр. запослени не успева да уђе/одјави на крају смене). Менаџери продавница који не уређују ове ударце на време ће пријавити платни списак текуће недеље. Менаџери продавница неће моћи да издају платни списак док се ови ударци не уређују и заврше.
1406273941=означава број одрађених смена које су се квалификовале за паузу за оброк, али за које нису евидентирани пунци времена за оброк. Прегледајте политику периода оброка са менаџерима продавница да бисте били сигурни да разумеју политику и важећи закон.
1406273942=су бројеви временских удараца који нису у складу са распоредом који је креирао менаџер продавнице. То укључује рани/касни долазак, рани/касни излаз, непланирана смена и непланирано одсуство. Ове ситуације су одговорност менаџера продавнице за управљање, али могу открити трендове који указују на потребу за обуком менаџера продавнице у вези са његовом/њеном улогом у спровођењу политике компаније.
1406273943=Менаџер измене
1406273944=су ударци времена запослених које је уредио или ручно снимио менаџер продавнице. Измене платног списка од стране менаџера продавнице треба да буду ретке и ретке. Честе измене указују на потребу да се прегледа политика плата/сат са менаџером продавнице како би се осигурало да запослени буду плаћени за све одрађене сате.
1406273945=Систем поново обрађује обрачунско стање. Молимо сачекајте неко време.
