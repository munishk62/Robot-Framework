rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.example=Store има планирано събитие с продължителност 1 час, което се случва в деня, за който се оценява. Тогава изразът ще върне 60 като изход от метода на изчисление.
rosom.calMethod.exprBuilder.scheduledEvent.endTime.description=Продължителност на крайното време на планирано събитие в минути
rosom.calMethod.exprBuilder.scheduledEvent.endTime.example=Магазинът има насрочено събитие с начален час от 9:00 и продължителност от 9 часа. Така събитието завършва в 18 ч. Тогава изразът ще върне 1080 като изход от метода на изчисление.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.description=Проверява дали планираното събитие ще се случи броят дни преди или след деня в седмицата, за който се оценява.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.example=Изразът ще бъде във формата [SCHDEVENT]. [Store Open]. [ZgodiAfterDays (a)], където като a е числото на деня. Ако a е положително число, тогава се счита за след дни, например [SCHDEVENT]. [ Store Open]. [ВъзникваAfterDays (1)] - Този израз връща true, ако събитието Open Store се случи на следващия ден. Докато отрицателното число представлява преди дни. Например [SCHDEVENT]. [Store Open]. [ZgodiAfterDays (-1)] - Този израз връща true, ако събитие Open Store се случи в предходния ден.
rosom.calMethod.exprBuilder.scheduledEvent.startTime.description=Продължителност на началното време на планирано събитие в минути
rosom.calMethod.exprBuilder.scheduledEvent.startTime.example=Store има насрочено събитие с начален час като 9 ч. След това изразът ще върне 540 като изход от метода на изчисление.
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.description=Връща сумата от продължителността на събитието в минути за всички дни в седмицата
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.example=Store има планирано събитие с продължителност 1 час, което се случва през всички дни в седмицата. Тогава изразът ще върне 420 като изход от метода на изчисление.
