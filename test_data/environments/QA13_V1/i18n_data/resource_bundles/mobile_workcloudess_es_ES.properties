timeclock.help.clock_in_v2=Fichar al entrar es fácil: simplemente pulse el botón "Registro de horas de entrada". Una vez fichado, verá al instante su estado de registro de entrada, el tiempo total transcurrido y una cronología de las próximas tareas y transacciones. Tenga en cuenta: solo puede fichar la entrada dentro del intervalo de tiempo designado por su organización.(g)
timeclock.help.clock_out_v2=Fiche fácilmente la salida al final de su jornada de trabajo pulsando el botón "Registro de horas de salida". Esto le ayuda a registrar con exactitud el final de su turno y mantener actualizados sus registros de asistencia.(g)
timeclock.help.clock_out_early_v2=Para registrar la salida antes de tiempo, los usuarios deben pulsar el botón "Registro de horas de salida" para registrar correctamente su fichaje. Aparecerá una indicación de confirmación para garantizar que la transacción se complete.(g)
timeclock.help.meal_v2=Para promover el cumplimiento y un control preciso de las horas trabajadas, es importante registrar tanto el inicio como el fin de sus pausas para comer. Para iniciar su pausa para comer, pulse el botón "Ir a comida". Cuando su pausa para comer termine, finalícela pulsando el botón "Finalizar comida".(g)
timeclock.help.break_v2=Algunas organizaciones ofrecen pequeños descansos durante la jornada de trabajo. Si está configurado, su tarjeta de tiempo mostrará las horas de inicio y fin de la pausa para garantizar el cumplimiento y el control de las horas trabajadas. Para iniciar una pausa, pulse el botón "Ir a pausa". Cuando esté listo para volver al trabajo, pulse el botón "Finalizar pausa".(g)
