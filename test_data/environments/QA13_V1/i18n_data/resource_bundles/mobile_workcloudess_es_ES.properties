timeclock.help.break=Algunas organizaciones ofrecen pequeños descansos durante la jornada de trabajo. Si se configura, su tarjeta de tiempo mostrará el inicio y el fin de la pausa para garantizar el cumplimiento y el control de las horas trabajadas. Para iniciar una pausa, mantenga pulsado el botón "Ir a pausa". Para finalizar la pausa, deslice el control deslizante "Finalizar pausa" de izquierda a derecha.
timeclock.help.break_periods=Los periodos de pausa se inician mediante una acción de mantener pulsado
timeclock.help.clock_in1=Puede registrar la entrada de su turno hasta 8 minutos antes del turno programado.
timeclock.help.clock_in2=Para registrar la hora de entrada, pulse y arrastre el control deslizante por la pantalla para añadir el registro de horas.
timeclock.help.clock_in_new=Fiche al entrar a trabajar fácilmente con un simple deslizamiento: para registrar la hora de entrada, deslice el control deslizante de registro de hora de entrada de izquierda a derecha. Una vez haya fichado, el usuario obtiene acceso instantáneo al estado de registro de entrada, el tiempo total transcurrido y una cronología de las próximas tareas y transacciones. No se permite el registro de entrada fuera del intervalo de tiempo configurado, que establece su organización.
timeclock.help.clock_out=Una vez que haya completado su turno, aparecerá un control deslizante de registro de salida. Pulse y arrastre el control deslizante para añadir el registro de horas.
timeclock.help.clock_out_early=Si necesita registrar la hora de salida antes del final de su turno, puede mantener pulsado este botón cuando no esté programado.
timeclock.help.clock_out_early_new=Al registrar una salida antes de tiempo, verá que el control deslizante no está disponible. En su lugar, los usuarios deberán mantener pulsado el botón de registro de hora de salida para registrar correctamente sus horas.
timeclock.help.clock_out_new=Fiche al salir de trabajar fácilmente con un simple deslizamiento: para registrar la hora de salida, deslice el control deslizante de registro de hora de salida de izquierda a derecha. Fiche a su salida para registrar con exactitud el final de su jornada de trabajo y actualizar los registros de asistencia.
timeclock.help.incorrect_punch=Si necesita corregir una marca de hora en un registro, deberá enviar una corrección de ficha de control a su responsable.
timeclock.help.meal=Registre las horas de inicio y fin de la comida para garantizar el cumplimiento y el control de las horas trabajadas. Para iniciar una pausa para comer, mantenga pulsado el botón "Ir a comida". Para finalizar la pausa para comer, deslice el control deslizante "Finalizar comida" de izquierda a derecha.
timeclock.help.missing_incorrect_punches=Para registros de horas no realizados o incorrectos, es importante saber que hay un menú "Anulación de responsable" diseñado para solucionar estos problemas. Su responsable puede acceder a este menú para ayudarle a corregir cualquier discrepancia. Avise a su responsable para aprovechar esta función de forma efectiva.
timeclock.help.missing_punches=Si ha omitido registros de horas y necesita introducir una función diferente, tendrá que ponerse en contacto con su responsable para anular la secuencia de registro de horas.
timeclock.help.switch_stores=En caso de que se encuentre cerca de varias tiendas o sitios, tiene la opción de cambiar entre ellos. Para ello, solo tiene que hacer clic en "Cambiar tiendas" y elegir la ubicación adecuada para sus necesidades.
