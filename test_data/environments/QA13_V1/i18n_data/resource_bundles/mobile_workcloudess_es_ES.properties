timeclock.help.troubleshooting_tips=Si no puede ver las opciones del control deslizante, intente actualizar la página de TimeClock pulsando los iconos "Actualizar" o "Desplazar hacia arriba" en la página para ver los botones.
timeclock.help.view_punchcard=Para realizar un seguimiento de las horas trabajadas y analizarlas, consulte el tiempo total del turno y una cronología detallada de los registros de horas, incluidos las horas y las advertencias. Esta opción ayuda a identificar patrones de trabajo y a abordar rápidamente las discrepancias. Toque el icono Más (3 puntos) de la esquina superior derecha y, luego, "Ver tarjeta de registro de horas", una vez que haya registrado la entrada correctamente.
