rosom.calMethod.exprBuilder.scheduledEvent.endTime.example=A Store ütemezett eseménye 9:00 órai kezdési idővel és 9 órás időtartammal rendelkezik. Tehát az esemény 18 órakor ér véget. Ezután az kifejezés 1080-ot ad vissza a számítási módszer kimeneteként.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.description=Ellenőrzi, hogy egy ütemezett esemény bekövetkezik-e az értékelt hét egy napjának előtti vagy utáni napok számában.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.example=A kifejezés [SCHDEVENT] formátumú lenne. [Store Open]. [ElőfordulAfterDays (a)] ahol a nap száma. Ha a pozitív szám, akkor a napok utáninak tekintjük, például [SCHDEVENT]. [ Store Open]. [TapahtuuAfterDays (1)] - Ez a kifejezés igaz, ha a Store Open esemény másnap következik be. Míg a negatív szám a napok előtt áll. Például [SCHDEVENT]. [Store Open]. [Előfordulási napok (-1)] - Ez a kifejezés igaz értéket ad vissza, ha a Store Open esemény az előző napon történt.
rosom.calMethod.exprBuilder.scheduledEvent.startTime.description=Az ütemezett esemény kezdési időtartama percekben
rosom.calMethod.exprBuilder.scheduledEvent.startTime.example=A Store ütemezett eseménye 9: 00-kor kezdődik. Ezután a kifejezés a számítási módszer kimeneteként 540-et ad vissza.
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.description=Visszaadja az esemény időtartamának összegét percekben, a hét minden napjára
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.example=A Store-nak van egy ütemezett eseménye, amelynek időtartama 1 óra, amely a hét minden napján bekövetkezik. Ezután a kifejezés 420-at ad vissza a számítási módszer kimeneteként.
