rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.example=A Store-nak van egy ütemezett eseménye, amelynek időtartama 1 óra, amely az értékelés napján következik be. Ezután a kifejezés 60-at ad vissza, mint a számítási módszer kimenetét.
