1406273934=Če zakon ne zahteva drugače, zaposleni dobijo najmanj en 30-minutni neplačan neprekinjen obrok (običajno proti sredini izmene zaposlenega) za izmene, ki so daljše ali enake 6 načrtovanim uram, vendar manj kot 8 delovnih ur na dan in za načrtovane izmene, ki so enake ali daljše od 8 ur, je treba zagotoviti enourni neplačani obrok (vsaj 30 minut mora biti neprekinjenega). Upravitelji ali nosilci ključev (v odsotnosti vodje) določijo čas obroka. Kjer se državna zakonodaja razlikuje od zakonodaje, se bo upoštevala posebna državna zakonodaja. Če imate kakršna koli vprašanja glede zahtev glede obdobja obrokov v posameznem primeru, se obrnite na okrožnega vodjo.
1406273935=Pribl. OT
1406273936=Približuje se OT
1406273937=izračuna ure OT za zaposlenega, če bodo opravljene ure WTD + preostale načrtovane ure povzročile OT.
1406273938=Rezultat razporeda
1406273939=označuje, kako dobro se razpored, ki ga je ustvaril upravitelj trgovine, ujema s predlaganim razporedom. Urnik, ki ga ustvari vodja trgovine, morda ni vedno v skladu s predlaganim urnikom, saj mora vsak vodja trgovine ustvariti urnik, ki najbolje ustreza potrebam njegove/njene trgovine.
1406273940=označuje število nepopolnih izmen, ki zahtevajo urejanje Store Managerja (npr. zaposleni ne uspe priti/oditi ob koncu izmene). Vodje trgovin, ki teh udarcev ne uredijo pravočasno, bodo poročali o plačilni listi za tekoči teden. Vodje trgovin ne bodo mogli objaviti plačilne liste, dokler ti udarci ne bodo urejeni in dokončani.
1406273941=označuje število opravljenih izmen, ki so bile upravičene do odmora za malico, vendar za katere niso bili zabeleženi časi obrokov. Preglejte pravilnik o času obrokov z vodji trgovine, da zagotovite, da razumejo pravilnik in veljavno zakonodajo.
1406273942=so štetja časovnih udarcev, ki se ne ujemajo z urnikom, ki ga ustvari upravitelj trgovine. Ti vključujejo zgodnji/pozni prihod, zgodnji/pozni odhod, nenačrtovano izmeno in nenačrtovano odsotnost. Te situacije so odgovorni za obvladovanje vodje trgovine, vendar lahko razkrijejo trende, ki nakazujejo potrebo po usposabljanju vodje trgovine glede njegove/njene vloge pri uveljavljanju politike podjetja.
1406273943=Urejanje upravitelja
1406273944=so delovni časi zaposlenih, ki jih je uredil ali ročno posnel vodja trgovine. Sprememb plačilne liste s strani vodje trgovine bi moralo biti malo in redko. Pogosta urejanja kažejo na potrebo po pregledu politike plač/ur z vodjo trgovine, da se zagotovi, da so zaposleni plačani za vse opravljene ure.
