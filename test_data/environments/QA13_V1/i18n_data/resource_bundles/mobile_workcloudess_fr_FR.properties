timeclock.help.troubleshooting_tips=Si les options du curseur ne s'affichent pas, essayez d'actualiser la page Pointeuse en appuyant sur l'icône « Actualiser » ou sur « Défilement haut » sur la page pour afficher les boutons.
timeclock.help.view_punchcard=Pour effectuer le suivi de vos heures de travail et les analyser, vous pouvez afficher la durée totale de vos roulements et un calendrier détaillé de vos pointages, incluant heures et avertissements. Cela permet d'identifier des schémas de travail et de corriger rapidement toute incohérence. Appuyez sur l'icône Plus (3 points) en haut à droite, puis appuyez sur « Afficher la carte de pointage » une fois que vous avez pointé votre début de service.
