timeclock.help.break=Certaines entreprises proposent de courtes pauses pendant les périodes de travail. Si ces pauses sont configurées, le Début de pause et la Fin de pause seront affichés sur votre feuille de présence pour assurer la conformité et le respect des horaires. Pour commencer une pause, appuyez de manière prolongée sur le bouton « Faites une pause ». Pour terminer la pause, faites glisser le curseur « Finir la pause » de gauche à droite.
timeclock.help.break_periods=Les périodes de pause sont déclenchées par une action de pression prolongée
timeclock.help.clock_in1=Vous pouvez pointer jusqu'à 8 minutes avant le début de votre journée de travail planifiée.
timeclock.help.clock_in2=Pour pointer, appuyez sur le curseur et faites-le glisser pour enregistrer votre pointage.
timeclock.help.clock_in_new=Pointez d'un simple glissement : pour pointer en début de service, faites glisser le curseur « Pointage d'arrivée » de gauche à droite. Une fois pointé, l'utilisateur accède instantanément à son statut de pointage, au temps total écoulé et à un calendrier des tâches et transactions à venir. Les transactions de pointage ne sont pas autorisées en dehors des périodes configurées, qui sont définies par votre entreprise.
timeclock.help.clock_out=Une fois votre journée terminée, un curseur de pointage de sortie s'affiche. Appuyez sur le curseur et faites-le glisser pour enregistrer votre pointage.
timeclock.help.clock_out_early=Si vous devez pointer avant la fin de votre journée, appuyez de manière prolongée sur ce bouton lorsque votre présence n'est pas planifiée.
timeclock.help.clock_out_early_new=Si vous terminez votre service plus tôt, le curseur n'est pas disponible. Vous devez appuyer de manière prolongée sur le bouton « Pointage de sortie » pour enregistrer correctement votre pointage.
timeclock.help.clock_out_new=Pointez d'un simple glissement : pour pointer en fin de service, faites glisser le curseur « Pointage de sortie » de gauche à droite. Pointez pour enregistrer précisément la fin de votre service et mettre à jour vos registres de présence.
timeclock.help.incorrect_punch=Si vous devez corriger l'horodatage d'un pointage, vous devrez soumettre une correction de feuille de présence à votre gestionnaire.
timeclock.help.meal=Enregistrez les heures de début et de fin de vos repas pour assurer la conformité et le respect des horaires. Pour commencer une pause repas, appuyez de manière prolongée sur le bouton « Prendre le repas ». Pour terminer la pause repas, faites glisser le curseur « Finir le repas » de gauche à droite.
timeclock.help.missing_incorrect_punches=En cas de pointage manqué ou d'horodatage incorrect, il existe un menu « Remplacement par le gestionnaire » qui permet de résoudre ces problèmes. Ce menu est accessible à votre responsable, qui peut vous aider à corriger toute incohérence. Communiquez avec votre responsable pour vous assurer d'utiliser efficacement cette fonction.
timeclock.help.missing_punches=Si vous avez manqué des pointages et que vous devez saisir une autre fonction, vous devrez contacter votre gestionnaire pour remplacer votre séquence de pointages.
timeclock.help.switch_stores=Si vous vous trouvez à proximité de plusieurs magasins/sites, vous avez la possibilité de passer de l'un à l'autre. Pour ce faire, il vous suffit de cliquer sur « Changer de magasin » et de choisir l'emplacement qui correspond le mieux à vos besoins.
