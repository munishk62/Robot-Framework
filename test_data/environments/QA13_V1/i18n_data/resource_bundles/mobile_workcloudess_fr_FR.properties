timeclock.help.clock_in_v2=Le pointage d'arrivée est simple : appuyez simplement sur le bouton « Pointage d'arrivée ». Une fois pointé, vous verrez instantanément votre statut de pointage, le temps total écoulé et un calendrier des tâches et transactions à venir. Remarque : vous ne pouvez pointer votre arrivée que pendant la plage horaire définie par votre entreprise.(g)
timeclock.help.clock_out_v2=Pointez facilement votre sortie à la fin de votre service en appuyant sur le bouton « Pointage de sortie ». Cela vous permet d'enregistrer précisément la fin de votre service et de maintenir vos registres de présence à jour.(g)
timeclock.help.clock_out_early_v2=Pour pointer votre sortie plus tôt, les utilisateurs doivent appuyer sur le bouton « Pointage de sortie » pour enregistrer correctement leur pointage. Une invite de confirmation apparaîtra pour s'assurer que la transaction est terminée.(g)
timeclock.help.meal_v2=Pour favoriser la conformité et le respect précis des horaires, il est important d'enregistrer à la fois le début et la fin de vos pauses repas. Pour commencer votre pause repas, appuyez sur le bouton « Prendre le repas ». Lorsque votre pause repas est terminée, terminez-la en appuyant sur le bouton « Finir le repas ».(g)
timeclock.help.break_v2=Certaines entreprises proposent de courtes pauses pendant les périodes de travail. Si elles sont configurées, votre feuille de présence affichera les heures de début et de fin des pauses pour assurer la conformité et le respect des horaires. Pour commencer une pause, appuyez sur le bouton « Faites une pause ». Lorsque vous êtes prêt à reprendre le travail, appuyez sur le bouton « Finir la pause ».(g)
