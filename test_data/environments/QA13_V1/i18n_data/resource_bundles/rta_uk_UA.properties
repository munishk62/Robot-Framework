1406273938=Оцінка за розкладом
1406273939=вказує, наскільки добре розклад, створений менеджером магазину, узгоджується із запропонованим розкладом. Розклад, створений менеджером магазину, може не завжди відповідати запропонованому розкладу, оскільки кожен менеджер магазину повинен створити розклад, який найкраще відповідає потребам його/її магазину.
1406273940=позначає кількість неповних змін, які потребують редагування Store Manager (наприклад, працівник не встиг прийти/вийти в кінці зміни). Менеджери магазинів, які вчасно не редагують ці штампи, повідомлятимуть про заробітну плату за поточний тиждень. Керівники магазинів не зможуть оприлюднити платіжну відомість, доки ці штампи не будуть відредаговані та завершені.
1406273941=позначає кількість відпрацьованих змін, які кваліфікувалися для перерви на прийом їжі, але для яких не було зафіксовано час прийому їжі. Ознайомтеся з адміністраторами магазину, щоб переконатися, що вони розуміють політику та відповідне законодавство.
1406273942=це підрахунки часових ударів, які не узгоджуються з розкладом, створеним менеджером магазину. До них належать ранній/пізній прихід, ранній/пізній вихід, незапланована зміна та незапланована відсутність. Керівники магазинів несуть відповідальність за вирішення цих ситуацій, але вони можуть виявляти тенденції, які свідчать про необхідність інструктажу керівника магазину щодо його/її ролі у забезпеченні дотримання політики компанії.
1406273943=Редагування менеджера
1406273944=– це відрахування часу співробітників, які були відредаговані або записані вручну менеджером магазину. Зміни до заробітної плати менеджером магазину мають бути невеликими та нечастими. Часті редагування свідчать про необхідність переглянути політику щодо заробітної плати/години разом з менеджером магазину, щоб переконатися, що працівники отримують оплату за всі відпрацьовані години.
