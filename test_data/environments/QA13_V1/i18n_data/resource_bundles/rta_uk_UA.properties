1406273934=Якщо інше не вимагається законодавством, працівникам надається щонайменше один 30-хвилинний неоплачуваний період безперервної їжі (зазвичай ближче до середини зміни працівника) для змін, тривалість яких перевищує або дорівнює 6 запланованим годинам, але менше 8 годин роботи на день і для запланованих змін, що дорівнюють або перевищують 8 годин, має бути надано одну годину неоплачуваного періоду харчування (принаймні 30 хвилин з яких мають бути безперервними). Керівники магазину або ключові перевізники (у разі відсутності керівника магазину) визначають час періоду прийому їжі. У випадках, коли закон штату відрізняється від закону штату, дотримуватимуться закону штату. При виникненні питань щодо вимог щодо періоду харчування в конкретному випадку звертайтеся до районного керівника.
