rosom.calMethod.exprBuilder.scheduledEvent.endTime.example=Cửa hàng có một sự kiện đã lên lịch với thời gian bắt đầu là 9 giờ sáng và thời gian là 9 giờ. Vì vậy, sự kiện kết thúc lúc 6 giờ chiều, sau đó biểu thức sẽ trả về 1080 dưới dạng đầu ra của phương pháp tính toán.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.description=Kiểm tra xem một sự kiện đã lên lịch sẽ diễn ra vào số ngày trước hoặc sau ngày trong một tuần mà sự kiện đang đánh giá.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.example=Biểu thức sẽ có dạng [SCHDEVENT]. [Store Open]. [BringAfterDays (a)] trong đó là số ngày. Nếu a là số dương, thì nó được coi là sau ngày, ví dụ [SCHDEVENT]. [ Cửa hàng mở]. [BringAfterDays (1)] - Biểu thức này trả về true nếu sự kiện Mở cửa hàng xảy ra vào ngày tiếp theo. Trong khi số âm biểu thị trước ngày. Ví dụ [SCHDEVENT]. [Store Open]. [BringAfterDays (-1)] - Biểu thức này trả về true nếu sự kiện Store Open xảy ra vào ngày trước đó.
rosom.calMethod.exprBuilder.scheduledEvent.startTime.description=Khoảng thời gian bắt đầu của một sự kiện đã lên lịch tính bằng phút
