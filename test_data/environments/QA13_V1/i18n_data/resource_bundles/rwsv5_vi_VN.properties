rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.example=Store có một sự kiện đã lên lịch với thời lượng 1 giờ xảy ra vào ngày mà nó đang đánh giá. Sau đó, biểu thức sẽ trả về 60 làm đầu ra của phương pháp tính toán.
