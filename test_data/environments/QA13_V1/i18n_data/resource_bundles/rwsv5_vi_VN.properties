rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.description=Trả về tổng thời lượng của sự kiện tính bằng phút cho tất cả các ngày trong tuần
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.example=Store có một sự kiện đã lên lịch với thời lượng 1 giờ diễn ra vào tất cả các ngày trong tuần, sau đó biểu thức sẽ trả về 420 dưới dạng đầu ra của phương pháp tính toán.
