1611021214=Активност је подељена на подакције. Додјела и вријеме извршавања су дефинирани за главну активност. Али процене радног оптерећења су дефинисане за појединачне под-активности
1611021215=Дефинишите укупне ФТЕ сате који би били потрошени за активност током једне недеље. Затим поделите укупне сате ФТЕ на одређени проценат који треба обавити у различито време у недељи
1611021216="Процена радног оптерећења за такве активности врши се на крају процена за остале активности. То је зато што, радно оптерећење ове активности произилази из процена радног оптерећења свих осталих активности."
1611021217=„Процена радног оптерећења за такве активности врши се непосредно пре„ „Активности засноване на израчунатој радној оптерећености" ". Дежне активности (Минималне активности за особље) биће креиране ако је укупно израчунато радно оптерећење испод ваших минималних потреба за особљем."
1611021218=„Укључује доделу активности, време извршења активности и правила израчунавања радног оптерећења“
