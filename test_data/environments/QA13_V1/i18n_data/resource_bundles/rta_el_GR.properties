1406273934=Εκτός εάν ορίζεται διαφορετικά από τη νομοθεσία, οι εργαζόμενοι λαμβάνουν τουλάχιστον μία περίοδο 30 λεπτών χωρίς αμοιβή, αδιάλειπτου γεύματος (συνήθως προς τη μέση της βάρδιας του εργαζομένου) για βάρδιες μεγαλύτερες ή ίσες με 6 προγραμματισμένες ώρες αλλά λιγότερες από 8 ώρες εργασίας την ημέρα και για προγραμματισμένες βάρδιες ίσες ή μεγαλύτερες των 8 ωρών, πρέπει να παρέχεται περίοδος γευμάτων χωρίς αμοιβή μιας ώρας (τουλάχιστον τα 30 λεπτά από τα οποία πρέπει να είναι αδιάκοπα). Οι υπεύθυνοι καταστημάτων ή οι βασικοί μεταφορείς (σε απουσία του υπεύθυνου του καταστήματος) καθορίζουν την ώρα της περιόδου του γεύματος. Όπου το κρατικό δίκαιο διαφέρει από αυτό, θα ακολουθείται ο συγκεκριμένος νόμος του κράτους. Εάν υπάρχουν ερωτήσεις σχετικά με τις απαιτήσεις της περιόδου γευμάτων σε μια συγκεκριμένη περίπτωση, επικοινωνήστε με τον διευθυντή της περιοχής.
