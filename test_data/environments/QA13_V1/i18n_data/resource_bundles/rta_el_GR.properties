1406273937=υπολογίζει τις ώρες OT για έναν εργαζόμενο εάν οι ώρες εργασίας WTD + οι υπόλοιπες προγραμματισμένες ώρες θα οδηγήσουν σε OT.
1406273938=Χρονοδιάγραμμα Βαθμολογία
1406273939=υποδεικνύει πόσο καλά ευθυγραμμίζεται το χρονοδιάγραμμα που δημιουργήθηκε από τον Διαχειριστή καταστήματος με το προτεινόμενο χρονοδιάγραμμα. Το χρονοδιάγραμμα που δημιουργείται από τον Διαχειριστή καταστήματος ενδέχεται να μην ευθυγραμμίζεται πάντα με το προτεινόμενο χρονοδιάγραμμα, καθώς κάθε Υπεύθυνος καταστήματος πρέπει να δημιουργήσει ένα χρονοδιάγραμμα που να ανταποκρίνεται καλύτερα στις ανάγκες του καταστήματός του.
1406273940=υποδηλώνει τον αριθμό των ημιτελών βάρδιων που απαιτούν επεξεργασία από τον Υπεύθυνο καταστήματος (π.χ. ο εργαζόμενος αποτυγχάνει να εισέλθει/εξέλθει στο τέλος της βάρδιας). Οι υπεύθυνοι καταστημάτων που δεν επεξεργάζονται έγκαιρα αυτές τις γροθιές θα αναφέρουν τη μισθοδοσία της τρέχουσας εβδομάδας. Οι διαχειριστές καταστημάτων δεν θα μπορούν να αποδεσμεύσουν τη μισθοδοσία μέχρι να επεξεργαστούν και να ολοκληρωθούν αυτές οι γροθιές.
1406273941=υποδηλώνει τον αριθμό των εργασιών βάρδιων που πληρούν τις προϋποθέσεις για ένα διάλειμμα γεύματος, αλλά για τις οποίες δεν καταγράφηκαν γροθιές ώρας φαγητού. Ελέγξτε την πολιτική περιόδου γευμάτων με τους υπεύθυνους καταστημάτων για να βεβαιωθείτε ότι κατανοούν την πολιτική και την ισχύουσα νομοθεσία.
1406273942=είναι μετρήσεις χρονικών διατρήσεων που δεν ευθυγραμμίζονται με το χρονοδιάγραμμα που δημιουργήθηκε από τον Διαχειριστή καταστήματος. Αυτά περιλαμβάνουν νωρίς/αργά την είσοδο, πρώιμο/όψιμο ρολόι έξω, απρογραμμάτιστη βάρδια και απρογραμμάτιστη απουσία. Αυτές οι καταστάσεις είναι ευθύνη της διαχείρισης των Υπεύθυνων Καταστήματος, αλλά μπορεί να αποκαλύψουν τάσεις που υποδηλώνουν την ανάγκη καθοδήγησης του Υπεύθυνου Καταστήματος σχετικά με το ρόλο του/της στην επιβολή της εταιρικής πολιτικής.
1406273943=Επεξεργασίες διαχειριστή
1406273944=είναι διατρήσεις χρόνου εργαζομένων που έχουν επεξεργαστεί ή καταγραφεί χειροκίνητα από τον Υπεύθυνο Καταστήματος. Οι τροποποιήσεις μισθοδοσίας από τον Υπεύθυνο Καταστήματος θα πρέπει να είναι λίγες και σπάνιες. Οι συχνές αλλαγές υποδηλώνουν την ανάγκη αναθεώρησης της πολιτικής μισθών/ωρών με τον Υπεύθυνο καταστήματος για να διασφαλιστεί ότι οι εργαζόμενοι πληρώνονται για όλες τις ώρες εργασίας.
1406273945=Το σύστημα επεξεργάζεται εκ νέου το δεδουλευμένο υπόλοιπο. Περιμένετε λίγο.
