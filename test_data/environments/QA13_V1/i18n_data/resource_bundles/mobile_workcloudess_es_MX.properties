timeclock.help.troubleshooting_tips=Si no puede ver las opciones del control deslizante, intente actualizar la página del reloj de tiempo, presione el ícono “Actualizar”, o bien “deslice hacia arriba” la página para ver los botones.
timeclock.help.view_punchcard=Para hacer un seguimiento y analizar sus horas trabajadas, consulte la duración total del turno y una cronología detallada de las tareas, incluidas las horas y las advertencias. Esto ayuda a identificar los patrones de trabajo y a abordar rápidamente las discrepancias. Toque el ícono “Más” (3 puntos) en la esquina superior derecha y, a continuación, toque “Ver tarjeta de registro de horas” una vez que haya registrado su hora de entrada correctamente.
