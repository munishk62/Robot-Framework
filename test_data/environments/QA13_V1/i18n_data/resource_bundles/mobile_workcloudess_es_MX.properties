timeclock.help.clock_in_v2=Marcar la entrada es fácil: simplemente presione el botón "Marcar entrada". Una vez marcada la entrada, verá al instante su estado de registro de entrada, el tiempo total transcurrido y una cronología de las próximas tareas y transacciones. Tenga en cuenta: solo puede marcar la entrada dentro del intervalo de tiempo designado por su organización.(g)
timeclock.help.clock_out_v2=Marque fácilmente la salida al final de su jornada laboral presionando el botón "Marcar salida". Esto le ayuda a registrar con precisión el final de su turno y mantener actualizados sus registros de asistencia.(g)
timeclock.help.clock_out_early_v2=Para marcar la salida antes de tiempo, los usuarios deben presionar el botón "Marcar salida" para registrar correctamente su marcación. Aparecerá un mensaje de confirmación para garantizar que la transacción se complete.(g)
timeclock.help.meal_v2=Para promover el cumplimiento y un control preciso del tiempo, es importante registrar tanto el inicio como el fin de sus pausas para comer. Para iniciar su pausa para comer, presione el botón "Vaya a comer". Cuando termine la pausa para comer, finalícela presionando el botón "Finalizar comida".(g)
timeclock.help.break_v2=Algunas organizaciones ofrecen breves descansos durante la jornada laboral. Si está configurado, su tarjeta de registro mostrará las horas de inicio y fin del descanso para garantizar el cumplimiento y el control del tiempo. Para iniciar un descanso, presione el botón "Tómese un descanso". Cuando esté listo para volver al trabajo, presione el botón "Finalizar descanso".(g)
