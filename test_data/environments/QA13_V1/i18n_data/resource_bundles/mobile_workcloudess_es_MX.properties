timeclock.help.break=Algunas organizaciones ofrecen breves descansos durante la jornada laboral. Si está configurado, su tarjeta de registro mostrará el inicio y el fin del descanso para garantizar el cumplimiento y el control del tiempo. Para iniciar un descanso, mantenga presionado el botón “Tómese un descanso”. Para terminarlo, deslice el control deslizante “Finalizar descanso” de izquierda a derecha.
timeclock.help.break_periods=Los períodos de descanso se inician mediante una acción de mantener pulsado
timeclock.help.clock_in1=Puede registrar la entrada de su turno hasta 8 minutos antes del turno programado.
timeclock.help.clock_in2=Para registrar la hora de entrada, pulse y arrastre el control deslizante por la pantalla para grabar el registro de hora.
timeclock.help.clock_in_new=Marque fácilmente su hora de entrada con solo deslizar el dedo. Para hacerlo, deslice el control deslizante “Marcar entrada” de izquierda a derecha. Cuando lo haya hecho, el usuario accederá de manera instantánea al estado del registro de hora entrada, al tiempo total transcurrido y a una cronología de las próximas tareas y transacciones. No se permite la transacción de registro de hora de entrada fuera del período configurado que establece su organización.
timeclock.help.clock_out=Una vez que haya completado su turno, aparecerá un control deslizante de registro de salida. Pulse y arrastre el control deslizante para grabar el registro de hora.
timeclock.help.clock_out_early=Si necesita registrar la hora de salida antes del final de su turno, puede mantener pulsado este botón cuando no tenga nada programado.
timeclock.help.clock_out_early_new=Si desea registrar su salida de manera anticipada, notará que el control deslizante no está disponible. En su lugar, los usuarios deben mantener presionado el botón “Marcar salida” para registrarla correctamente.
timeclock.help.clock_out_new=Marque fácilmente su hora de salida con solo deslizar su dedo. Para hacerlo, deslice el control deslizante “Marcar salida” de izquierda a derecha. Esta función registra con precisión el término de su jornada laboral y actualiza su registro de asistencia.
timeclock.help.incorrect_punch=Si necesita corregir una marca de tiempo en un registro de hora, deberá enviar una corrección de tarjeta de tiempo a su gerente.
timeclock.help.meal=Registre las horas de inicio y término de la pausa para comer a fin de garantizar el cumplimiento y la puntualidad. Si desea comenzar una pausa para comer, mantenga presionado el botón “Vaya a comer”. Para terminar esta pausa, deslice el control deslizante “Finalizar comida” de izquierda a derecha.
timeclock.help.missing_incorrect_punches=En el caso de entradas faltantes o incorrectas en un registro de horas, existe el menú “Anulación del gerente” que permite solucionar estos problemas. Su gerente puede acceder a este menú y ayudarlo a corregir cualquier discrepancia. Asegúrese de comunicarse con su gerente para utilizar esta función eficazmente.
timeclock.help.missing_punches=Si tiene entradas perdidas y necesita introducir una función diferente, tendrá que comunicarse con su gerente para anular la secuencia de registro de horas.
timeclock.help.switch_stores=En caso de que se encuentre cerca de varios sitios o tiendas, tiene la opción de alternar entre ellos. Para ello, simplemente haga clic en “Cambiar tiendas” y elija la ubicación adecuada para sus necesidades.
