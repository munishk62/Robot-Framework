1406273934=O ile przepisy prawa nie stanowią inaczej, pracownikom należy zapewnić co najmniej jedną 30-minutową, bezpłatną, nieprzerwaną przerwę na posiłek (zazwyczaj w połowie zmiany pracownika) w przypadku zmian dłuższych lub równych 6 zaplanowanym godzinom, ale krótszych niż 8 godzin przepracowanych w ciągu dnia, a w przypadku zaplanowanych zmian równych lub dłuższych niż 8 godzin, należy zapewnić jedną godzinę bezpłatnej przerwy na posiłek (z czego co najmniej 30 minut musi być nieprzerwane). Kierownicy sklepów lub ich zastępcy (w przypadku nieobecności kierownika sklepu) określają czas przerwy na posiłek. Tam, gdzie prawo lokalne różni się od prawa krajowego, należy postępować zgodnie z prawem lokalnym. W razie pytań na temat wymogów dotyczących czasu na posiłek w konkretnym przypadku należy skontaktować się z kierownikiem okręgowym.
1406273935=Zatw. nadgodziny
1406273936=Zbliżające się nadgodziny
1406273937=oblicza nadgodziny pracownika, jeśli godziny przepracowane WTD + pozostałe zaplanowane godziny będą skutkowały nadgodzinami
1406273938=Wynik grafiku
1406273939=wskazuje, w jakim stopniu grafik utworzony przez kierownika sklepu jest zgodny z sugerowanym grafikiem. Grafik utworzony przez kierownika sklepu może nie zawsze być zgodny z sugerowanym grafikiem, ponieważ każdy kierownik sklepu musi utworzyć grafik, który najlepiej spełnia potrzeby jego sklepu.
1406273940=oznacza liczbę niekompletnych zmian wymagających edycji przez kierownika sklepu (np. pracownik nie włącza/wyłącza zegara czasu pracy po zakończeniu zmiany). Jeśli kierownicy sklepów nie edytują tych odbić w odpowiednim czasie, będą mieli zaraportowaną mniejszą liczbę godzin pracy w bieżącej tygodniowej liście płac. Kierownicy sklepów nie będą mogli przekazać listy płac, dopóki odbicia nie zostaną edytowane i uzupełnione.
1406273941=oznacza liczbę przepracowanych zmian, które kwalifikowały się do przerwy na posiłek, ale dla których nie odbito czasu przerwy na posiłek. Należy przejrzeć zasady przerw na posiłek z kierownikami sklepów, aby upewnić się, że rozumieją oni te zasady i obowiązujące prawo.
1406273942=to liczba odbić czasu, które nie są zgodne z grafikiem utworzonym przez kierownika sklepu. Obejmuje to wcześniejsze/późniejsze rozpoczęcie pracy, wcześniejsze/późniejsze zakończenie pracy, nieplanowaną zmianę i nieplanowaną nieobecność. Za zarządzanie tymi sytuacjami odpowiedzialni są kierownicy sklepów, ale mogą one ujawniać trendy, które sugerowałby potrzebę przeszkolenia kierownika sklepu w zakresie jego roli w egzekwowaniu polityki firmy.
1406273943=Zmiany kierownika
1406273944=są to odbicia czasu pracy pracowników, które kierownik sklepu edytował lub zarejestrował ręcznie. Modyfikacje listy płac wprowadzone przez kierownika sklepu powinny być nieliczne i rzadkie. Częste edycje sugerują, że kierownik sklepu powinien zapoznać się z zasadami wynagrodzeń / godzin pracy, aby zapewnić pracownikom wynagrodzenie za wszystkie przepracowane godziny.
