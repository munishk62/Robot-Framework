rosom.calMethod.exprBuilder.scheduledEvent.attribute=Любое запланированное мероприятие. Например, Store Open
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.description=Возвращает продолжительность события в минутах для дня недели, для которого оно оценивается.
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.example=Магазин имеет запланированное событие продолжительностью 1 час, которое происходит в день, для которого он оценивает. Тогда выражение вернет 60 в качестве результата метода расчета.
rosom.calMethod.exprBuilder.scheduledEvent.endTime.description=Время окончания - продолжительность запланированного события в минутах
rosom.calMethod.exprBuilder.scheduledEvent.endTime.example=В магазине есть запланированное мероприятие, время начала - 9 утра, а продолжительность - 9 часов. Итак, событие заканчивается в 18:00. Тогда выражение вернет 1080 как результат метода расчета.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.description=Проверяет, произойдет ли запланированное событие за количество дней до или после дня недели, для которого оно оценивается.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.example=Выражение будет иметь форму [SCHDEVENT]. [Store Open]. [PlaysAfterDays (a)], где a - номер дня. Если a - положительное число, тогда оно считается как после дней, например [SCHDEVENT]. [ Store Open]. [PlaysAfterDays (1)] - это выражение возвращает истину, если событие Store Open происходит на следующий день. Отрицательное число представляет предыдущие дни. Например, [SCHDEVENT]. [Store Open]. [PlaysAfterDays (-1)] - это выражение возвращает истину, если событие Store Open происходит в предыдущий день.
rosom.calMethod.exprBuilder.scheduledEvent.startTime.description=Время начала продолжительность запланированного события в минутах
rosom.calMethod.exprBuilder.scheduledEvent.startTime.example=В магазине есть запланированное событие со временем начала 9 утра. Тогда выражение вернет 540 как результат метода расчета.
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.description=Возвращает сумму продолжительности события в минутах для всех дней недели.
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.example=У магазина есть запланированное событие продолжительностью 1 час, которое происходит во все дни недели. Тогда выражение вернет 420 в качестве результата метода расчета.
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.description=Количество появлений запланированного события за неделю
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.example=В магазине есть запланированное событие, которое применимо ко всем дням недели. Тогда выражение вернет 7 в качестве результата метода расчета.
