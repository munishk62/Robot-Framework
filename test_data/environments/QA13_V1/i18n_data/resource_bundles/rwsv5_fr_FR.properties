rosom.calMethod.exprBuilder.engineSpecific.taskDate.description=Renvoie uniquement la valeur de date de l'intervalle de temps d'entrée au format aaaaMMjj
rosom.calMethod.exprBuilder.engineSpecific.taskDate.example=Si la date de l'intervalle de tâches est le 1er janvier 2020. Cela sera évalué pour renvoyer la valeur de date d'intervalle au format aaaaMMjj - 20200101.
