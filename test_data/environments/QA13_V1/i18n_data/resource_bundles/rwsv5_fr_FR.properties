rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.example=Le magasin a un événement planifié d'une durée d'une heure qui aura lieu le jour pour lequel il est évalué. Ensuite, l'expression renverra 60 comme sortie de la méthode de calcul.
rosom.calMethod.exprBuilder.scheduledEvent.endTime.description=Durée de l'heure de fin d'un événement planifié en minutes
rosom.calMethod.exprBuilder.scheduledEvent.endTime.example=Le magasin a un événement planifié avec une heure de début à 9 h et une durée de 9 heures. L'événement se termine donc à 18 h. Puis, l'expression renverra 1080 comme sortie de la méthode de calcul.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.description=Vérifie si un événement planifié se produira le nombre de jours avant ou après le jour de la semaine pour lequel il est évalué.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.example=L'expression aurait le format [SCHDEVENT].[Store Open].[occursAfterDays(a)] où « a » est le nombre de jours. Si « a » est un nombre positif, il est considéré comme le nombre de jours d'après, par exemple [SCHDEVENT].[Store Open].[occursAfterDays (1)] : cette expression renvoie True si l'événement Store Open se produit le jour suivant. À l'inverse, un nombre négatif représente le nombre de jours d'avant. Par exemple [SCHDEVENT].[Store Open].[occursAfterDays(-1)] : cette expression renvoie True si l'événement Store Open se produit le jour précédent.
rosom.calMethod.exprBuilder.scheduledEvent.startTime.description=Heure de début d'un événement planifié en minutes
rosom.calMethod.exprBuilder.scheduledEvent.startTime.example=Le magasin a un événement planifié avec une heure de début à 9 h, puis l'expression renverra 540 comme sortie de la méthode de calcul.
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.description=Renvoie la somme de la durée de l'événement en minutes pour tous les jours d'une semaine
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.example=Le magasin a un événement planifié d'une durée d'une heure qui se produit tous les jours de la semaine. L'expression renverra 420 comme sortie de la méthode de calcul.
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.description=Nombre d'occurrences d'un événement planifié dans une semaine
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.example=Le magasin a un événement planifié qui est applicable à tous les jours de la semaine. L'expression renverra 7 comme sortie de la méthode de calcul.
