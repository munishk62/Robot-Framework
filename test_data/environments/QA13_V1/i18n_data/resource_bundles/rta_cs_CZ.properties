1406273934=Pokud zákon nestanoví jinak, je zaměstnancům poskytnuto minimálně jedno 30minutové neplacené nepřerušované jídlo (obvykle uprostřed směny zaměstnance) na směny delší nebo rovné 6 plánovaným hodinám, ale méně než 8 hodin odpracovaných za den a pro plánované směny rovné nebo delší než 8 hodin musí být poskytnuta hodina neplaceného jídla (z toho alespoň 30 minut musí být bez přerušení). Vedoucí prodejny nebo klíčoví dopravci (v nepřítomnosti vedoucího prodejny) určují dobu stravování. Tam, kde se státní právo liší, se bude postupovat podle konkrétního státního práva. Máte-li jakékoli dotazy týkající se požadavků na dobu stravování v konkrétním případě, kontaktujte okresního manažera.
