1406273938=Naplánujte skóre
1406273939=udává, jak dobře je vytvořený rozvrh vedoucího prodejny v souladu s navrhovaným rozvrhem. Harmonogram vytvořený vedoucím prodejny se nemusí vždy shodovat s navrhovaným rozvrhem, protože každý vedoucí prodejny musí vytvořit rozvrh, který nejlépe odpovídá potřebám jeho/její prodejny.
1406273940=udává počet nedokončených směn, které vyžadují úpravu vedoucího prodejny (např. zaměstnanec se na konci směny nepřihlásí/odchází). Vedoucí prodejen, kteří neupravují tyto razníky včas, budou vykazovat mzdy za aktuální týden. Vedoucí prodejen nebudou moci uvolnit výplatní pásku, dokud nebudou tyto razníky upraveny a dokončeny.
1406273941=označuje počet odpracovaných směn, které měly nárok na přestávku na jídlo, ale u kterých nebyly zaznamenány rány na jídlo. Projděte si zásady období jídla s vedoucími prodejen, abyste se ujistili, že rozumí zásadám a platným zákonům.
1406273942=jsou počty časových zásahů, které nejsou v souladu s plánem vytvořeným vedoucím prodejny. Patří mezi ně časný/pozdní příchod, předčasný/pozdní odchod, neplánovaná směna a neplánovaná nepřítomnost. Řízení těchto situací je povinností vedoucích prodejen, ale mohou odhalit trendy, které naznačují potřebu koučování vedoucího prodejny, pokud jde o jeho/její roli při prosazování firemní politiky.
1406273943=Úpravy správce
1406273944=jsou časové razy zaměstnanců, které byly upraveny nebo ručně zaznamenány vedoucím prodejny. Úpravy mezd vedoucím prodejny by měly být malé a málo časté. Časté úpravy naznačují, že je nutné prověřit mzdovou/hodinovou politiku s vedoucím prodejny, aby bylo zajištěno, že zaměstnanci dostanou zaplaceno za všechny odpracované hodiny.
