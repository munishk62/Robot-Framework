1000000000636=Baigti ir tęsti
1000000000637=Įjungus vietos paslaugas įrenginyje, jis gali stebėti savo buvimo vietą, užtikrinant, kad visos laikrodžio operacijos būtų tiksliai registruojamos atitinkamoje vietoje. Ši funkcija yra būtina registruojant žymėjimus geografinėse ribose, užtikrinant, kad laiko įrašai būtų daromi nustatytose vietos ribose, tuo pačiu patogiai naudojant įrenginį visoje vietoje.
1000000000638=Sąlygų patvirtinimas
1000000000639=Kadangi vietos paslaugos nėra naudojamos šio laikrodžio registracijos procese, prašome peržiūrėti ir patvirtinti sąlygas.
1000000000640=Laikrodžio registracijos proceso metu vieta prisiima atsakomybę užtikrinti, kad visi laiko įrašai būtų atlikti registruotoje vietoje. Įrenginys turi būti saugiai pritvirtintas prie sienos nurodytoje vietoje, kad būtų išvengta žymėjimų už vietos ribų. Vietoje, dėl geografinio atskyrimo nebuvimo, būtina laikytis atidumo ir prisiimti šiuos įsipareigojimus, kad būtų galima tęsti procesą.
