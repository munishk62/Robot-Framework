rosom.calMethod.exprBuilder.scheduledEvent.attribute=Οποιαδήποτε προγραμματισμένη εκδήλωση. Για παράδειγμα, το Store Open
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.description=Επιστρέφει τη διάρκεια του συμβάντος σε λεπτά για μια ημέρα σε μια εβδομάδα για την οποία αξιολογεί.
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.example=Το κατάστημα έχει ένα προγραμματισμένο συμβάν με διάρκεια 1 ώρας που εμφανίζεται την ημέρα που αξιολογεί. Στη συνέχεια, η έκφραση θα επιστρέψει 60 ως έξοδο της μεθόδου υπολογισμού.
rosom.calMethod.exprBuilder.scheduledEvent.endTime.description=Διάρκεια χρόνου λήξης ενός προγραμματισμένου συμβάντος σε λίγα λεπτά
rosom.calMethod.exprBuilder.scheduledEvent.endTime.example=Το κατάστημα έχει προγραμματισμένη εκδήλωση με ώρα έναρξης 9 π.μ. και διάρκεια 9 ώρες. Έτσι το συμβάν τελειώνει στις 6 μ.μ.. Στη συνέχεια, η έκφραση θα επιστρέψει 1080 ως έξοδο της μεθόδου υπολογισμού.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.description=Ελέγχει εάν ένα προγραμματισμένο συμβάν θα συμβεί τον αριθμό ημερών πριν ή μετά την ημέρα σε μια εβδομάδα για την οποία αξιολογείται.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.example=Η έκφραση θα ήταν της μορφής [SCHDEVENT]. [Open Store]. [Εμφανίζεται μετά τις Ημέρες (a)] όπου ως αριθμός είναι αριθμός ημέρας. Εάν το a είναι θετικός αριθμός, τότε θεωρείται ως μετά τις ημέρες, για παράδειγμα [SCHDEVENT]. [ Store Open]. [ΕμφανίζεταιAfterDays (1)] - Αυτή η έκφραση επιστρέφει αληθινή εάν το συμβάν Open Store εμφανίζεται την επόμενη ημέρα. Ενώ ο αρνητικός αριθμός αντιπροσωπεύει πριν από τις ημέρες. Για παράδειγμα [SCHDEVENT]. [Open Store]. [ΕμφανίζεταιAfterDays (-1)] - Αυτή η έκφραση επιστρέφει αληθής εάν το συμβάν Open Store εμφανιστεί την προηγούμενη ημέρα.
rosom.calMethod.exprBuilder.scheduledEvent.startTime.description=Διάρκεια ώρας έναρξης προγραμματισμένου συμβάντος σε λεπτά
rosom.calMethod.exprBuilder.scheduledEvent.startTime.example=Το κατάστημα έχει ένα προγραμματισμένο συμβάν με ώρα έναρξης ως 9 π.μ. Στη συνέχεια, η έκφραση θα επιστρέψει 540 ως έξοδο της μεθόδου υπολογισμού.
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.description=Επιστρέφει το άθροισμα της διάρκειας του συμβάντος σε λεπτά για όλες τις ημέρες μιας εβδομάδας
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.example=Το κατάστημα έχει ένα προγραμματισμένο συμβάν με διάρκεια 1 ώρας που λαμβάνει χώρα όλες τις ημέρες της εβδομάδας. Στη συνέχεια, η έκφραση θα επιστρέψει το 420 ως έξοδο της μεθόδου υπολογισμού.
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.description=Αριθμός εμφανίσεων ενός προγραμματισμένου συμβάντος σε μια εβδομάδα
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.example=Το κατάστημα έχει ένα προγραμματισμένο συμβάν το οποίο ισχύει για όλες τις ημέρες σε μια εβδομάδα. Στη συνέχεια, η έκφραση θα επιστρέψει 7 ως έξοδος της μεθόδου υπολογισμού.
