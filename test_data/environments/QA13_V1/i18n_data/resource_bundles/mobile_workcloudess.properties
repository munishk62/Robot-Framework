timeclock.help.clock_in_v2=Clocking in is easy—simply tap the 'Clock In' button. Once clocked in, you'll instantly see your clock-in status, total elapsed time, and a timeline of upcoming tasks and transactions. Please note: you can only clock in during your organization's designated time window.
timeclock.help.clock_out_v2=Easily clock out at the end of your work period by tapping the 'Clock out' button. This helps you accurately record when you finish your shift and keeps your attendance records up to date.
timeclock.help.clock_out_early_v2=To clock out early, users must tap the 'Clock Out' button to successfully record their punch. A confirmation prompt will appear to ensure the transaction is completed.
timeclock.help.meal_v2=To promote compliance and accurate timekeeping, it is important to record both the start and end of your meal breaks. To begin your meal break, tap the 'Take meal' button. When your meal break is over, end it by tapping the 'End Meal' button.
timeclock.help.break_v2=Some organization offer short breaks during work period. If configured, your timecard will display the Break Start and End Times to ensure compliance and timekeeping. To start a break, tap the 'Take break' button. When you are ready to return to work, tap the 'End break' button.
