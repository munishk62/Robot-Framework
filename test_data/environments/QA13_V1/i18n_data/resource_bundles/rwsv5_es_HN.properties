rosom.calMethod.exprBuilder.engineSpecific.taskDate.description=Devuelve solo el valor de fecha del intervalo de tiempo de entrada en el formato yymmdd
rosom.calMethod.exprBuilder.engineSpecific.taskDate.example=Si la fecha del intervalo de tareas es el 1 de enero del 2020. Esto se evaluará para devolver el valor de la fecha del intervalo en el formato aaaaMMdd-20200101.
