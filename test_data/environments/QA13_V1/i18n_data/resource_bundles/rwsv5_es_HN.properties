rosom.calMethod.exprBuilder.scheduledEvent.attribute=Cualquier evento programado. Por ejemplo, apertura de tienda
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.description=Devuelve la duración del evento en minutos durante el día de la semana que se está evaluando.
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.example=La tienda tiene un evento programado con una duración de 1 hora que ocurre el día que se desea evaluar. La expresión devolverá 60 como resultado del método de cálculo.
rosom.calMethod.exprBuilder.scheduledEvent.endTime.description=Hora de finalización de un evento programado en minutos
rosom.calMethod.exprBuilder.scheduledEvent.endTime.example=La tienda tiene un evento programado con una hora de inicio de 9:00 a. m. y una duración de 9 horas. Por lo tanto, el evento finalizará a las 6:00 p. m. La expresión devolverá 1080 como resultado del método de cálculo.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.description=Comprueba si un evento programado ocurrirá la cantidad de días antes o después del día de la semana para el que se está evaluando.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.example=La expresión tendría el formato [SCHDEVENT].[Store Open].[occursAfterDays(a)], donde a corresponde al número de día. Si a es un número positivo, se considera como días posteriores. Por ejemplo [SCHDEVENT].[Store Open].[occursAfterDays (1)]. Esta expresión devuelve un valor verdadero si el evento de apertura de tienda ocurre el día siguiente, mientras que un número negativo representa los días anteriores. Por ejemplo, [SCHDEVENT].[Store Open].[occursAfterDays(-1)]. Esta expresión devuelve un valor verdadero si el evento de apertura de tienda ocurre el día anterior.
rosom.calMethod.exprBuilder.scheduledEvent.startTime.description=Duración de la hora de inicio de un evento programado en minutos
rosom.calMethod.exprBuilder.scheduledEvent.startTime.example=La tienda tiene un evento programado con una hora de inicio de 9:00 a. m. La expresión devolverá 540 como resultado del método de cálculo.
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.description=Devuelve la suma de la duración del evento en minutos para todos los días de una semana
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.example=La tienda tiene un evento programado con una duración de 1 hora que ocurre todos los días de una semana. La expresión devolverá 420 como resultado del método de cálculo.
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.description=Cantidad de ocurrencias de un evento programado en una semana
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.example=La tienda tiene un evento programado que se aplica a todos los días de una semana. La expresión devolverá 7 como resultado del método de cálculo.
