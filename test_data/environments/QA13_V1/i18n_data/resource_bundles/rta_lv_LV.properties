1406273933=Ēdināšanas politika
1406273934=Ja likumā nav noteikts citādi, darbiniekiem tiek piešķirts vismaz viens 30 minūšu neapmaksātas, nepārtrauktas ēdienreizes periods (parasti darbinieka maiņas vidū), ja maiņu ilgums pārsniedz 6 plānotās stundas, bet ir mazāks par 8 stundām dienā, un plānotajām maiņām, kas vienādas vai lielākas par 8 stundām, ir jānodrošina vienas stundas neapmaksātas ēdienreizes (no kurām vismaz 30 minūtes jābūt bez pārtraukuma). Veikala vadītāji vai atslēgu nesēji (veikala vadītāja prombūtnes laikā) nosaka ēdienreizes laiku. Ja valsts tiesību akti atšķiras no valsts, tiks ievēroti īpaši štata tiesību akti. Ja ir kādi jautājumi par ēdienreizes prasībām konkrētajā gadījumā, sazinieties ar rajona vadītāju.
1406273935=Apm. OT
1406273936=Tuvojas OT
1406273937=aprēķina OT stundas darbiniekam, ja nostrādātās stundas WTD + atlikušās plānotās stundas radīs OT.
1406273938=Ieplānojiet rezultātu
1406273939=norāda, cik labi veikala pārvaldnieka izveidotais grafiks atbilst ieteiktajam grafikam. Veikala pārvaldnieka izveidotais grafiks ne vienmēr var atbilst ieteiktajam grafikam, jo katram Veikala vadītājam ir jāizveido grafiks, kas vislabāk atbilst viņa veikala vajadzībām.
1406273940=apzīmē nepabeigto maiņu skaitu, kurām nepieciešama veikala vadītāja rediģēšana (piem., darbinieks nespēj ieiet/izbraukt maiņas beigās). Veikalu vadītāji, kuri nerediģēs šos punktus savlaicīgi, ziņos par pašreizējās nedēļas algu sarakstu. Veikalu vadītāji nevarēs atbrīvot algu sarakstu, kamēr šie perforatori nebūs rediģēti un pabeigti.
1406273941=apzīmē nostrādāto maiņu skaitu, kas kvalificējās ēdienreizes pārtraukumam, bet kurām ēdienreizes sitieni netika reģistrēti. Pārskatiet maltīšu perioda politiku ar veikala vadītājiem, lai pārliecinātos, ka viņi saprot politiku un piemērojamos tiesību aktus.
1406273942=ir laika sitienu skaitīšana, kas neatbilst veikala pārvaldnieka izveidotajam grafikam. Tie ietver agru/vēlu pulksteni, agru/vēlu pulksteni, neplānotu maiņu un neplānotu prombūtni. Šīs situācijas ir veikala vadītāju pienākums, taču tās var atklāt tendences, kas liek domāt, ka veikala vadītājam ir nepieciešama apmācība par viņa lomu uzņēmuma politikas īstenošanā.
1406273943=Pārvaldnieka labojumi
1406273944=ir darbinieku laika sitieni, kurus veikala vadītājs ir rediģējis vai manuāli ierakstījis. Veikala vadītāja veiktajām algu saraksta izmaiņām vajadzētu būt retām un retām. Bieža rediģēšana liecina, ka ir jāpārskata algu/stundu politika ar veikala vadītāju, lai nodrošinātu darbiniekiem samaksu par visām nostrādātajām stundām.
