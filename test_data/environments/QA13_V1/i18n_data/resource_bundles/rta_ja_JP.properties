1406273939=ストア マネージャーが作成したスケジュールが、提案されたスケジュールとどの程度一致しているかを示します。各ストア マネージャーは自分の店舗のニーズに最も合ったスケジュールを作成する必要があるため、ストア マネージャーが作成したスケジュールは、提案されたスケジュールと必ずしも一致するとは限りません。
1406273940=ストア マネージャーによる編集が必要な未完了のシフトの数を示します (例: 従業員がシフト終了時に出勤/退勤を記録していない)。これらの打刻をタイムリーに編集しないストア マネージャーは、現在の週の給与を過少報告することになります。これらの打刻が編集され完了するまで、ストア マネージャーは給与をリリースできません。
1406273941=食事休憩の対象となるものの、食事時間の打刻が記録されていない勤務シフトの数を示します。店舗マネージャーと食事時間に関するポリシーを確認し、ポリシーと適用法を理解していることを確認します。
1406273942=店長が作成したスケジュールと一致しないタイム パンチの数です。これには、早出/遅出のタイム スタンプ、早出/遅出のタイム スタンプ、予定外のシフト、予定外の欠勤が含まれます。これらの状況を管理するのは店長の責任ですが、会社のポリシーを施行する店長の役割について店長を指導する必要があることを示す傾向が明らかになる場合があります。
1406273943=マネージャー編集
1406273944=店長が編集または手動で記録した従業員のタイム パンチです。店長による給与の変更は、少なく、頻繁に行うべきではありません。頻繁に編集する場合は、店長とともに賃金/時間ポリシーを確認し、従業員が勤務したすべての時間に対して賃金が支払われるようにする必要があります。
