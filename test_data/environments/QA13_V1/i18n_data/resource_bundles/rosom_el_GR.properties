1611021214=Η δραστηριότητα χωρίζεται σε υπο-δραστηριότητες. Οι εργασίες και οι χρόνοι εκτέλεσης καθορίζονται για την κύρια δραστηριότητα. Αλλά οι εκτιμήσεις του φόρτου εργασίας καθορίζονται για μεμονωμένες υπο-δραστηριότητες
1611021215=Ορίστε τις συνολικές ώρες FTE που θα αφιερώνονταν για τη δραστηριότητα για μία εβδομάδα. Στη συνέχεια, διαιρέστε τις συνολικές ώρες FTE σε συγκεκριμένο ποσοστό που πρέπει να γίνει σε διαφορετικές ώρες της εβδομάδας
1611021216=&quot;Η εκτίμηση φόρτου εργασίας για τέτοιες δραστηριότητες πραγματοποιείται στο τέλος των εκτιμήσεων για άλλες δραστηριότητες. Αυτό συμβαίνει επειδή, ο φόρτος εργασίας αυτής της δραστηριότητας προέρχεται από τις εκτιμήσεις φόρτου εργασίας όλων των άλλων δραστηριοτήτων&quot;
1611021217=&quot;Η εκτίμηση φόρτου εργασίας για τέτοιες δραστηριότητες εκτελείται λίγο πριν από τις&quot; Δραστηριότητες με βάση τον υπολογισμένο φόρτο εργασίας &quot;&quot;. Οι εικονικές δραστηριότητες (Ελάχιστες δραστηριότητες στελέχωσης) θα δημιουργηθούν εάν ο συνολικός υπολογισμός του φόρτου εργασίας είναι κάτω από τις ελάχιστες απαιτήσεις προσωπικού σας &quot;
1611021218=&quot;Περιλαμβάνει εκχώρηση δραστηριότητας, χρόνους εκτέλεσης δραστηριότητας και κανόνες υπολογισμού φόρτου εργασίας&quot;
