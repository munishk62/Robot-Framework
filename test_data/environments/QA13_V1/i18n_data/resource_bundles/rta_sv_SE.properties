1406273933=Måltidspolicy
1406273934=Om inte annat krävs enligt lag, ges anställda minst en 30 minuters obetald, oavbruten måltidsperiod (vanligtvis mot mitten av en anställds arbetspass) för skift som är större än eller lika med 6 schemalagda timmar men mindre än 8 timmar arbetade på en dag och för schemalagda skift lika med eller mer än 8 timmar, måste en timmes obetald måltidsperiod (varav minst 30 minuter måste vara oavbruten) tillhandahållas. Butikschefer eller nyckelbärare (i butikschefens frånvaro) bestämmer tidpunkten för måltidsperioden. Där statlig lag skiljer sig från kommer specifik statlig lag att följas. Om det finns några frågor angående måltidsperiodens krav i ett särskilt fall, kontakta distriktschefen.
1406273935=Ca. OT
1406273936=Närmar sig OT
1406273937=beräknar timmar av OT för en anställd om arbetade timmar WTD + återstående schemalagda timmar kommer att resultera i OT.
1406273938=Schemalägg poäng
1406273939=anger hur väl butikschefens skapade schema överensstämmer med det föreslagna schemat. Schemat som skapas av butikschefen kanske inte alltid stämmer överens med det föreslagna schemat, eftersom varje butikschef måste skapa ett schema som bäst möter behoven i hans/hennes butik.
1406273940=anger antalet ofullständiga skift som kräver redigering av butikschefen (t.ex. anställd misslyckas med att klocka in/ut i slutet av skiftet). Butikschefer som inte redigerar dessa stämplingar i tid kommer att underrapportera aktuell veckas lönelista. Butikschefer kommer inte att kunna släppa löner förrän dessa stämplingar är redigerade och slutförda.
1406273941=betecknar antalet arbetade skift som kvalificerade för matrast, men för vilka måltidsstämplingar inte registrerades. Gå igenom policyn för måltidsperioder med butikschefer för att säkerställa att de förstår policyn och tillämplig lag.
1406273942=är räkningar av tidsstötar som inte stämmer överens med det schema som skapats av butikschefen. Dessa inkluderar tidig/sen klocka in, tidig/sen klocka ut, oplanerat skift och oplanerad frånvaro. Dessa situationer är butikschefens ansvar att hantera, men kan avslöja trender som tyder på behovet av coachning av butikschefen angående hans/hennes roll i att upprätthålla företagets policy.
1406273943=Managerredigeringar
1406273944=är anställdas tidsstämplingar som har redigerats eller registrerats manuellt av butikschefen. Löneändringar av butikschefen bör vara få och sällsynta. Frekventa redigeringar tyder på behovet av att se över löne-/timmepolicyn med butikschefen för att säkerställa att anställda får betalt för alla arbetade timmar.
