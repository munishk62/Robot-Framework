1406273933=Patakaran sa Pagkain
1406273934=Maliban kung iniaatas ng batas, ang mga empleyado ay bibigyan ng hindi bababa sa isang 30 minutong walang bayad, walang patid na panahon ng pagkain (karaniwang nasa kalagitnaan ng shift ng isang empleyado) para sa mga shift na higit sa o katumbas ng 6 na nakatakdang oras ngunit wala pang 8 oras na nagtrabaho sa isang araw at para sa mga naka-iskedyul na shift na katumbas ng o higit sa 8 oras, isang oras na walang bayad na panahon ng pagkain (hindi bababa sa 30 minuto kung saan dapat na walang patid) ay dapat ibigay. Tinutukoy ng mga tagapamahala ng tindahan o pangunahing tagadala (sa kawalan ng tagapamahala ng tindahan) ang oras ng panahon ng pagkain. Kung saan naiiba ang batas ng estado, ang tiyak na batas ng estado ay susundin. Kung mayroong anumang mga katanungan tungkol sa mga kinakailangan sa panahon ng pagkain sa isang partikular na kaso, makipag-ugnayan sa manager ng distrito.
1406273935=Appr. OT
1406273936=Papalapit sa OT
1406273937=kinakalkula ang mga oras ng OT para sa isang empleyado kung ang mga oras na nagtrabaho WTD + natitirang oras na naka-iskedyul ay magreresulta sa OT.
1406273938=Iskor ng Iskedyul
1406273939=ay nagpapahiwatig kung gaano kahusay ang ginawang iskedyul ng Store Manager sa iminungkahing iskedyul. Ang iskedyul na ginawa ng Store Manager ay maaaring hindi palaging nakaayon sa iminungkahing iskedyul, dahil ang bawat Store Manager ay dapat gumawa ng iskedyul na pinakamahusay na nakakatugon sa mga pangangailangan ng kanyang tindahan.
1406273940=nagsasaad ng bilang ng mga hindi kumpletong shift na nangangailangan ng pag-edit ng Store Manager (hal., ang empleyado ay nabigo sa pag-clock in/out sa pagtatapos ng shift). Ang mga Store Manager na hindi nag-e-edit ng mga suntok na ito nang nasa oras ay mag-uulat ng kasalukuyang linggong payroll. Ang mga Store Manager ay hindi makakapaglabas ng payroll hanggang sa ma-edit at makumpleto ang mga suntok na ito.
1406273941=nagsasaad ng bilang ng mga nagtrabahong shift na kwalipikado para sa isang meal break, ngunit kung saan ang mga suntok sa oras ng pagkain ay hindi naitala. Suriin ang patakaran sa panahon ng pagkain kasama ng Mga Tagapamahala ng Tindahan upang matiyak na nauunawaan nila ang patakaran at naaangkop na batas.
1406273942=ay mga bilang ng mga suntok ng oras na hindi naaayon sa iskedyul na ginawa ng Store Manager. Kabilang dito ang maaga/huli na orasan, maaga/huli na orasan, hindi nakaiskedyul na shift at hindi nakaiskedyul na pagliban. Ang mga sitwasyong ito ay responsibilidad ng Store Managers na pamahalaan, ngunit maaaring magbunyag ng mga trend na nagmumungkahi ng pangangailangan para sa coaching ng Store Manager tungkol sa kanyang tungkulin sa pagpapatupad ng patakaran ng kumpanya.
1406273943=Mga Pag-edit ng Manager
1406273944=ay mga suntok sa oras ng empleyado na na-edit o manu-manong naitala ng Store Manager. Ang mga pagbabago sa payroll ng Store Manager ay dapat na kakaunti at madalang. Iminumungkahi ng madalas na pag-edit ang pangangailangang suriin ang patakaran sa sahod/oras kasama ang Store Manager upang matiyak na binabayaran ang mga empleyado para sa lahat ng oras na nagtrabaho.
