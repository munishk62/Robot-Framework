1611021214=Aktivität ist in Unteraktivitäten aufgeteilt. Für die Hauptaktivität sind Zuweisungen und Ausführungszeiten definiert. Die Schätzungen der Arbeitslast sind jedoch für einzelne Unteraktivitäten definiert
1611021215=Definieren Sie die VZÄ-Stunden, die für die Aktivität in einer Woche insgesamt aufgewendet werden. Teilen Sie dann die VZÄ-Gesamtstunden in einen bestimmten Prozentanteil auf, der zu verschiedenen Zeiten in der Woche zu leisten ist.
1611021216="Arbeitslastschätzung für solche Aktivitäten wird am Ende der Schätzungen für andere Aktivitäten ausgeführt. Dies liegt daran, dass die Arbeitsprognose dieser Aktivität aus den Arbeitslastschätzungen aller anderer Aktivitäten abgeleitet wird"
