1000000000637=La activación de los servicios de ubicación en el dispositivo permite realizar un seguimiento de su ubicación, lo que garantiza que cualquier transacción de reloj se registre con precisión en el sitio correspondiente. Esta función es esencial para el registro de horas con geolocalización, ya que garantiza que las entradas de tiempo se realizan dentro de los límites designados del sitio mientras se utiliza el dispositivo en la ubicación.
1000000000638=Confirmación de Términos y condiciones
1000000000639=Dado que los servicios de ubicación no se utilizan para este proceso de registro de reloj, revise y acepte los términos y condiciones.
1000000000640=Durante el proceso de registro del reloj, el sitio reconoce la responsabilidad de garantizar que todos los registros de horas se realizan dentro de las instalaciones de la ubicación registrada. El dispositivo debe montarse en la pared del sitio designado para evitar cualquier registro fuera del sitio. El sitio comprende la diligencia necesaria debido a la ausencia de funciones de geolocalización y reconoce estas responsabilidades para continuar.
