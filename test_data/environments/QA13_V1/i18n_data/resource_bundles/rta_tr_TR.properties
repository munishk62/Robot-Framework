1406273934=Yasa aksini gerektirmediği sürece, çalışanlara günde 6 veya daha fazla planlanmış saat ve 8 saatten az çalışılan vardiyalar için en az bir 30 dakikalık ücretsiz, kesintisiz yemek molası (genellikle bir çalışanın vardiyasının ortasına doğru) ve 8 veya daha fazla planlanmış vardiyalar için bir saatlik ücretsiz yemek molası (en az 30 dakikası kesintisiz olmalıdır) sağlanmalıdır. Mağaza müdürleri veya anahtar taşıyıcıları (mağaza müdürünün yokluğunda) yemek molasının zamanını belirler. Eyalet yasasının farklılık gösterdiği durumlarda, belirli eyalet yasası takip edilecektir. Belirli bir durumda yemek molası gereklilikleriyle ilgili herhangi bir soru varsa, bölge müdürüyle iletişime geçin.
