1406273939=Mağaza Müdürünün oluşturduğu programın önerilen programla ne kadar uyumlu olduğunu gösterir. Mağaza Müdürünün oluşturduğu program her zaman önerilen programla uyumlu olmayabilir, çünkü her Mağaza Müdürü kendi mağazasının ihtiyaçlarını en iyi karşılayan programı oluşturmalıdır.
1406273940=Mağaza Müdürünün düzenlemesini gerektiren tamamlanmamış vardiya sayısını belirtir (örneğin, çalışanın vardiya sonunda giriş/çıkış yapmaması). Bu zımbaları zamanında düzenlemeyen Mağaza Müdürleri, geçerli hafta bordrosunu eksik bildirecektir. Mağaza Müdürleri, bu zımbalar düzenlenip tamamlanana kadar bordroyu yayınlayamayacaktır.
1406273941=yemek molası için uygun olan ancak yemek zamanı fişlerinin kaydedilmediği çalışılan vardiya sayısını belirtir. Mağaza Müdürleri ile birlikte yemek dönemi politikasını gözden geçirerek politikayı ve geçerli yasayı anladıklarından emin olun.
1406273942=Mağaza Müdürü tarafından oluşturulan programa uymayan zaman damgası sayılarıdır. Bunlara erken/geç giriş, erken/geç çıkış, plansız vardiya ve plansız devamsızlık dahildir. Bu durumları yönetmek Mağaza Müdürünün sorumluluğundadır, ancak Mağaza Müdürünün şirket politikasını uygulamadaki rolüyle ilgili koçluk ihtiyacını gösteren eğilimleri ortaya çıkarabilir.
1406273943=Yönetici Düzenlemeleri
1406273944=Mağaza Müdürü tarafından düzenlenen veya elle kaydedilen çalışan zaman damgalarıdır. Mağaza Müdürü tarafından bordro değişiklikleri az ve seyrek olmalıdır. Sık yapılan düzenlemeler, çalışanların çalışılan tüm saatler için ödeme aldığından emin olmak için ücret/saat politikasının Mağaza Müdürü ile gözden geçirilmesi ihtiyacını gösterir.
