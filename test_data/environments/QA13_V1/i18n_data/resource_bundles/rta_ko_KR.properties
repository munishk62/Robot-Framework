1406273934=법률에 의해 달리 요구되지 않는 한, 직원은 하루에 6시간 이상 8시간 미만으로 근무하는 교대 근무의 경우 최소 30분의 무급, 중단 없는 식사 시간(일반적으로 직원의 교대 근무 중간쯤)을 제공받아야 하며, 8시간 이상인 교대 근무의 경우 1시간의 무급 식사 시간(최소 30분은 중단 없이)을 제공해야 합니다. 매장 관리자 또는 주요 담당자(매장 관리자가 없는 경우)가 식사 시간 시간을 결정합니다. 주법이 다른 경우 특정 주법이 적용됩니다. 특정 사례에서 식사 시간 요구 사항에 대한 질문이 있는 경우 지구 관리자에게 문의하십시오.
