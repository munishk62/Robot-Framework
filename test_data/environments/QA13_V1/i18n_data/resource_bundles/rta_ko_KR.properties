1406273938=일정 점수
1406273939=매장 관리자가 만든 일정이 제안된 일정과 얼마나 잘 일치하는지를 나타냅니다. 매장 관리자가 만든 일정은 항상 제안된 일정과 일치하지 않을 수 있습니다. 각 매장 관리자는 매장의 필요에 가장 잘 맞는 일정을 만들어야 하기 때문입니다.
1406273940=매장 관리자 편집이 필요한 미완료 교대 근무의 수를 나타냅니다(예: 직원이 교대 종료 시 출근/퇴근을 기록하지 못함). 이러한 펀칭을 적시에 편집하지 않는 매장 관리자는 현재 주 급여를 과소 보고합니다. 이러한 펀칭이 편집되고 완료될 때까지 매장 관리자는 급여를 발행할 수 없습니다.
1406273941=식사 휴식에 적격하지만 식사 시간 펀치가 기록되지 않은 근무 교대 수를 나타냅니다. 매장 관리자와 함께 식사 시간 정책을 검토하여 정책과 해당 법률을 이해하도록 합니다.
1406273942=매장 관리자가 만든 일정과 맞지 않는 타임 펀치 횟수입니다. 여기에는 일찍/늦게 출근, 일찍/늦게 퇴근, 예정되지 않은 교대근무 및 예정되지 않은 결근이 포함됩니다. 이러한 상황은 매장 관리자가 관리해야 할 책임이지만, 회사 정책을 시행하는 데 있어서 매장 관리자의 역할에 대한 코칭이 필요하다는 것을 시사하는 추세를 보일 수 있습니다.
