1406273939=Indica qué tan bien se alinea el cronograma creado por el gerente de tienda con el cronograma sugerido. Es posible que el cronograma creado por el gerente de tienda no siempre se alinee con el cronograma sugerido, ya que cada gerente de tienda debe crear un cronograma que se adapte mejor a las necesidades de su tienda.
1406273940=indica la cantidad de turnos incompletos que requieren la edición del gerente de tienda (por ejemplo, un empleado no registra su entrada o salida al final del turno). Los gerentes de tienda que no editen estos registros a tiempo informarán de manera insuficiente la nómina de la semana actual. Los gerentes de tienda no podrán liberar la nómina hasta que estos registros se editen y completen.
1406273941=Indica la cantidad de turnos trabajados que calificaron para un descanso para comer, pero para los cuales no se registraron los registros de la hora de comer. Revise la política del período de comida con los gerentes de la tienda para asegurarse de que comprendan la política y la ley aplicable.
1406273942=Son los recuentos de fichajes que no se alinean con el cronograma creado por el gerente de tienda. Estos incluyen entrada/salida temprana/tardía, turno no programado y ausencia no programada. Estas situaciones son responsabilidad del gerente de tienda, pero pueden revelar tendencias que sugieran la necesidad de capacitar al gerente de tienda sobre su rol en la aplicación de la política de la empresa.
1406273943=Ediciones del administrador
1406273944=Son registros de tiempo de empleados que han sido editados o registrados manualmente por el gerente de tienda. Las modificaciones de nómina por parte del gerente de tienda deben ser pocas y poco frecuentes. Las ediciones frecuentes sugieren la necesidad de revisar la política de salarios/horas con el gerente de tienda para garantizar que los empleados reciban el pago por todas las horas trabajadas.
