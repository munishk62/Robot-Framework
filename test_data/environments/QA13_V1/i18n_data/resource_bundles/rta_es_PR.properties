1406273934=A menos que la ley exija lo contrario, los empleados deben tener un mínimo de 30 minutos de tiempo para comer sin pago y sin interrupciones (normalmente hacia la mitad del turno de un empleado) para turnos mayores o iguales a 6 horas programadas pero menos de 8 horas trabajadas en un día y para turnos programados mayores o iguales a 8 horas, se debe proporcionar un tiempo para comer sin pago de una hora (al menos 30 minutos de los cuales deben ser ininterrumpidos). Los gerentes de tienda o los transportistas de llaves (en ausencia del gerente de tienda) determinan el tiempo del tiempo para comer. En los casos en que la ley estatal difiera, se seguirá la ley estatal específica. Si tiene alguna pregunta sobre los requisitos del tiempo para comer en un caso particular, comuníquese con el gerente de distrito.
