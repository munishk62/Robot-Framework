1406273938=Lịch thi đấu
1406273939=cho biết lịch trình do Quản lý cửa hàng tạo ra phù hợp với lịch trình được đề xuất như thế nào. Lịch trình do Quản lý cửa hàng tạo ra có thể không phải lúc nào cũng phù hợp với lịch trình được đề xuất, vì mỗi Quản lý cửa hàng phải tạo ra một lịch trình đáp ứng tốt nhất nhu cầu của cửa hàng mình.
1406273940=biểu thị số ca làm việc chưa hoàn thành yêu cầu Quản lý cửa hàng chỉnh sửa (ví dụ: nhân viên không chấm công vào/ra vào cuối ca). Quản lý cửa hàng không chỉnh sửa các bản chấm công này kịp thời sẽ báo cáo thiếu bảng lương tuần hiện tại. Quản lý cửa hàng sẽ không thể phát hành bảng lương cho đến khi các bản chấm công này được chỉnh sửa và hoàn tất.
1406273941=biểu thị số ca làm việc đủ điều kiện nghỉ ăn trưa, nhưng không ghi lại thời gian ăn trưa. Xem lại chính sách thời gian ăn trưa với Quản lý cửa hàng để đảm bảo rằng họ hiểu chính sách và luật hiện hành.
1406273942=là số lần chấm công không khớp với lịch trình do Quản lý cửa hàng tạo ra. Bao gồm chấm công sớm/muộn, chấm công sớm/muộn, ca làm việc không theo lịch trình và vắng mặt không theo lịch trình. Những tình huống này là trách nhiệm của Quản lý cửa hàng để quản lý, nhưng có thể tiết lộ xu hướng cho thấy cần phải hướng dẫn Quản lý cửa hàng về vai trò của mình trong việc thực thi chính sách của công ty.
1406273943=Quản lý chỉnh sửa
1406273944=là thời gian chấm công của nhân viên đã được Quản lý cửa hàng chỉnh sửa hoặc ghi lại thủ công. Việc Quản lý cửa hàng sửa đổi bảng lương phải ít và không thường xuyên. Việc chỉnh sửa thường xuyên cho thấy cần phải xem xét chính sách tiền lương/giờ làm việc với Quản lý cửa hàng để đảm bảo nhân viên được trả lương cho tất cả các giờ làm việc.
