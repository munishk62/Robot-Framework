1406273934=Trừ khi luật pháp yêu cầu khác, nhân viên được cung cấp tối thiểu một khoảng thời gian ăn không lương, không bị gián đoạn trong 30 phút (thường là vào giữa ca làm việc của nhân viên) đối với các ca làm việc dài hơn hoặc bằng 6 giờ theo lịch trình nhưng ít hơn 8 giờ làm việc trong một ngày và đối với các ca làm việc theo lịch trình bằng hoặc lớn hơn 8 giờ, phải cung cấp một khoảng thời gian ăn không lương trong một giờ (ít nhất 30 phút trong số đó phải không bị gián đoạn). Người quản lý cửa hàng hoặc người giữ chìa khóa (khi không có người quản lý cửa hàng) sẽ xác định thời gian của khoảng thời gian ăn. Trong trường hợp luật của tiểu bang khác, luật cụ thể của tiểu bang sẽ được tuân theo. Nếu có bất kỳ câu hỏi nào liên quan đến các yêu cầu về khoảng thời gian ăn trong một trường hợp cụ thể, hãy liên hệ với người quản lý khu vực.
