1000000000636=Zakończ i kontynuuj
1000000000637=Włączenie usługi lokalizacji w urządzeniu umożliwia śledzenie jego lokalizacji, aby mieć pewność, że wszelkie transakcje rejestratora czasu pracy są dokładnie rejestrowane w odpowiedniej lokalizacji. Funkcja ta jest niezbędna do rejestrowania odbić w granicach wirtualnego ogrodzenia, co zapewnia, że czas jest rejestrowany w wyznaczonych granicach lokalizacji i możliwa swobodne używanie urządzenia na jej terenie.
1000000000638=Akceptacja warunków korzystania
1000000000639=W związki z tym, że usługi lokalizacji nie są wykorzystywane w tym procesie rejestracji rejestratora czasu pracy, należy przeczytać i zaakceptować warunki korzystania.
1000000000640=W procesie rejestracji rejestratora czasu pracy kierownictwo w danej lokalizacji przyjmuje na siebie odpowiedzialność za rejestrowanie wszystkich odbić na terenie zarejestrowanej lokalizacji. Urządzenie musi być stabilnie zamontowane na ścianie w wyznaczonym miejscu, uniemożliwiającym zarejestrowanie czasu pracy poza terenem miejsca pracy. Kierownictwo sklepu rozumie konieczność zachowania należytej staranności ze względu na brak funkcji wirtualnego ogrodzenia i przyjmuje na siebie te obowiązki, aby kontynuować proces.
