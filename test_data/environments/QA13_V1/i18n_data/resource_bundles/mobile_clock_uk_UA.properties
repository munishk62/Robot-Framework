1000000000637=Enabling location services on the device allows it to track its location, ensuring that any clock transactions are accurately registered to the appropriate site. This feature is essential for recording geofenced punches, providing assurance that time entries are made within the designated boundaries of the site while using the device conveniently across the location.(g)
1000000000638=Terms and Conditions Acknowledgment(g)
1000000000639=Given that location services are not utilized for this clock registration process, please review and acknowledge the terms and conditions.(g)
1000000000640=During the clock registration process, the site acknowledges responsibility for ensuring that all time punches are recorded within the premises of the registered location. The device must be securely wall-mounted at the designated site to prevent any off-site punches. The site understands the diligence required due to the absence of geofencing capabilities and acknowledges these responsibilities in order to proceed.(g)
