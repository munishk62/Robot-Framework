timeclock.help.troubleshooting_tips=Jeśli nie widzisz opcji suwaka, odśwież stronę rejestratora czasu pracy, naciskając ikonę „Odśwież” lub „Przewiń do góry” na stronie, aby wyświetlić przyciski.
timeclock.help.view_punchcard=Aby śledzić i analizować przepracowane godziny, wyświetl łączny czas zmiany i szczegółową oś czasu odbić, w tym godziny i ostrzeżenia. Pomaga to zidentyfikować wzorce pracy i szybko rozwiązać rozbieżności. Po pomyślnym rozpoczęciu pracy stuknij ikonę Więcej (3 kropki) w prawym górnym rogu, a następnie stuknij opcję „Wyświetl kartę odbić”.
