timeclock.help.break=Niektóre organizacje oferują krótkie przerwy w trakcie pracy. Jeśli taka opcja została skonfigurowana, karta czasu pracy wyświetli początek i koniec przerwy, aby zapewnić zgodność z przepisami i prawidłowe rejestrowanie czasu pracy. Aby rozpocząć przerwę, stuknij i przytrzymaj przycisk „Zrób przerwę”. Aby zakończyć przerwę, przesuń suwak „Zakończ przerwę” z lewej strony na prawą.
timeclock.help.break_periods=Okresy przerw są aktywowane za pomocą działania „naciśnij i przytrzymaj”
timeclock.help.clock_in1=Możesz rozpocząć racę na zmianie maks. 8 minut przed planowaną zmianą.
timeclock.help.clock_in2=Aby zarejestrować odbicie, naciśnij i przeciągnij suwak na ekranie.
timeclock.help.clock_in_new=Łatwo rozpocznij pracę jednym ruchem palca — aby rozpocząć pracę, przesuń suwak „Rozpoczęcie pracy” od lewej do prawej strony. Po rozpoczęciu użytkownik uzyskuje natychmiastowy dostęp do stanu rozpoczęcia pracy, łącznego czasu, który upłynął, oraz osi czasu nadchodzących zadań i transakcji. Transakcja rozpoczęcia pracy nie jest dozwolona poza skonfigurowanym przedziałem czasowym, który jest ustalany przez Twoją organizację.
timeclock.help.clock_out=Po zakończeniu zmiany pojawi się suwak zakończenia pracy. Naciśnij i przeciągnij suwak, aby zarejestrować odbicie.
timeclock.help.clock_out_early=Jeśli musisz zakończyć pracę przed końcem zmiany, możesz długo nacisnąć ten przycisk, gdy nie ma Cię w grafiku.
timeclock.help.clock_out_early_new=Zwróć uwagę, że suwak nie jest dostępny dla sytuacji wcześniejszego zakończenia pracy. Zamiast tego użytkownicy muszą nacisnąć i przytrzymać przycisk „Zakończenie pracy”, aby pomyślnie zarejestrować odbicie.
timeclock.help.clock_out_new=Łatwo zakończ pracę jednym ruchem palca — aby zakończyć pracę, przesuń suwak „Zakończenie pracy” od lewej do prawej strony. Zakończ pracę, aby dokładnie zarejestrować koniec okresu pracy i zaktualizować swoje dane dotyczące frekwencji.
timeclock.help.incorrect_punch=Jeśli chcesz poprawić znacznik czasu na odbiciu, musisz przesłać korektę karty czasu pracy do swojego kierownika.
timeclock.help.meal=Rejestruj czas rozpoczęcia i zakończenia posiłku, aby zapewnić zgodność z przepisami i prawidłowe rejestrowanie czasu pracy. Aby rozpocząć przerwę na posiłek, stuknij i przytrzymaj przycisk „Idź na posiłek”. Aby zakończyć przerwę na posiłek, przesuń suwak „Zakończ posiłek” z lewej strony na prawą.
timeclock.help.missing_incorrect_punches=W przypadku pominiętych odbić lub nieprawidłowych znaczników czasu na odbiciu, należy pamiętać o menu „Nadpisanie przez kierownika”, które służy do rozwiązywania takich problemów. Menu to jest dostępne dla kierownika, który może pomóc w poprawieniu wszelkich rozbieżności. Należy skontaktować się z kierownikiem, aby skutecznie korzystać z tej funkcji.
timeclock.help.missing_punches=W razie pominięcia odbić i konieczności wprowadzenia innej funkcji należy skontaktować się z kierownikiem w celu nadpisania sekwencji odbić.
timeclock.help.switch_stores=Jeśli znajdujesz się w pobliżu wielu stacji/lokalizacji, masz możliwość przełączania się między nimi. Aby to zrobić, po prostu kliknij „Zmień stację” i wybierz odpowiednią lokalizację.
