timeclock.help.clock_in_v2=Rozpoczęcie pracy jest proste — wystarczy stuknąć przycisk „Rozpoczęcie pracy”. Po rozpoczęciu pracy natychmiast zobaczysz swój stan rozpoczęcia pracy, łączny czas, który upłynął, oraz oś czasu nadchodzących zadań i transakcji. Uwaga: rozpocząć pracę można tylko w wyznaczonym przez Twoją organizację przedziale czasowym.(g)
timeclock.help.clock_out_v2=Łatwo zakończ pracę pod koniec okresu pracy, stukając przycisk „Zakończenie pracy”. Pomaga to dokładnie zarejestrować koniec zmiany i utrzymać aktualne dane dotyczące frekwencji.(g)
timeclock.help.clock_out_early_v2=Aby zakończyć pracę wcześniej, użytkownicy muszą stuknąć przycisk „Zakończenie pracy”, aby pomyślnie zarejestrować swoje odbicie. Pojawi się monit potwierdzenia, aby upewnić się, że transakcja została zakończona.(g)
timeclock.help.meal_v2=Aby promować zgodność z przepisami i dokładne rejestrowanie czasu, ważne jest, aby rejestrować zarówno początek, jak i koniec przerw na posiłek. Aby rozpocząć przerwę na posiłek, stuknij przycisk „Idź na posiłek”. Po zakończeniu przerwy na posiłek zakończ ją, stukając przycisk „Zakończ posiłek”.(g)
timeclock.help.break_v2=Niektóre organizacje oferują krótkie przerwy w trakcie pracy. Jeśli taka opcja została skonfigurowana, karta czasu pracy wyświetli czas rozpoczęcia i zakończenia przerwy, aby zapewnić zgodność z przepisami i prawidłowe rejestrowanie czasu pracy. Aby rozpocząć przerwę, stuknij przycisk „Zrób przerwę”. Gdy będziesz gotowy wrócić do pracy, stuknij przycisk „Zakończ przerwę”.(g)
timeclock.button.hint_v2=Stuknij, aby wykonać czynność(g)
