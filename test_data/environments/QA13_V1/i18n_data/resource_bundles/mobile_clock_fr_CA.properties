1000000000640=Au cours du processus d’enregistrement de l’horloge, le site reconnaît sa responsabilité de veiller à ce que tous les pointages soient enregistrés dans les locaux de l’emplacement enregistré. L’appareil doit être solidement fixé au mur à l’emplacement désigné afin d’empêcher tout pointage hors site. Le site comprend la diligence requise en raison de l’absence de capacités de géorepérage et reconnaît ces responsabilités afin de pouvoir poursuivre.
