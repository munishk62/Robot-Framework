1406273934=A menos que la ley exija lo contrario, se concederá a los empleados un mínimo de 30 minutos de comida ininterrumpida y no remunerada (normalmente hacia la mitad del turno de un empleado) para turnos superiores o iguales a 6 horas programadas pero inferiores a 8 horas trabajadas en un día y para turnos programados iguales o superiores a 8 horas, se debe proporcionar un periodo de comida no remunerada de una hora (al menos 30 minutos de los cuales deben ser ininterrumpidos). Los jefes de tienda o los principales transportistas (en ausencia del jefe de tienda) determinan la hora de la comida. Cuando la ley estatal difiere de, se seguirá la ley estatal específica. Si hay alguna pregunta con respecto a los requisitos del periodo de comida en un caso particular, comuníquese con el administrador del distrito.
1406273935=Horas extras
1406273936=Acercándose a las horas extras
1406273937=calcula las horas de horas extra de un empleado si las horas trabajadas hasta la fecha + las horas restantes programadas resultarán en horas extra.
1406273938=Puntuación del horario
1406273939=Indica en qué medida el horario creado por el responsable de tienda se alinea con el horario sugerido. Es posible que el horario creado por el responsable de tienda no esté siempre alineado con el horario sugerido, ya que cada responsable de tienda debe crear el horario que mejor se adapte a las necesidades de su tienda.
1406273940=indica el número de turnos incompletos que requieren la edición del responsable de tienda (p. ej., el empleado no registra la entrada/salida al final del turno). Los responsables de tienda que no editen estos registros de horas a tiempo se incluirán en la nómina de la semana actual del informe. Los responsables de tienda no podrán liberar la nómina hasta que estos registros de horas se hayan editado y completado.
1406273941=indica el número de turnos trabajados que calificaron para un descanso de comida, pero para los que no se registraron los registros de horas de comida. Revise la política de periodos de comidas con los gerentes de tienda para asegurarse de que entienden la política y la ley aplicable.
1406273942=son recuentos de registros de horas que no se ajustan a la programación creada por el responsable de tienda. Estos incluyen registro de entrada temprano/tarde, registro de salida temprano/tarde, turno no programado y ausencia no programada. Estas situaciones son responsabilidad de los responsables de tienda, pero pueden revelar tendencias que sugieren la necesidad de formación del responsable de tienda con respecto a su función en la aplicación de la política de la empresa.
1406273943=Editado por el responsable
1406273944=son registros de horas de los empleados que el responsable de tienda ha editado o registrado manualmente. Las modificaciones de nómina por parte del responsable de tienda deben ser escasas y poco frecuentes. Las ediciones frecuentes sugieren la necesidad de revisar la política de salario/horas con el responsable de tienda para asegurarse de que se paga a los empleados por todas las horas trabajadas.
