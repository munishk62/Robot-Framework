1406273933=Maaltijdbeleid
1406273934=Tenzij wettelijk anders vereist, moeten werknemers ten minste één onbetaalde, ononderbroken maaltijdperiode van 30 minuten (meestal halverwege de dienst van een werknemer) krijgen voor ploegen van 6 geplande uren of meer, maar minder dan 8 uur per dag gewerkte uren en voor geplande ploegen gelijk aan of groter dan 8 uur, moet een onbetaalde maaltijdperiode van één uur (waarvan ten minste 30 minuten ononderbroken moeten zijn) worden verstrekt. Locatiemanagers of sleuteldragers (bij afwezigheid van de locatiemanager) bepalen het tijdstip van de maaltijdperiode. Wanneer het staatsrecht afwijkt van het nationale recht, zal het specifieke staatsrecht worden gevolgd. Als u vragen hebt over de vereisten voor de maaltijdperiode in een bepaald geval, neemt u contact op met de districtmanager.
1406273935=Nad. OW
1406273936=Naderend OW
1406273937=Berekent uren OW voor een werknemer als gewerkte uren WTD + resterende geplande uren zullen resulteren in OW.
1406273938=Planningsefncore
1406273939=Geeft aan hoe goed de door de locatiemanager gemaakte planning overeenkomt met de voorgestelde planning. De planning die door de locatiemanager wordt opgesteld, is mogelijk niet altijd in overeenstemming met de voorgestelde planning, omdat elke locatiemanager een planning moet maken die het beste aansluit op de behoeften van zijn/haar locatie.
1406273940=geeft het aantal onvolledige diensten aan waarvoor de locatiemanager bewerkingen moet uitvoeren (bijv. werknemer kan niet in-/uitklokken aan het einde van de dienst). Locatiemanagers die deze ponsen niet tijdig bewerken, rapporteren het salaris van de huidige week. Locatiemanagers kunnen het salaris pas vrijgeven als deze ponsen zijn bewerkt en voltooid.
1406273941=geeft het aantal gewerkte diensten aan dat in aanmerking kwam voor een maaltijdpauze, maar waarvoor geen ponstijden voor maaltijden werden geregistreerd. Neem het beleid voor de maaltijdperiode door met locatiemanagers om er zeker van te zijn dat ze het beleid en de toepasselijke wetgeving begrijpen.
1406273942=zijn tellingen van ponstijden die niet overeenkomen met het schema dat door de locatiemanager is gemaakt. Dit omvat vroeg/laat inklokken, vroeg/laat uitklokken, ongeplande diensten en ongeplande afwezigheid. Deze situaties vallen onder de verantwoordelijkheid van de locatiemanagers, maar kunnen trends aan het licht brengen die erop wijzen dat locatiemanagers moeten worden gecoacht met betrekking tot hun rol bij het handhaven van het bedrijfsbeleid.
1406273943=Bewerkingen door manager
1406273944=zijn ponstijden van medewerkers die zijn bewerkt of handmatig zijn vastgelegd door de locatiemanager. Salariswijzigingen door de locatiemanager moeten weinig en onregelmatig voorkomen. Frequente bewerkingen suggereren dat het loon/uurbeleid moet worden herzien met de locatiemanager om ervoor te zorgen dat werknemers worden betaald voor alle gewerkte uren.
1406273945=Systeem is bezig met het opnieuw verwerken van het opbouwsaldo. Een ogenblik geduld.
