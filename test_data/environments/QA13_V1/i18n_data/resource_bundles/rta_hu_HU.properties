1406273934=Ha jogszabály eltérően nem írja elő, a munkavállalóknak legalább egy 30 perces, fizetés nélküli, megszakítás nélküli étkezési időszakot kell biztosítani (jellemzően a munkavállaló műszakának közepe felé), ha a munkaidő legalább 6 óra, de kevesebb, mint 8 óra munkaidő, a 8 órás vagy azt meghaladó ütemezett műszakok esetén egy óra fizetés nélküli étkezési időt (ebből legalább 30 percet megszakítás nélkül) kell biztosítani. Az étkezési időszak idejét az üzletvezetők vagy a kulcshordozók (az üzletvezető távollétében) határozzák meg. Ahol az állam törvényei eltérnek, ott meghatározott állami törvényeket kell követni. Ha kérdése van az étkezési időszak követelményeivel kapcsolatban egy adott esetben, forduljon a körzetvezetőhöz.
1406273935=kb. OT
1406273936=Közeledik az OT
1406273937=kiszámolja az OT óráit egy alkalmazottra, ha a WTD ledolgozott órák + az ütemezett hátralévő órák OT-t eredményeznek.
1406273938=Menetrend Pontszám
1406273939=jelzi, hogy az üzletvezető által létrehozott ütemezés mennyire illeszkedik a javasolt ütemezéshez. Előfordulhat, hogy az üzletvezető által készített órarend nem mindig illeszkedik a javasolt ütemezéshez, mivel minden üzletvezetőnek olyan ütemtervet kell készítenie, amely a legjobban megfelel az üzlete igényeinek.
1406273940=a nem teljes műszakok számát jelöli, amelyeknél az üzletvezető szerkesztése szükséges (pl. az alkalmazott nem tud be- és kimenni a műszak végén). Azok az üzletvezetők, akik nem szerkesztik időben ezeket az ütéseket, az aktuális heti bérszámfejtést jelentik. Az üzletvezetők nem adhatják ki a bérjegyzéket mindaddig, amíg ezeket a beütéseket meg nem szerkesztik és be nem fejezik.
1406273941=azoknak a ledolgozott műszakoknak a számát jelöli, amelyek étkezési szünetre jogosultak, de amelyeknél étkezési időütéseket nem rögzítettek. Tekintse át az étkezési időszakra vonatkozó szabályzatot az üzletvezetőkkel annak biztosítására, hogy megértsék a szabályzatot és a vonatkozó jogszabályokat.
1406273942=olyan időütések száma, amelyek nem illeszkednek az üzletvezető által létrehozott ütemezéshez. Ide tartozik a korai/késői belépés, a korai/késői kilépés, a nem tervezett műszak és a nem tervezett távollét. Ezek a helyzetek az üzletvezető felelősségi körébe tartoznak, de feltárhatnak olyan tendenciákat, amelyek arra utalnak, hogy az üzletvezető coachingra van szüksége a vállalati politika érvényesítésében betöltött szerepével kapcsolatban.
1406273943=Menedzser szerkesztések
1406273944=olyan alkalmazotti időütések, amelyeket az üzletvezető szerkesztett vagy manuálisan rögzített. Az üzletvezető által végzett bérszámfejtési módosításoknak kevésnek és ritkán kell lenniük. A gyakori szerkesztések azt sugallják, hogy felül kell vizsgálni a bér/óra szabályzatot az üzletvezetővel, hogy az alkalmazottak minden ledolgozott óráért fizetést kapjanak.
