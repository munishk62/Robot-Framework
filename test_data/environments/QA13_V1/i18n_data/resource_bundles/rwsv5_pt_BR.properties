rosom.calMethod.exprBuilder.engineSpecific.taskDate.description=Retorna apenas o valor de data do intervalo de tempo de entrada no formato ddMMaaa
rosom.calMethod.exprBuilder.engineSpecific.taskDate.example=Se a data do intervalo da tarefa for 01 de janeiro de 2020. Isso será avaliado para retornar o valor da data do intervalo no formato ddMMaaaa - 01012020.
rosom.calMethod.exprBuilder.engineSpecific.taskTime.description=Retorna apenas minutos do intervalo de tempo de entrada
rosom.calMethod.exprBuilder.engineSpecific.taskTime.example=Se o tempo de intervalo da tarefa for 9 horas. Isso será avaliado para retornar o valor do intervalo em minutos - 540.
rosom.calMethod.exprBuilder.scheduledEvent.attribute=Qualquer evento programado. Por exemplo, loja aberta
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.description=Retorna a duração do evento em minutos para um dia em uma semana para a qual ele está avaliando.
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.example=A loja tem um evento programado com uma duração de 1 hora que ocorre no dia em que está avaliando. Em seguida, a expressão retornará 60 como a saída do método de cálculo.
rosom.calMethod.exprBuilder.scheduledEvent.endTime.description=Duração da hora de término de um evento agendado em minutos
rosom.calMethod.exprBuilder.scheduledEvent.endTime.example=A loja tem um evento programado com horário de início às 9 da manhã e duração de 9 horas. Portanto, o evento termina às 18h. Então a expressão retornará 1080 como resultado do método de cálculo.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.description=Verifica se um evento programado ocorrerá no número de dias antes ou depois do dia em uma semana para a qual ele está avaliando.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.example=A expressão seria da forma [SCHDEVENT].[Store Open].[occursAfterDays(a)] onde a é o número do dia. Se a é um número positivo, então é considerado como após dias, por exemplo [SCHDEVENT].[ Store Open].[occursAfterDays (1)] - Esta expressão retorna true se o evento Store Open ocorrer no dia seguinte. Enquanto o número negativo representa dias anteriores. Por exemplo [SCHDEVENT].[Store Open].[occursAfterDays(-1)] - Esta expressão retorna true se o evento Store Open ocorrer no dia anterior.
rosom.calMethod.exprBuilder.scheduledEvent.startTime.description=Duração da hora de início de um evento agendado em minutos
rosom.calMethod.exprBuilder.scheduledEvent.startTime.example=A loja tem um evento programado com hora de início como 9 h. Em seguida, a expressão retornará 540 como resultado do método de cálculo.
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.description=Retorna a soma da duração do evento em minutos para todos os dias em uma semana
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.example=A loja tem um evento programado com duração de 1 hora que ocorre em todos os dias da semana. Então, a expressão retornará 420 como saída do método de cálculo.
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.description=Número de ocorrências de um evento programado em uma semana
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.example=A loja tem um evento programado que é aplicável para todos os dias em uma semana. A expressão retornará 7 como resultado do método de cálculo.
