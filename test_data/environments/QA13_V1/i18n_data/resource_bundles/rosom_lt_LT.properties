1611021215=Apibrėžkite bendrą valandų skaičių, tenkantį visos darbo dienos ekvivalentui, kuris būtų skirtas veiklai per vieną savaitę. Tada padalykite visas FTE valandas į tam tikrą procentinę dalį, kurią reikia atlikti skirtingu savaitės laiku.
1611021216=„Tokios veiklos darbo krūvio įvertinimas atliekamas baigiant kitų veiklų įvertinimą. Taip yra todėl, kad šios veiklos darbo krūvis apskaičiuojamas pagal visų kitų veiklos rūšių darbo krūvio įvertinimą.“
1611021217=„Tokios veiklos darbo krūvio įvertinimas atliekamas prieš pat veiklą pagal apskaičiuotą darbo krūvį“. Jei bendras apskaičiuotas darbo krūvis yra mažesnis už jūsų minimalius personalo reikalavimus, bus sukurtas veiklos maketas (minimalaus personalo veikla).“
