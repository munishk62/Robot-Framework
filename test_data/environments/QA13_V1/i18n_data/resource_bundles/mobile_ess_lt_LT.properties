1000000003769=Patvirtinu, kad savanoriškai sutinku dirbti pasirinktoje pamainoje.  Suprantu, kad vadovybės prašymas ar raginimas savanoriškai pakeisti savo grafiką arba savanoriškai pasirinkti šią pamainą nekeičia fakto, kad galiu atsisakyti pakeisti savo grafiką arba pasirinkti pamainą ir kad dėl mano pasirinkimo nebus imtasi jokių neigiamų veiksmų.  Jei savanoriškai sutinku dirbti pamainoje, suprantu, kad pagal lankomumo taisykles galiu būti traukiamas atsakomybėn, jei nedirbsiu pasirinktoje pamainoje pagal grafiką.
