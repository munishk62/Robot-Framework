1406273934=Salvo que la ley disponga lo contrario, se debe otorgar a los empleados un período para comer sin interrupciones y no remunerado de 30 minutos (generalmente hacia la mitad del turno) cuando trabajen 6 o más horas programadas, pero menos de 8 horas reales en un día. Para turnos programados de 8 horas o más, se deberá conceder un período para comer no remunerado de una hora, del cual al menos 30 minutos deben ser sin interrupciones. La hora en que se otorga el período para comer será determinada por el gerente de tienda o, en su ausencia, por el encargado de las llaves. En los casos en que la legislación estatal establezca disposiciones distintas, se aplicará la normativa correspondiente de ese estado. Si tiene alguna duda respecto a los requisitos del período para comer en una situación específica, comuníquese con el gerente de distrito.
1406273935=OT aprox.
1406273936=Próximo al tiempo extra
1406273937=calcula las horas de OT para un empleado si las horas trabajadas WTD + las horas restantes programadas darán como resultado la OT.
1406273938=Puntuación del programa
1406273939=indica qué tan bien se alinea la programación creada por el gerente de tienda con la programación sugerida. Es posible que la programación creada por el gerente de tienda no siempre esté alineada con la programación sugerida, ya que cada gerente de tienda debe crear una programación que satisfaga mejor las necesidades de su tienda.
1406273940=indica la cantidad de turnos incompletos que requieren edición por parte del gerente de tienda (p. ej., el empleado no registra la entrada/salida al final del turno). Los gerentes de tienda que no editen estos registros de forma oportuna informarán incorrectamente una nómina inferior a la de la semana en curso. Los gerentes de tienda no podrán liberar la nómina hasta que se editen y completen estos registros.
1406273941=indica el número de turnos trabajados que calificaron para un descanso para comer, pero para los cuales no se registraron marcaciones de tiempo. Revise la política de períodos para comer con los gerentes de tienda a fin de asegurarse de que comprendan la política y la ley aplicable.
1406273942=son conteos de tarjetas de registro de hora que no coinciden con la programación creada por el gerente de tienda. Se incluyen: registro de entrada/salida temprana/tardía, turno no programado y ausencia no programada. Estas situaciones son responsabilidad administrativa de los gerentes de tienda, pero pueden reflejar tendencias que sugieren la necesidad de capacitación del gerente de tienda con respecto a su función en la aplicación de la política de la empresa.
1406273943=Ediciones del gerente
1406273944=son las tarjetas de registro de hora de los empleados que el gerente de tienda ha editado o registrado manualmente. Las modificaciones de nómina realizadas por el gerente de tienda deberían ser pocas y poco frecuentes. Las ediciones frecuentes sugieren la necesidad de revisar la política de salarios/horas con el gerente de tienda a fin de garantizar que se pague a los empleados por todas las horas trabajadas.
