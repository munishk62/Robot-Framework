1406273938=Suplanuokite balą
1406273939=nurodo, kaip parduotuvės vadovo sukurtas tvarkaraštis atitinka siūlomą tvarkaraštį. Parduotuvės vadovo sukurtas tvarkaraštis ne visada gali sutapti su siūlomu grafiku, nes kiekvienas Parduotuvės vadovas turi sudaryti grafiką, kuris geriausiai atitiktų jo parduotuvės poreikius.
1406273940=žymi nebaigtų pamainų, kurioms reikalingas parduotuvės vadovo redagavimas, skaičių (pvz., darbuotojui nepavyksta įsijungti / išeiti pamainos pabaigoje). Parduotuvių vadovai, kurie laiku neredaguoja šių ženklų, praneš apie einamąją savaitę. Parduotuvių vadovai negalės išleisti darbo užmokesčio, kol šie ženklai nebus suredaguoti ir užpildyti.
1406273941=žymi išdirbtų pamainų, kurioms buvo suteikta pertrauka pavalgyti, skaičių, kurioms valgymo laiko smūgiai nebuvo užfiksuoti. Kartu su parduotuvės vadovais peržiūrėkite maitinimo laikotarpio politiką, kad įsitikintumėte, jog jie supranta politiką ir taikomus įstatymus.
1406273942=yra laiko paspaudimų, kurie neatitinka parduotuvės vadovo sukurto tvarkaraščio, skaičiai. Tai apima ankstyvą / vėlyvą įėjimą, ankstyvą / vėlyvą išėjimą, neplanuotą pamainą ir neplanuotą nebuvimą. Šias situacijas turi valdyti parduotuvės vadovai, tačiau jos gali atskleisti tendencijas, kurios rodo, kad Parduotuvės vadovui reikia instruktuoti apie jo vaidmenį įgyvendinant įmonės politiką.
1406273943=Vadovas redaguoja
1406273944=yra darbuotojų laiko žymos, kurias redagavo arba rankiniu būdu įrašė parduotuvės vadovas. Parduotuvės vadovo atliekamų darbo užmokesčio pakeitimų turėtų būti nedaug ir jie turėtų būti reti. Dažni pakeitimai rodo, kad reikia kartu su parduotuvės vadovu peržiūrėti darbo užmokesčio / valandų politiką, kad darbuotojai būtų apmokami už visas dirbtas valandas.
