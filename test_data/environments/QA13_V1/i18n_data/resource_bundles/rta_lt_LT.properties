1406273934=Jei įstatymai nenustato kitaip, darbuotojams suteikiamas ne trumpesnis kaip vienas 30 minučių nepertraukiamo nemokamo maitinimo laikotarpis (paprastai darbuotojo pamainos viduryje), kai pamainos ilgesnės arba lygios 6 pagal grafiką, bet mažiau nei 8 valandos per dieną ir 8 valandų ar ilgesnėms suplanuotoms pamainoms turi būti numatytas vienos valandos nemokamo maitinimo laikotarpis (iš kurio ne mažiau kaip 30 minučių turi būti nepertraukiamas). Parduotuvės vadovai arba raktų vežėjai (nesant parduotuvės vadovo) nustato maitinimo laikotarpio laiką. Jei valstijos teisė skiriasi nuo valstybės teisės, bus vadovaujamasi konkrečiais valstijos įstatymais. Kilus klausimų dėl maitinimo laikotarpio reikalavimų konkrečiu atveju, kreipkitės į rajono vadovą.
1406273935=Apytiksliai OT
1406273936=Numatomi viršvalandžiai
