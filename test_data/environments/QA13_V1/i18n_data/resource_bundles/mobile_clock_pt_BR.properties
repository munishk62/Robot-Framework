1000000000637=Ativar os serviços de localização no dispositivo permite rastrear sua localização, garantindo que todas as transações de relógio sejam registradas corretamente no local apropriado. Esse recurso é essencial para registros com cercas geográficas, oferecendo a garantia de que os pontos são feitos dentro dos limites designados do local, enquanto o dispositivo é utilizado de forma prática em toda a área.
1000000000638=Confirmação dos Termos e condições
1000000000639=Como os serviços de localização não são utilizados para este processo de registro de relógio, revise e aceite os termos e condições.
1000000000640=Durante o processo de registro do relógio, o local reconhece a responsabilidade de garantir que todos os registros de ponto sejam feitos dentro das dependências da localização registrada. O dispositivo deve estar fixado de forma segura na parede no local designado para evitar registros fora do local. O local compreende a diligência necessária devido à ausência de recursos de cercas geográficas e reconhece essas responsabilidades para prosseguir.
