1406273934=Ellei laki toisin edellytä, työntekijöille on annettava vähintään yksi 30 minuutin palkaton, keskeytymätön ruokailuaika (yleensä työntekijän työvuoron puolivälissä) työvuoroissa, jotka ovat vähintään 6 tuntia, mutta alle 8 tuntia päivässä. 8 tunnin tai sitä suurempien työvuorojen osalta on järjestettävä yhden tunnin palkaton ateriajakso (josta vähintään 30 minuuttia on oltava keskeytymätöntä). Myymäläpäälliköt tai avainkuljettajat (myymäläpäällikön poissa ollessa) määräävät ruokailuajan ajan. Jos osavaltion laki poikkeaa, noudatetaan tiettyä osavaltion lakia. Jos sinulla on kysyttävää ateriajaksovaatimuksista tietyssä tapauksessa, ota yhteyttä piirin johtajaan.
1406273935=Noin OT
1406273936=Lähestymme OT:ta
1406273937=laskee työntekijän OT-tunnit, jos työtunnit WTD + jäljellä olevat työtunnit johtavat OT: hen.
1406273938=Aikataulu Pisteet
1406273939=osoittaa, kuinka hyvin Store Managerin luoma aikataulu vastaa ehdotettua aikataulua. Myymäläpäällikön luoma aikataulu ei välttämättä aina vastaa ehdotettua aikataulua, koska jokaisen myymäläpäällikön on laadittava aikataulu, joka parhaiten vastaa hänen myymälänsä tarpeita.
1406273940=ilmaisee keskeneräisten työvuorojen määrää, jotka edellyttävät myymäläpäällikön muokkausta (esim. työntekijä ei kelpaa sisään/ulos työvuoron lopussa). Myymäläpäälliköt, jotka eivät muokkaa näitä leimauksia ajoissa, raportoivat kuluvan viikon palkkalaskelman. Myymäläpäälliköt eivät voi vapauttaa palkkalistoja ennen kuin nämä leimat on muokattu ja suoritettu.
1406273941=tarkoittaa tehtyjen työvuorojen lukumäärää, jotka kelpasivat ruokailutauolle, mutta joille ei ole kirjattu ruokailuaikaleimauksia. Tarkista ateriakausikäytäntö myymäläpäälliköiden kanssa varmistaaksesi, että he ymmärtävät käytännön ja sovellettavan lain.
1406273942=ovat aikaleimausmääriä, jotka eivät ole linjassa Store Managerin luoman aikataulun kanssa. Näitä ovat aikainen/myöhäinen sisääntulo, aikainen/myöhäinen ulostulo, suunnittelematon työvuoro ja suunnittelematon poissaolo. Nämä tilanteet ovat myymäläpäälliköiden vastuulla, mutta voivat paljastaa trendejä, jotka viittaavat siihen, että myymäläpäällikköä on valmennettava hänen roolistaan yrityksen politiikan täytäntöönpanossa.
1406273943=Esimiehen muokkaukset
1406273944=ovat työntekijöiden aikaleimauksia, jotka myymäläpäällikkö on muokannut tai tallentanut manuaalisesti. Myymäläpäällikön palkkalaskentamuutosten tulisi olla harvoja ja harvoin. Usein tehdyt muokkaukset viittaavat tarpeeseen tarkistaa palkka-/tuntipolitiikka myymäläpäällikön kanssa varmistaakseen, että työntekijöille maksetaan kaikista työtuneista.
