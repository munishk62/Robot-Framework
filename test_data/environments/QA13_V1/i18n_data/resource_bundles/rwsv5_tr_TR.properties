rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.description=Planlanmış bir olayın, değerlendirildiği bir haftanın gününden önceki veya sonraki gün sayısında meydana gelip gelmeyeceğini kontrol eder.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.example=İfade [SCHDEVENT] biçiminde olacaktır. [Mağaza Açık]. [Günler Sonrası (a)] burada gün sayısıdır. A pozitif bir sayı ise, günlerden sonra olarak kabul edilir, Örneğin [SCHDEVENT]. [ Store Open]. [OccurAfterDays (1)] - Sonraki gün Store Open olayı meydana gelirse bu ifade true değerini döndürürken, negatif sayı günlerden önceyi temsil eder. Örneğin [SCHDEVENT]. [Store Open]. [OccurAfterDays (-1)] - Önceki gün Store Open olayı meydana gelirse bu ifade true değerini döndürür.
rosom.calMethod.exprBuilder.scheduledEvent.startTime.description=Zamanlanmış bir etkinliğin dakika cinsinden başlangıç zamanı süresi
rosom.calMethod.exprBuilder.scheduledEvent.startTime.example=Mağaza'da başlangıç zamanı sabah 9 olarak planlanmış bir olay var. Ardından ifade, hesaplama yönteminin çıktısı olarak 540'ı döndürecektir.
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.description=Haftanın tüm günleri için etkinlik süresinin toplamını dakika cinsinden verir
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.example=Mağaza, haftanın tüm günlerinde meydana gelen 1 saatlik bir zamanlanmış olaya sahiptir. Ardından ifade, hesaplama yönteminin çıktısı olarak 420 değerini döndürecektir.
