1406273934=Sauf dans les cas exigés par la loi, les employés ont droit à une période de repas minimale non rémunérée de 30 minutes sans interruption (généralement vers le milieu du quart d’un employé) pour des quarts supérieurs ou égaux à 6 heures planifiées à l’horaire, mais inférieurs à 8 heures travaillées au cours d’une journée; et pour des quarts de plus de 8 heures, une période de repas non rémunérée d’une heure (dont au moins 30 minutes sont sans interruption) doit être offerte. Les gestionnaires de magasin ou les détenteurs de clés (en l’absence du gestionnaire de magasin) déterminent l’heure de la pause repas. Là où la loi étatique est différente, la loi étatique pertinente sera respectée. Si vous avez des questions concernant les exigences de la période de repas dans un cas particulier, veuillez communiquer avec le directeur de district.
1406273935=Heures supplémentaires approuvées
1406273936=Heures supplémentaires imminentes
1406273937=calcule les heures supplémentaires pour un employé si le cumul hebdomadaire des heures travaillées + les heures restantes à l’horaire entraînent des heures supplémentaires.
1406273938=Note de l’horaire
1406273939=indique dans quelle mesure l’horaire créé par le gestionnaire de magasin correspond bien à l’horaire suggéré. L’horaire créé par le gestionnaire de magasin pourrait ne pas toujours correspondre à l’horaire suggéré, car chaque gestionnaire de magasin doit créer un horaire qui répond le mieux aux besoins de son magasin.
1406273940=indique le nombre de quarts incomplets qui doivent être modifiés par le gestionnaire de magasin (p. ex., l’employé ne pointe pas son arrivée ou son départ à la fin du quart). Les gestionnaires de magasin qui ne modifient pas ces pointages en temps opportun vont déclarer en partie seulement la paie de la semaine en cours. Les gestionnaires de magasin ne pourront pas valider la paie tant que ces pointages ne seront pas modifiés et complets.
1406273941=indique le nombre de quarts travaillés qui étaient admissibles à une pause-repas, mais pour lesquels les pointages de repas n’ont pas été enregistrés. Passer en revue la politique sur les périodes de repas avec les gestionnaires de magasin pour garantir qu’ils comprennent la politique et les lois applicables.
1406273942=sont les dénombrements de pointages qui ne correspondent pas à l’horaire créé par le gestionnaire de magasin. Ils comprennent les pointages d’arrivée en avance ou en retard, les pointages de départ en avance ou en retard, les quarts non planifiés et les absences non planifiées. Le gestionnaire de magasin est responsable de la gestion de ces situations, mais ces dernières peuvent révéler des tendances qui suggèrent que le gestionnaire de magasin a besoin d’encadrement concernant son rôle concernant l’application de la politique de l’entreprise.
1406273943=Modifications du gestionnaire
1406273944=sont des pointages d’employés qui ont été modifiés ou enregistrés manuellement par le gestionnaire de magasin. Les modifications apportées à la paie par le gestionnaire de magasin doivent être rares et peu fréquentes. Des modifications fréquentes suggèrent le besoin de passer en revue la politique sur les salaires et les heures avec le gestionnaire de magasin pour garantir que les employés sont payés pour toutes les heures travaillées.
