1406273938=Programma Punteggio
1406273939=indica quanto bene la pianificazione creata dallo Store Manager si allinea con la pianificazione suggerita. La pianificazione creata dallo Store Manager potrebbe non sempre allinearsi con la pianificazione suggerita, poiché ogni Store Manager deve creare una pianificazione che soddisfi al meglio le esigenze del proprio negozio.
1406273940=indica il numero di turni incompleti che richiedono modifiche da parte del Responsabile del punto vendita (ad esempio, un dipendente non timbra l'ingresso/uscita a fine turno). I responsabili del punto vendita che non modificano queste timbrature in tempo sotto-riporteranno la busta paga della settimana corrente. I responsabili del punto vendita non saranno in grado di rilasciare la busta paga finché queste timbrature non saranno modificate e completate.
1406273941=indica il numero di turni di lavoro che hanno dato diritto a una pausa pasto, ma per i quali non sono stati registrati i timbri per l'orario dei pasti. Rivedere la politica relativa all'orario dei pasti con i responsabili dei punti vendita per assicurarsi che comprendano la politica e la legge applicabile.
1406273942=sono conteggi di timbrature che non sono in linea con la programmazione creata dallo Store Manager. Tra queste rientrano l'entrata anticipata/tardiva, l'uscita anticipata/tardiva, il turno non programmato e l'assenza non programmata. Queste situazioni sono responsabilità dello Store Manager, ma possono rivelare tendenze che suggeriscono la necessità di un coaching dello Store Manager in merito al suo ruolo nell'applicazione della politica aziendale.
1406273943=Modifiche del gestore
1406273944=sono timbrature orarie dei dipendenti che sono state modificate o registrate manualmente dal Responsabile del negozio. Le modifiche alla busta paga da parte del Responsabile del negozio dovrebbero essere poche e poco frequenti. Modifiche frequenti suggeriscono la necessità di rivedere la politica salario/orario con il Responsabile del negozio per garantire che i dipendenti siano pagati per tutte le ore lavorate.
