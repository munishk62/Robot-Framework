1406273933=Politica dei pasti
1406273934=Salvo diversamente richiesto dalla legge, ai dipendenti deve essere concesso un minimo di 30 minuti di pasto non retribuito e ininterrotto (in genere verso la metà del turno di un dipendente) per turni superiori o uguali a 6 ore programmate ma inferiori a 8 ore lavorate in un giorno e per turni programmati pari o superiori a 8 ore, deve essere concesso un periodo di pasto non retribuito di un'ora (di cui almeno 30 minuti devono essere ininterrotti). I responsabili del negozio o i portatori di chiavi (in assenza del responsabile del negozio) determinano l'orario del periodo di pasto. Laddove la legge statale differisca, verrà seguita la legge statale specifica. In caso di domande sui requisiti del periodo di pasto in un caso particolare, contattare il responsabile distrettuale.
