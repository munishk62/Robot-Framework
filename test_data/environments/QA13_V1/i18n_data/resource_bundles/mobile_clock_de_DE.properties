1000000000637=Die Aktivierung der Standortdienste auf dem Gerät ermöglicht die Nachverfolgung des Standorts und stellt sicher, dass alle Uhrentransaktionen korrekt auf dem entsprechenden Standort registriert werden. Diese Funktion ist für die Aufzeichnung von geofencing-basierten Stempelvorgängen unerlässlich und gewährleistet, dass Zeiteingaben innerhalb der festgelegten Grenzen des Standorts erfolgen, während das Gerät bequem am Standort verwendet wird.
1000000000638=Bestätigung der Geschäftsbedingungen
1000000000639=Da für diesen Uhr-Registrierungsprozess keine Standortdienste genutzt werden, lesen und bestätigen Sie bitte die Geschäftsbedingungen.
1000000000640=Während des Uhr-Registrierungsprozesses übernimmt der Standort die Verantwortung dafür, dass alle Zeiterfassungen in den Räumlichkeiten des registrierten Standorts aufgezeichnet werden. Das Gerät muss sicher an der Wand am vorgesehenen Standort angebracht werden, um Stempelvorgänge außerhalb des Standorts zu verhindern. Der Standort ist sich der Sorgfaltspflicht aufgrund fehlender Geofencing-Fähigkeiten bewusst und erkennt diese Verantwortlichkeiten an, um fortzufahren.
1000000000641=Ich bestätige die Geschäftsbedingungen.
