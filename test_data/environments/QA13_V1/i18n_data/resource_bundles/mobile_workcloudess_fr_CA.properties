timeclock.help.break=Certaines organisations offrent de courtes pauses pendant la période de travail. Si cette option est configurée, la carte de présence affichera les heures de début et de fin des pauses pour assurer la conformité et le contrôle des présences. Pour commencer une pause, appuyez sur le bouton « Prendre une pause » et maintenez-le enfoncé. Pour terminer la pause, basculez le curseur « Terminer la pause » de gauche à droite.
timeclock.help.break_periods=Les périodes de pause sont initiées en appuyant et en maintenant l’action
timeclock.help.clock_in1=Vous pouvez pointer jusqu’à 8 minutes avant le début de votre quart de travail.
timeclock.help.clock_in2=Pour pointer votre arrivée, appuyez et faites glisser le curseur sur l’écran pour enregistrer votre pointage.
timeclock.help.clock_in_new=Pointez votre arrivée d’un simple glissement – pour pointer votre arrivée, basculez le curseur « Pointer son arrivée » de gauche à droite. Lorsque c’est fait, l’utilisateur obtient un accès instantané à son état de présence, au temps total écoulé et à une chronologie des tâches et transactions à venir. Il n’est pas possible de pointer son arrivée en dehors de la plage horaire définie par l’organisation.
timeclock.help.clock_out=Une fois votre quart de travail terminé, un curseur pour pointer votre départ apparaîtra. Appuyez et faites glisser le curseur pour enregistrer votre départ.
timeclock.help.clock_out_early=Maintenez ce bouton enfoncé pour pointer votre départ avant la fin de votre quart de travail si vous n’êtes pas prévu à l’horaire.
timeclock.help.clock_out_early_new=Si vous devez pointer votre départ plus tôt que prévu, vous remarquerez que le curseur n’est pas disponible. Dans ce cas, les utilisateurs doivent plutôt appuyer longuement sur le bouton « Pointer son départ » pour enregistrer leur pointage avec succès.
timeclock.help.clock_out_new=Pointez votre départ d’un simple glissement – pour pointer votre départ, basculez le curseur « Pointer son départ » de gauche à droite. Pointez votre départ pour enregistrer avec précision la fin de votre période de travail et mettre à jour vos dossiers de présence.
timeclock.help.incorrect_punch=Si vous devez corriger une estampille sur un pointage, vous devrez soumettre une correction de fiche de temps à votre gestionnaire.
timeclock.help.meal=Il est nécessaire de consigner les heures de début et de fin des repas pour assurer la conformité et le contrôle des présences. Pour commencer une pause-repas, appuyez sur le bouton « Début du repas » et maintenez-le enfoncé. Pour mettre fin à la pause-repas, basculez le curseur « Fin du repas » de gauche à droite.
timeclock.help.missing_incorrect_punches=Pour les pointages manquants ou erronés, sachez qu’il existe un menu « Dérogation par le gestionnaire », conçu pour régler ces problèmes. Ce menu est accessible par votre gestionnaire, qui peut vous aider à corriger les écarts. Assurez-vous de communiquer avec votre gestionnaire pour utiliser cette fonction efficacement.
timeclock.help.missing_punches=Si vous avez manqué des pointages et devez entrer une fonction différente, contactez votre gestionnaire pour remplacer votre séquence de pointage.
timeclock.help.switch_stores=Si vous vous trouvez à proximité de plusieurs magasins ou sites, vous avez la possibilité de passer d’un à l’autre. Pour ce faire, cliquez simplement sur « Changer de magasin » et choisissez l’emplacement approprié pour vos besoins.
