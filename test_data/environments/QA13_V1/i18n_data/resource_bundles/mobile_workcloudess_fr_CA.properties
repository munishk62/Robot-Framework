timeclock.help.clock_in_v2=Pointer son arrivée est facile : appuyez simplement sur le bouton « Pointer son arrivée ». Une fois pointé, vous verrez immédiatement votre état de présence, le temps total écoulé et une chronologie des tâches et transactions à venir. Veuillez noter : vous ne pouvez pointer votre arrivée que pendant la plage horaire désignée par votre organisation.(g)
timeclock.help.clock_out_v2=Pointez facilement votre départ à la fin de votre période de travail en appuyant sur le bouton « Pointer son départ ». Cela vous aide à enregistrer avec précision la fin de votre quart et à maintenir vos dossiers de présence à jour.(g)
timeclock.help.clock_out_early_v2=Pour pointer votre départ plus tôt, les utilisateurs doivent appuyer sur le bouton « Pointer son départ » afin d’enregistrer leur pointage avec succès. Un message de confirmation apparaîtra pour s’assurer que la transaction est complétée.(g)
timeclock.help.meal_v2=Pour favoriser la conformité et le contrôle précis des présences, il est important d’enregistrer à la fois le début et la fin de vos pauses-repas. Pour commencer votre pause-repas, appuyez sur le bouton « Début du repas ». Lorsque votre pause-repas est terminée, terminez-la en appuyant sur le bouton « Fin du repas ».(g)
timeclock.help.break_v2=Certaines organisations offrent de courtes pauses pendant la période de travail. Si elles sont configurées, votre carte de présence affichera les heures de début et de fin des pauses pour assurer la conformité et le contrôle des présences. Pour commencer une pause, appuyez sur le bouton « Prendre une pause ». Lorsque vous êtes prêt à reprendre le travail, appuyez sur le bouton « Terminer la pause ».(g)
