timeclock.help.troubleshooting_tips=Si vous ne pouvez pas voir les options de curseurs, essayez d’actualiser la page de l’horodateur en cliquant sur l’icône « Actualiser » ou faites défiler la page vers le haut pour voir les boutons.
timeclock.help.view_punchcard=Pour effectuer le suivi et l’analyse de vos heures travaillées, consultez le temps total de vos quarts de travail et une chronologie détaillée de vos pointages, y compris les heures et les avertissements. Cela aide à identifier les tendances au travail et à corriger rapidement les écarts. Appuyez sur l’icône Plus (3 points) dans le coin supérieur droit, puis appuyez sur « Afficher la carte de pointage », une fois que vous avez pointé votre arrivée.
