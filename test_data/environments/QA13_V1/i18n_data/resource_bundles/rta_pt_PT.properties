1406273933=Política de refeições
1406273934=A menos que exigido por lei, os funcionários têm direito a um período mínimo de 30 minutos de refeição não remunerada e ininterrupta (normalmente no meio do turno do funcionário) para turnos maiores ou iguais a 6 horas programadas, mas menos de 8 horas trabalhadas em um dia e para turnos programados iguais ou maiores que 8 horas, um período de refeição não remunerada de uma hora (pelo menos 30 minutos dos quais devem ser ininterruptos) deve ser fornecido. Gerentes de loja ou transportadores de chaves (na ausência do gerente da loja) determinam o tempo do período de refeição. Onde a lei estadual for diferente, a lei estadual específica será seguida. Se houver alguma dúvida sobre os requisitos do período de refeição em um caso específico, entre em contato com o gerente do distrito.
