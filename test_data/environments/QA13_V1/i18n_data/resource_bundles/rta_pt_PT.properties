1406273938=Pontuação do cronograma
1406273939=indica o quão bem a agenda criada pelo Gerente da Loja se alinha com a agenda sugerida. A agenda criada pelo Gerente da Loja pode nem sempre se alinhar com a agenda sugerida, pois cada Gerente da Loja deve criar uma agenda que atenda melhor às necessidades de sua loja.
1406273940=denota o número de turnos incompletos que exigem edição do Gerente de Loja (por exemplo, o funcionário não registra a entrada/saída no final do turno). Gerentes de Loja que não editarem esses registros em tempo hábil subnotificarão a folha de pagamento da semana atual. Gerentes de Loja não poderão liberar a folha de pagamento até que esses registros sejam editados e concluídos.
1406273941=denota o número de turnos trabalhados que se qualificaram para um intervalo para refeição, mas para os quais os pontos de horário de refeição não foram registrados. Revise a política de período de refeição com os gerentes de loja para garantir que eles entendam a política e a lei aplicável.
1406273942=são contagens de pontos de tempo que não se alinham com a programação criada pelo Gerente da Loja. Isso inclui entrada antecipada/atrasada, saída antecipada/atrasada, turno não programado e ausência não programada. Essas situações são de responsabilidade do Gerente da Loja, mas podem revelar tendências que sugerem a necessidade de treinamento do Gerente da Loja em relação ao seu papel na aplicação da política da empresa.
1406273943=Edições do gerente
1406273944=são registros de ponto de funcionários que foram editados ou registrados manualmente pelo gerente da loja. As modificações na folha de pagamento pelo gerente da loja devem ser poucas e pouco frequentes. Edições frequentes sugerem a necessidade de revisar a política de salário/hora com o gerente da loja para garantir que os funcionários sejam pagos por todas as horas trabalhadas.
