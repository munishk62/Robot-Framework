rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.example=Вираз має форму [SCHDEVENT]. [Магазин відкритий]. [ВідбуваєтьсяAfterDays (a)], де як a - число дня. Якщо a - додатне число, тоді воно вважається як після днів, наприклад [SCHDEVENT]. [ Магазин відкритий]. [ВідбуваєтьсяAfterDays (1)] - цей вираз повертає істину, якщо подія відкриття магазину відбувається наступного дня. Хоча від'ємне число представляє до днів. Наприклад [SCHDEVENT]. [Магазин відкритий]. [ВідбуваєтьсяAfterDays (-1)] - цей вираз повертає true, якщо подія Store Open відбулася попереднього дня.
rosom.calMethod.exprBuilder.scheduledEvent.startTime.description=Тривалість часу початку запланованої події в хвилинах
