rosom.calMethod.exprBuilder.engineSpecific.taskDate.description=Restituisce solo il valore della data dell'intervallo di tempo di input nel formato aaaaMMgg
rosom.calMethod.exprBuilder.engineSpecific.taskDate.example=Se la data dell'intervallo dell'attività è 01 gennaio 2020. Verrà valutata per restituire il valore della data dell'intervallo nel formato aaaaMMgg - 20200101.
rosom.calMethod.exprBuilder.engineSpecific.taskTime.description=Restituisce solo minuti dell'intervallo di tempo di input
rosom.calMethod.exprBuilder.engineSpecific.taskTime.example=Se l'intervallo tra le attività è 9 am. Questo verrà valutato per restituire il valore dell'intervallo in minuti - 540.
rosom.calMethod.exprBuilder.scheduledEvent.attribute=Qualsiasi evento programmato. Ad esempio, Store Open
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.description=Restituisce la durata dell'evento in minuti per un giorno in una settimana per cui sta valutando.
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.example=Store ha un evento pianificato con una durata di 1 ora che si verifica nel giorno per il quale sta valutando, quindi expression restituirà 60 come output del metodo di calcolo.
rosom.calMethod.exprBuilder.scheduledEvent.endTime.description=Durata dell'ora di fine di un evento pianificato in minuti
rosom.calMethod.exprBuilder.scheduledEvent.endTime.example=Il negozio ha un evento pianificato con ora di inizio 9:00 e durata 9 ore. Quindi l'evento termina alle 18:00. Quindi l'espressione restituirà 1080 come output del metodo di calcolo.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.description=Controlla se si verificherà un evento pianificato il numero di giorni prima o dopo il giorno in una settimana per cui sta valutando.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.example=L'espressione sarebbe nel formato [SCHDEVENT]. [Store Open]. [EvidenceAfterDays (a)] dove come a è il numero del giorno. Se a è un numero positivo, viene considerato come after days, ad esempio [SCHDEVENT]. [ Store Open]. [EvidenceAfterDays (1)] - Questa espressione restituisce true se l'evento Store Open si verifica il giorno successivo. Mentre un numero negativo rappresenta i giorni precedenti. Ad esempio [SCHDEVENT]. [Store Open]. [FitsAfterDays (-1)] - Questa espressione restituisce true se l'evento Store Open si verifica il giorno precedente.
rosom.calMethod.exprBuilder.scheduledEvent.startTime.description=Durata dell'ora di inizio di un evento pianificato in minuti
rosom.calMethod.exprBuilder.scheduledEvent.startTime.example=Store ha un evento pianificato con ora di inizio alle 9 AM, quindi l'espressione restituirà 540 come output del metodo di calcolo.
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.description=Restituisce la somma della durata dell'evento in minuti per tutti i giorni della settimana
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.example=Store ha un evento pianificato della durata di 1 ora che si verifica tutti i giorni della settimana, quindi l'espressione restituirà 420 come output del metodo di calcolo.
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.description=Numero di occorrenze di un evento pianificato in una settimana
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.example=Il negozio ha un evento pianificato applicabile a tutti i giorni della settimana, quindi l'espressione restituirà 7 come output del metodo di calcolo.
