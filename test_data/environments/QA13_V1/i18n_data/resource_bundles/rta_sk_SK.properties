1406273938=Naplánovať skóre
1406273939=označuje, ako dobre je vytvorený rozvrh manažéra predajne v súlade s navrhovaným rozvrhom. Harmonogram vytvorený vedúcim predajne sa nemusí vždy zhodovať s navrhovaným rozvrhom, pretože každý vedúci predajne musí vytvoriť rozvrh, ktorý najlepšie vyhovuje potrebám jeho predajne.
1406273940=označuje počet nedokončených zmien, ktoré si vyžadujú úpravu vedúceho predajne (napr. zamestnanec sa na konci zmeny neprihlási/odíde). Vedúci predajní, ktorí neupravia tieto razníky včas, budú vykazovať mzdy za aktuálny týždeň. Vedúci predajní nebudú môcť vydať výplatnú pásku, kým tieto raznice nebudú upravené a dokončené.
1406273941=označuje počet odpracovaných zmien, ktoré spĺňali podmienky na prestávku na jedenie, ale za ktoré neboli zaznamenané punče. Prečítajte si pravidlá týkajúce sa obdobia jedla s vedúcimi predajní, aby ste sa uistili, že rozumejú pravidlám a príslušným zákonom.
1406273942=sú počty časových zásahov, ktoré nie sú v súlade s plánom vytvoreným vedúcim predajne. Tieto zahŕňajú skorý/neskorý príchod, skorý/neskorý odchod, neplánovaná zmena a neplánovaná neprítomnosť. Riadiť tieto situácie je zodpovedný vedúci predajne, ale môžu odhaliť trendy, ktoré naznačujú potrebu školenia manažéra predajne, pokiaľ ide o jeho/jej úlohu pri presadzovaní firemnej politiky.
1406273943=Úpravy správcu
1406273944=sú časové razy zamestnancov, ktoré boli upravené alebo manuálne zaznamenané vedúcim predajne. Úpravy miezd vedúcim predajne by mali byť malé a zriedkavé. Časté úpravy naznačujú potrebu prehodnotiť mzdovú/hodinovú politiku s vedúcim predajne, aby sa zabezpečilo, že zamestnanci dostanú zaplatené za všetky odpracované hodiny.
