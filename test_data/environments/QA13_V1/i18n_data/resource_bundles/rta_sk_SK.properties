1406273934=Ak zákon nevyžaduje inak, zamestnancom sa poskytne minimálne jedno 30-minútové neplatené, neprerušované jedlo (zvyčajne v strede pracovnej zmeny) pre zmeny väčšie alebo rovné 6 plánovaným hodinám, ale menej ako 8 hodín odpracovaných za deň a pri plánovaných zmenách, ktoré sú rovné alebo dlhšie ako 8 hodín, sa musí poskytnúť hodina neplateného jedla (z toho najmenej 30 minút musí byť neprerušovaných). Vedúci predajne alebo kľúčoví dopravcovia (v neprítomnosti vedúceho predajne) určujú čas obdobia stravovania. Tam, kde sa štátne právo líši, sa bude postupovať podľa špecifického štátneho práva. Ak máte nejaké otázky týkajúce sa požiadaviek na obdobie stravovania v konkrétnom prípade, kontaktujte okresného manažéra.
