rosom.calMethod.exprBuilder.engineSpecific.taskDate.description=Devuelve solo el valor de fecha del intervalo de tiempo de entrada en el formato aaaaMMdd
rosom.calMethod.exprBuilder.engineSpecific.taskDate.example=Si la fecha del intervalo de tareas es el 1 de enero de 2020. Esto se evaluará para devolver el valor de fecha de intervalo con el formato aaaaMMdd - 20200101.
rosom.calMethod.exprBuilder.engineSpecific.taskTime.description=Devuelve solo minutos de intervalo de tiempo de entrada
