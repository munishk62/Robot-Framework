rosom.calMethod.exprBuilder.scheduledEvent.attribute=Cualquier evento programado. Por ejemplo, Tienda abierta
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.description=Devuelve la duración del evento en minutos para un día en una semana que está evaluando.
rosom.calMethod.exprBuilder.scheduledEvent.dayDuration.example=La tienda tiene un evento programado con una duración de 1 hora que ocurre el día que se está evaluando. Por tanto, la expresión devolverá 60 como resultado del método de cálculo.
rosom.calMethod.exprBuilder.scheduledEvent.endTime.description=La duración de la hora de finalización de un evento programado en minutos
rosom.calMethod.exprBuilder.scheduledEvent.endTime.example=La tienda tiene un evento programado con una hora de inicio a las 9:00 horas y una duración de 9 horas. Por lo tanto, el evento finaliza a las 18:00 horas. La expresión devolverá 1080 como resultado del método de cálculo.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.description=Comprueba si un evento programado ocurrirá o no en el número de días anteriores o posteriores al día en una semana para el que se evalúa.
rosom.calMethod.exprBuilder.scheduledEvent.occursAfterDays.example=La expresión sería de la forma [SCHDEVENT].[Store Open].[occursAfterDays(a)], donde "a" es un número de día. Si "a" es un número positivo, entonces se considera como días posteriores, por ejemplo [SCHDEVENT].[Store Open].[occursAfterDays (1)]: esta expresión devuelve verdadero si se produce un evento de tienda abierta al día siguiente. Por su parte, un número negativo representa días anteriores. Por ejemplo, [SCHDEVENT].[Store Open].[occursAfterDays(-1)]: esta expresión devuelve verdadero si se produce un evento de tienda abierta el día anterior.
rosom.calMethod.exprBuilder.scheduledEvent.startTime.description=La duración de la hora de inicio de un evento programado en minutos
rosom.calMethod.exprBuilder.scheduledEvent.startTime.example=La tienda tiene un evento programado con hora de inicio a las 9 de la mañana. Por tanto, la expresión devolverá 540 como resultado del método de cálculo.
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.description=Devuelve la suma de la duración del evento en minutos para todos los días de una semana.
rosom.calMethod.exprBuilder.scheduledEvent.weekDuration.example=La tienda tiene un evento programado con una duración de 1 hora que se repite todos los días de una semana. Por tanto, la expresión devolverá 420 como resultado del método de cálculo.
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.description=Número de repeticiones de un evento programado en una semana
rosom.calMethod.exprBuilder.scheduledEvent.weekOccurrences.example=La tienda tiene un evento programado que es aplicable a todos los días de una semana. Por tanto, la expresión devolverá 7 como resultado del método de cálculo.
