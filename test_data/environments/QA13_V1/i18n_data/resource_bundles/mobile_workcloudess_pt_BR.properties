timeclock.help.clock_in_v2=Registrar a entrada é fácil — basta tocar no botão "Registro de entrada". Depois da marcação, você verá instantaneamente seu status de registro de entrada, o tempo total decorrido e um cronograma das próximas tarefas e transações. Observação: você só pode registrar a entrada dentro da janela de tempo designada pela sua organização.(g)
timeclock.help.clock_out_v2=Registre facilmente a saída ao final do seu período de trabalho tocando no botão "Registro de saída". Isso ajuda a registrar com precisão quando você termina o turno e mantém seus registros de presença atualizados.(g)
timeclock.help.clock_out_early_v2=Para registrar a saída mais cedo, os usuários devem tocar no botão "Registro de saída" para registrar com êxito sua marcação. Um aviso de confirmação será exibido para garantir que a transação seja concluída.(g)
timeclock.help.meal_v2=Para promover a conformidade e a marcação precisa do tempo, é importante registrar o início e o término dos seus intervalos para refeição. Para iniciar o intervalo para refeição, toque no botão "Fazer refeição". Quando o intervalo para refeição terminar, encerre-o tocando no botão "Encerrar refeição".(g)
timeclock.help.break_v2=Algumas organizações oferecem pequenas pausas durante o período de trabalho. Se configurado, seu cartão de ponto exibirá os horários de início e término das pausas para garantir a conformidade e a pontualidade. Para iniciar uma pausa, toque no botão "Fazer pausa". Quando estiver pronto para voltar ao trabalho, toque no botão "Encerrar pausa".(g)
