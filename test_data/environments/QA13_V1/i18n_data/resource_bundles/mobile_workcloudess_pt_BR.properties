timeclock.help.troubleshooting_tips=Se você não conseguir ver as opções de controle deslizante, tente atualizar a página do Relógio de ponto tocando no ícone Atualizar ou deslizando a página para cima para exibir os botões.
timeclock.help.view_punchcard=Para acompanhar e analisar suas horas trabalhadas, visualize o tempo total do turno e uma linha do tempo detalhada com os registros de ponto, incluindo horários e alertas. Isso ajuda a identificar padrões de trabalho e corrigir rapidamente quaisquer discrepâncias. Toque no ícone Mais (3 pontos) no canto superior direito e, em seguida, toque em Visualizar cartão de ponto após registrar a entrada com sucesso.
