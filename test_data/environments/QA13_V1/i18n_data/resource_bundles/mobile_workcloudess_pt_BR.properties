timeclock.help.break=Algumas organizações oferecem pequenas pausas durante o período de trabalho. Se configurado, seu cartão de ponto exibirá o início e o término das pausas para garantir a conformidade e a pontualidade. Para iniciar uma pausa, toque e mantenha pressionado o botão Fazer pausa. Para encerrar a pausa, deslize o controle Encerrar pausa da esquerda para a direita.
timeclock.help.break_periods=Os períodos de intervalo são iniciados usando uma ação de pressionar e segurar
timeclock.help.clock_in1=Você pode registrar a hora de entrada do seu turno até 8 minutos antes do seu turno programado.
timeclock.help.clock_in2=Para registrar a hora de entrada, pressione e arraste o controle deslizante pela tela para registrar seu ponto.
timeclock.help.clock_in_new=Registre sua entrada facilmente com um simples deslize. Para registrar a entrada, deslize o controle Registro de entrada da esquerda para a direita. Depois da marcação, o usuário obtém acesso instantâneo ao status do registro de entrada, tempo total decorrido e um cronograma das próximas tarefas e transações. A transação de registro de entrada não é permitida fora da janela de tempo configurada, que é definida pela sua organização.
timeclock.help.clock_out=Depois de concluir o seu turno, um controle deslizante de saída aparecerá. Pressione e arraste o controle deslizante para registrar seu ponto.
timeclock.help.clock_out_early=Se você precisar registrar a hora de saída antes do final do seu turno, poderá manter este botão pressionado quando não estiver programado.
timeclock.help.clock_out_early_new=Para registrar a saída mais cedo, você notará que o controle deslizante não está disponível. Em vez disso, os usuários devem manter o botão Registro de saída pressionado para registrar com êxito sua marcação.
timeclock.help.clock_out_new=Registre sua saída facilmente com um simples deslize. Para registrar a saída, deslize o controle Registro de saída da esquerda para a direita. Marque a hora de saída para registrar com precisão o término do seu período de trabalho e atualizar seus registros de presença.
timeclock.help.incorrect_punch=Se precisar corrigir o carimbo de data e hora de um ponto, você precisará enviar uma correção do cartão de ponto ao seu gerente.
timeclock.help.meal=Registre os horários de início e término da refeição para garantir a conformidade e a pontualidade. Para iniciar o intervalo para refeição, toque e mantenha pressionado o botão Fazer refeição. Para encerrar, deslize o controle Encerrar refeição da esquerda para a direita.
timeclock.help.missing_incorrect_punches=Para marcações de ponto perdidas ou marcações de data e hora incorretas, é importante saber que há um menu Substituição do gerente criado para resolver esses problemas. Este menu é acessível ao seu gerente, que pode ajudar a corrigir quaisquer discrepâncias. Comunique-se com o seu gerente para utilizar essa função de forma eficaz.
timeclock.help.missing_punches=Se você perdeu alguma marcação de ponto e precisa inserir uma função diferente, você precisará entrar em contato com o seu gerente para substituir a sua sequência de marcações.
timeclock.help.switch_stores=Caso você esteja próximo a várias lojas ou unidades, você tem a opção de alternar entre elas. Para isso, basta clicar em Trocar de loja e selecionar a localização adequada conforme sua necessidade.
