1000000000636=Finalizar y continuar
1000000000637=Habilitar los servicios de ubicación en el dispositivo le permite realizar un seguimiento de su ubicación, lo que garantiza que cualquier transacción del reloj se registre con precisión en el sitio correspondiente. Esta función es esencial para realizar registros con geocerca, lo que garantiza que las entradas de hora se realicen dentro de los límites designados del sitio mientras se utiliza el dispositivo convenientemente en toda la ubicación.
1000000000638=Reconocimiento de términos y condiciones
1000000000639=Dado que los servicios de ubicación no se utilizan para este proceso de registro de reloj, revise y reconozca los términos y condiciones.
1000000000640=Durante el proceso de registro del reloj, el centro reconoce la responsabilidad de garantizar que todas las tarjetas de registro se realicen dentro de las instalaciones de la ubicación registrada. El dispositivo debe estar montado en la pared de forma segura en el sitio designado para evitar cualquier registro fuera del sitio. El centro comprende la diligencia necesaria debido a la ausencia de las capacidades de geocercas y reconoce estas responsabilidades para poder continuar.
