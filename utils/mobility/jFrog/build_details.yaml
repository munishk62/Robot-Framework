# JFrog build details for various applications, including configurations
# for Android and iOS platforms. This file specifies repository information,
# file paths, application names, package names, and cloud device/platform requirements.

# General JFrog repository details
jfrog_detail:
  REPO_NAME: ref-gen-dev  # Name of the JFrog repository
  JFROG_URL: https://artifactory-apac.zebra.com  # URL of the JFrog Artifactory

# Configuration details for the WorkCloudShift Android application
workcloudshift_android:
  BASE_PATH: WFM-MOBILITY/development/NG_ESS/OneApp/enterprise/Android/  # Base path in the repository
  DOWNLOAD_DIR_PATH: NextGenESS  # Directory path for downloading the build
  APP_NAME: app-enterprise-release.apk  # Name of the Android application file
  PACKAGE_NAME: com.zebra.workcloud.shift.enterprise  # Android package name
  CLOUD_DEVICE_NAME: ^.*Galaxy (S|A|M).*$  # Regex for matching cloud device names
  CLOUD_PLATFORM_VERSION: 14  # Minimum required Android platform version
  BUILD_ID: lt://APP10160322491783952754014338 # Shift app 13 July dev branch build.
  ZTEST_APP_FILE: file-1783953285366.apk # Shift App 13 july dev branch build.

# Configuration details for the WorkCloudShift iOS application
workcloudshift_ios:
  BASE_PATH: WFM-MOBILITY/development/NG_ESS/OneApp/enterprise/iOS/  # Base path in the repository
  DOWNLOAD_DIR_PATH: NextGenESS  # Directory path for downloading the build
  APP_NAME: shift.ipa  # Name of the iOS application file
  PACKAGE_NAME: com.zebra.workcloud.shift  # iOS package name
  CLOUD_DEVICE_NAME: iPhone.*  # Regex for matching cloud device names
  CLOUD_PLATFORM_VERSION: 26  # Minimum required iOS platform version
  BUILD_ID: lt://APP1016040991783952718478980 # Shift app 13 July dev branch enterprise build.
  ZTEST_APP_FILE: file-1783953210192.ipa # Shift app 13 July dev branch enterprise build.

